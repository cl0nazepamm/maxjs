<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  /* preserve-3d demo: every .lift element floats out of the panel plane by
     --param-lift (a Max-animated channel) scaled per-element. In div-host
     mode (maxjs-host=div) translateZ is REAL scene depth. */
  html, body { margin: 0; height: 100%; background: transparent; font-family: system-ui, sans-serif; color: #fff; }
  body { transform-style: preserve-3d; }
  .stage { position: absolute; inset: 0; transform-style: preserve-3d; }
  .panel {
    position: absolute; inset: 0;
    background: linear-gradient(155deg, #14141d 0%, #1d1d2c 100%);
    border-radius: 26px; border: 1px solid rgba(255,255,255,0.07);
  }
  .lift { transform-style: preserve-3d; }
  .title {
    position: absolute; top: 56px; left: 64px;
    font-size: 44px; font-weight: 800; letter-spacing: -0.02em;
    transform: translateZ(calc(var(--param-lift, 0) * 1.6px));
  }
  .title small { display: block; font-size: 16px; font-weight: 600; color: #8fa; margin-top: 6px; }
  .metric {
    position: absolute; top: 170px; left: 64px; width: 360px; padding: 28px 32px;
    background: rgba(46, 50, 70, 0.92); border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 30px 70px -30px rgba(0,0,0,0.9);
    transform: translateZ(calc(var(--param-lift, 0) * 1px));
  }
  .metric .num { font-size: 58px; font-weight: 700; }
  .metric .bar { height: 10px; background: #262a3a; border-radius: 5px; margin-top: 14px; overflow: hidden; }
  .metric .fill { height: 100%; width: calc(var(--param-progress, 0) * 100%); background: hsl(150, 85%, 50%); }
  .chips { position: absolute; top: 480px; left: 64px; display: flex; gap: 14px;
    transform: translateZ(calc(var(--param-lift, 0) * 0.6px)); }
  .chip { padding: 10px 22px; border-radius: 999px; font-weight: 700; font-size: 15px;
    background: hsl(220, 70%, 55%); box-shadow: 0 16px 40px -16px hsl(220, 70%, 45%); }
  .chip.b { background: hsl(150, 70%, 42%); box-shadow: 0 16px 40px -16px hsl(150, 70%, 35%); }
  .chip.c { background: hsl(20, 85%, 55%); box-shadow: 0 16px 40px -16px hsl(20, 85%, 45%); }
  .badge {
    position: absolute; top: 80px; right: 80px; padding: 16px 30px; border-radius: 16px;
    background: hsl(150, 85%, 48%); color: #03120a; font-size: 24px; font-weight: 800;
    transform: translateZ(calc(var(--param-lift, 0) * 2.2px)) rotate(6deg);
    box-shadow: 0 24px 60px -20px hsl(150, 85%, 40%);
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="panel"></div>
    <div class="lift title">Floating Interface<small>preserve-3d · depth from Max curves</small></div>
    <div class="lift metric">
      <div class="num" id="num">0</div>
      <div>conversion this week</div>
      <div class="bar"><div class="fill"></div></div>
    </div>
    <div class="lift chips">
      <span class="chip">Realtime</span><span class="chip b">DOM</span><span class="chip c">In-scene</span>
    </div>
    <div class="lift badge">TRUE DEPTH</div>
  </div>
  <script>
    (() => {
      const num = document.currentScript.parentNode.querySelector?.('#num')
        || document.getElementById('num');
      window.addEventListener('message', (e) => {
        const m = e.data;
        if ((m?.type === 'maxjs:params' || m?.type === 'maxjs-params') && m.params && num) {
          const p = Number(m.params.progress) || 0;
          num.textContent = Math.round(p * 100) + '%';
        }
      });
    })();
  </script>
</body>
</html>
