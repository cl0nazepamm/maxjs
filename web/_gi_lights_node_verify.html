<!DOCTYPE html><html><head><meta charset="utf-8"><title>HALO-GI non-Studio (GiLightsNode) verify</title>
<style>html,body{margin:0;height:100%;background:#111;color:#cde;font:12px/1.5 monospace}#c{width:50vw;height:100vh;float:left}#o{padding:10px;overflow:auto;height:100vh}</style>
<script type="importmap">{ "imports": {
  "three":"./vendor/three-r185/build/three.webgpu.js",
  "three/webgpu":"./vendor/three-r185/build/three.webgpu.js",
  "three/tsl":"./vendor/three-r185/build/three.tsl.js",
  "three/addons/":"./vendor/three-r185/examples/",
  "three-mesh-bvh":"./node_modules/three-mesh-bvh/src/index.js" },
  "scopes":{"./node_modules/three-mesh-bvh/":{"three":"./vendor/three-r185/build/three.module.js"}}}</script>
</head><body><canvas id="c"></canvas><pre id="o">running…</pre><script type="module">
// Non-Studio path: install GiLightsNode (stock batched lights + HALO-GI injection)
// as the renderer lights factory, enable HALO-GI, and confirm colored bounce injects
// through GiLightsNode -> context.irradiance (same proof as the MaxLightsNode harness,
// but via the global non-Studio node).
const log=[]; const out=document.getElementById('o');
window.addEventListener('error',e=>log.push(''+(e.error?e.error.stack:e.message)));
window.addEventListener('unhandledrejection',e=>log.push('rej:'+(e.reason&&e.reason.stack||e.reason)));
const report=(o)=>{ window.__DONE=o; out.textContent=JSON.stringify(o,null,2); };
(async()=>{
 const THREE=await import('three');
 const { giLights }=await import('./js/gi_lights_node.js');
 const { createProbeField }=await import('./js/gi_probes.js');
 const canvas=document.getElementById('c'); const renderer=new THREE.WebGPURenderer({canvas, antialias:false});
 renderer.setPixelRatio(1); const W=480,H=480; renderer.setSize(W,H,false); await renderer.init();
 if(renderer.backend?.isWebGPUBackend!==true){ report({pass:false,reason:'not webgpu',log}); return; }
 renderer.toneMapping=THREE.NoToneMapping;

 // install GiLightsNode as the renderer lights factory (mirrors index.html non-Studio path)
 if(renderer.lighting?.createNode){
   renderer.lighting.createNode=(lights=[])=>giLights({maxDirectionalLights:16,maxPointLights:32,maxSpotLights:32,maxHemisphereLights:4}).setLights(lights);
 } else { report({pass:false,reason:'no renderer.lighting.createNode',log}); return; }

 const scene=new THREE.Scene();
 const cam=new THREE.PerspectiveCamera(50,1,0.1,100); cam.position.set(0,2.5,8.5); cam.lookAt(0,1.6,0);
 const wall=(w,h,color,pos,rot)=>{ const m=new THREE.Mesh(new THREE.PlaneGeometry(w,h), new THREE.MeshStandardMaterial({color,roughness:1,metalness:0})); m.position.set(...pos); if(rot)m.rotation.set(...rot); scene.add(m); return m; };
 const S=2.5,Hh=5;
 wall(2*S,Hh,0xffffff,[0,Hh/2,-S]);
 wall(2*S,2*S,0xffffff,[0,0,0],[-Math.PI/2,0,0]);
 wall(2*S,2*S,0xffffff,[0,Hh,0],[Math.PI/2,0,0]);
 wall(Hh,2*S,0xff1111,[-S,Hh/2,0],[0,Math.PI/2,0]);
 wall(Hh,2*S,0x11ff11,[S,Hh/2,0],[0,-Math.PI/2,0]);
 const lamp=new THREE.PointLight(0xffffff,18,0,2); lamp.position.set(0,4.7,1.2); scene.add(lamp);
 scene.updateMatrixWorld(true);

 const field=createProbeField({ renderer, scene, intensity:3.0, hysteresis:0.85 });
 if(!field.isSupported()){ report({pass:false,reason:'unsupported',log}); return; }
 field.setEnabled(true);
 let n=0; const TICKS=120;
 await new Promise((res)=>{ (async function loop(){ try{ await field.tick(); }catch(e){ log.push('tick:'+(e&&e.stack||e)); } n++; if(n<TICKS) requestAnimationFrame(loop); else res(); })(); });

 const rt=new THREE.RenderTarget(W,H);
 async function renderRead(){ renderer.setRenderTarget(rt); renderer.render(scene,cam); renderer.setRenderTarget(null);
   const b=await renderer.readRenderTargetPixelsAsync(rt,0,0,W,H); renderer.render(scene,cam); return b; }
 const at=(buf,fx,fy)=>{ let r=0,g=0,bl=0,c=0; const cx=Math.floor(W*fx),cy=Math.floor(H*fy);
   for(let dy=-6;dy<=6;dy++)for(let dx=-6;dx<=6;dx++){ const x=cx+dx,y=cy+dy; if(x<0||y<0||x>=W||y>=H)continue;
     const i=((H-1-y)*W+x)*4; r+=buf[i];g+=buf[i+1];bl+=buf[i+2];c++; } return [r/c,g/c,bl/c]; };

 const on=await renderRead();
 field.setEnabled(false); field.setIntensity(0);
 const off=await renderRead();
 const FL=[0.30,0.80], FR=[0.70,0.80];
 const onL=at(on,...FL), offL=at(off,...FL), onR=at(on,...FR), offR=at(off,...FR);
 const dL=[onL[0]-offL[0], onL[1]-offL[1], onL[2]-offL[2]];
 const dR=[onR[0]-offR[0], onR[1]-offR[1], onR[2]-offR[2]];
 const checks=[
   {name:'GiLightsNode injects GI energy (on>off)', value:{onL,offL}, pass:(onL[0]+onL[1]+onL[2])>(offL[0]+offL[1]+offL[2])+6},
   {name:'left floor bounce RED-biased (ΔR>ΔG)', value:{dL:dL.map(x=>+x.toFixed(1))}, pass: dL[0] > dL[1]+3},
   {name:'right floor bounce GREEN-biased (ΔG>ΔR)', value:{dR:dR.map(x=>+x.toFixed(1))}, pass: dR[1] > dR[0]+3},
 ];
 const pass=checks.every(c=>c.pass);
 report({pass, dL:dL.map(x=>+x.toFixed(1)), dR:dR.map(x=>+x.toFixed(1)), checks, log});
})();
</script></body></html>
