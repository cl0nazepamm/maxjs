<!DOCTYPE html><html><head><meta charset="utf-8"><title>HALO-GI probe field verify</title>
<style>html,body{margin:0;height:100%;background:#111;color:#cde;font:13px/1.5 monospace}
#c{width:55vw;height:100vh;display:block;float:left}#o{padding:12px;overflow:auto;height:100vh}</style>
<script type="importmap">{ "imports": {
  "three":"./vendor/three-r185/build/three.webgpu.js",
  "three/webgpu":"./vendor/three-r185/build/three.webgpu.js",
  "three/tsl":"./vendor/three-r185/build/three.tsl.js",
  "three-mesh-bvh":"./node_modules/three-mesh-bvh/src/index.js" },
  "scopes":{"./node_modules/three-mesh-bvh/":{"three":"./vendor/three-r185/build/three.module.js"}}}</script>
</head><body><canvas id="c"></canvas><pre id="o">running…</pre><script type="module">
// Phase-1 validation: does the DDGI probe field pick up colored bounce?
// Cornell box (RED left wall, GREEN right wall, white else, point light). After
// convergence, left-half probes must be red-biased, right-half green-biased, and
// the field must carry real energy (not black). Results → window.__DONE.
const log=[]; const out=document.getElementById('o');
window.addEventListener('error',e=>log.push(''+(e.error?e.error.stack:e.message)));
window.addEventListener('unhandledrejection',e=>log.push('rej:'+(e.reason&&e.reason.stack||e.reason)));
const report=(o)=>{ window.__DONE=o; out.textContent=JSON.stringify(o,null,2); };

(async()=>{
 const THREE=await import('three');
 const TSL=await import('three/tsl');
 const { createProbeField }=await import('./js/gi_probes.js');
 const { octEncode }=await import('./js/gi_oct.js');
 const canvas=document.getElementById('c');
 const renderer=new THREE.WebGPURenderer({canvas});
 renderer.setPixelRatio(1); renderer.setSize(Math.floor(innerWidth*0.55),innerHeight,false);
 await renderer.init();
 if(renderer.backend?.isWebGPUBackend!==true){ report({pass:false,reason:'not WebGPU backend',log}); return; }

 const scene=new THREE.Scene();
 const cam=new THREE.PerspectiveCamera(50,1,0.1,100); cam.position.set(0,2.5,9); cam.lookAt(0,2.5,0);
 const wall=(w,h,color,pos,rot)=>{ const m=new THREE.Mesh(new THREE.PlaneGeometry(w,h),
   new THREE.MeshStandardMaterial({color,roughness:1,metalness:0})); m.position.set(...pos); if(rot)m.rotation.set(...rot); scene.add(m); return m; };
 const S=2.5, Hh=5;
 wall(2*S,Hh,0xdddddd,[0,Hh/2,-S],[0,0,0]);            // back  (+Z normal)
 wall(2*S,2*S,0xdddddd,[0,0,0],[-Math.PI/2,0,0]);       // floor (+Y)
 wall(2*S,2*S,0xdddddd,[0,Hh,0],[Math.PI/2,0,0]);       // ceiling (−Y)
 wall(Hh,2*S,0xff2222,[-S,Hh/2,0],[0,Math.PI/2,0]);     // LEFT  wall RED (+X normal)
 wall(Hh,2*S,0x22ff22,[S,Hh/2,0],[0,-Math.PI/2,0]);     // RIGHT wall GREEN (−X normal)
 const block=new THREE.Mesh(new THREE.BoxGeometry(1.2,1.6,1.2), new THREE.MeshStandardMaterial({color:0xcccccc,roughness:1}));
 block.position.set(0,0.8,-0.4); scene.add(block);
 const light=new THREE.PointLight(0xffffff,40,0,2); light.position.set(0,4.6,1.0); scene.add(light);
 scene.updateMatrixWorld(true);

 const field=createProbeField({ renderer, scene, intensity:1.0, hysteresis:0.9 });
 if(!field.isSupported()){ report({pass:false,reason:'field unsupported',log}); return; }
 field.setEnabled(true);

 // drive the probe ticks (foreground tab → rAF runs at full rate)
 let n=0; const TICKS=140;
 await new Promise((resolve)=>{
   (async function loop(){
     try{ await field.tick(); }catch(e){ log.push('tick:'+(e&&e.stack||e)); }
     n++; if(n<TICKS) requestAnimationFrame(loop); else resolve();
   })();
 });

 // read the atlas back: blit (scaled) → RGBA8 RT
 const atlas=field._debugAtlas();
 if(!atlas){ report({pass:false,reason:'no atlas after ticks',stats:field.getStats(),log}); return; }
 const aw=atlas.image.width, ah=atlas.image.height;
 const m=new THREE.MeshBasicNodeMaterial(); m.depthTest=false; m.depthWrite=false; m.toneMapped=false;
 m.colorNode=TSL.texture(atlas, TSL.screenUV).mul(0.25); // scale into [0,1] for 8-bit readback
 const q=new THREE.QuadMesh(m);
 const rt=new THREE.RenderTarget(aw,ah); rt.texture.minFilter=THREE.NearestFilter; rt.texture.magFilter=THREE.NearestFilter;
 renderer.setRenderTarget(rt); q.render(renderer); renderer.setRenderTarget(null);
 const buf=await renderer.readRenderTargetPixelsAsync(rt,0,0,aw,ah); rt.dispose();

 // also show the atlas on canvas
 renderer.setRenderTarget(null); renderer.clear(); q.render(renderer);

 const res=field.getResolution();
 const TILE=8, OCT=6, BORDER=1;
 const px=(x,y)=>{ const i=((ah-1-y)*aw+x)*4; return [buf[i],buf[i+1],buf[i+2]]; }; // flip Y
 // octahedral texel for a world direction: irradiance E(d) = light reaching a
 // surface whose normal is d. E(-X) faces the RED wall, E(+X) the GREEN wall.
 const texelFor=(d)=>{ const uv=octEncode(d[0],d[1],d[2]);
   return [Math.min(OCT-1,Math.max(0,Math.floor(uv[0]*OCT))), Math.min(OCT-1,Math.max(0,Math.floor(uv[1]*OCT)))]; };
 const tNegX=texelFor([-1,0,0]);   // faces left RED wall
 const tPosX=texelFor([ 1,0,0]);   // faces right GREEN wall
 // aggregate the DIRECTIONAL texels over all probes (full-sphere average washes
 // out the colour, so probe-average is grey by construction — sample directions).
 let redDir={r:0,g:0,b:0,n:0}, greenDir={r:0,g:0,b:0,n:0}, probes=0, nonblack=0;
 for(let pz=0;pz<res.z;pz++) for(let py=0;py<res.y;py++) for(let pxi=0;pxi<res.x;pxi++){
   const col=pxi, row=pz*res.y+py; probes++;
   // per-probe energy (full interior) for the non-black count
   let e=0; for(let iy=0;iy<OCT;iy++) for(let ix=0;ix<OCT;ix++){ const p=px(col*TILE+BORDER+ix,row*TILE+BORDER+iy); e+=p[0]+p[1]+p[2]; }
   if(e>20) nonblack++;
   const pr=px(col*TILE+BORDER+tNegX[0], row*TILE+BORDER+tNegX[1]); // E(-X) → red wall
   const pg=px(col*TILE+BORDER+tPosX[0], row*TILE+BORDER+tPosX[1]); // E(+X) → green wall
   redDir.r+=pr[0]; redDir.g+=pr[1]; redDir.b+=pr[2]; redDir.n++;
   greenDir.r+=pg[0]; greenDir.g+=pg[1]; greenDir.b+=pg[2]; greenDir.n++;
 }
 const norm=(s)=>({r:+(s.r/Math.max(1,s.n)).toFixed(1), g:+(s.g/Math.max(1,s.n)).toFixed(1), b:+(s.b/Math.max(1,s.n)).toFixed(1)});
 const RED=norm(redDir), GREEN=norm(greenDir);
 const checks=[
   {name:'field carries energy (probes non-black)', value:{nonblack,probes}, pass: nonblack > probes*0.3},
   {name:'E(-X) faces RED wall → red-biased (R>G)', value:RED, pass: RED.r > RED.g + 4},
   {name:'E(+X) faces GREEN wall → green-biased (G>R)', value:GREEN, pass: GREEN.g > GREEN.r + 4},
   {name:'red dir redder than green dir', value:{redRG:+(RED.r-RED.g).toFixed(1), greenRG:+(GREEN.r-GREEN.g).toFixed(1)}, pass:(RED.r-RED.g) > (GREEN.r-GREEN.g) + 6},
 ];
 const pass=checks.every(c=>c.pass);
 report({pass, stats:field.getStats(), atlas:[aw,ah], ticks:n, redDir:RED, greenDir:GREEN, checks, log});
})();
</script></body></html>
