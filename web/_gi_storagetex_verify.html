<!DOCTYPE html><html><head><meta charset="utf-8"><title>HALO-GI StorageTexture verify</title>
<style>html,body{margin:0;height:100%;background:#111;color:#cde;font:13px/1.5 monospace}
#c{width:60vw;height:100vh;display:block;float:left}#o{padding:12px;overflow:auto;height:100vh}</style>
<script type="importmap">{ "imports": {
  "three":"./vendor/three-r185/build/three.webgpu.js",
  "three/webgpu":"./vendor/three-r185/build/three.webgpu.js",
  "three/tsl":"./vendor/three-r185/build/three.tsl.js" }}</script>
</head><body><canvas id="c"></canvas><pre id="o">running…</pre><script type="module">
// Phase-0 gate #1 (docs/GI_HALO_design.md §11.1): prove StorageTexture +
// textureStore().toWriteOnly() ping-pong + HW-bilinear sample + 1px gutter in
// isolation, BEFORE any atlas code. Also exercises the gi_oct.js TSL nodes in a
// real kernel (GPU side of gate #3). Results → window.__DONE for headless read.
const log=[]; const out=document.getElementById('o');
window.addEventListener('error',e=>log.push(''+(e.error?e.error.stack:e.message)));
window.addEventListener('unhandledrejection',e=>log.push('rej:'+(e.reason&&e.reason.stack||e.reason)));
const report=(o)=>{ window.__DONE=o; out.textContent=JSON.stringify(o,null,2); };

(async()=>{
 const THREE=await import('three');
 const TSL=await import('three/tsl');
 const { octEncodeNode, octDecodeNode }=await import('./js/gi_oct.js');
 const { Fn, instanceIndex, textureStore, texture, uvec2, uint, float, vec2, vec4, uniform, screenUV } = TSL;

 const canvas=document.getElementById('c');
 const renderer=new THREE.WebGPURenderer({canvas});
 renderer.setPixelRatio(1); renderer.setSize(Math.floor(innerWidth*0.6),innerHeight,false);
 await renderer.init();
 if(renderer.backend?.isWebGPUBackend!==true){ report({pass:false,reason:'not WebGPU backend',log}); return; }

 const W=64, H=64;
 const mkTex=()=>{ const t=new THREE.StorageTexture(W,H); t.type=THREE.HalfFloatType; t.format=THREE.RGBAFormat;
   t.magFilter=THREE.LinearFilter; t.minFilter=THREE.LinearFilter; t.generateMipmaps=false; t.mipmapsAutoUpdate=false;
   t.wrapS=THREE.ClampToEdgeWrapping; t.wrapT=THREE.ClampToEdgeWrapping; return t; };
 const A=mkTex(), B=mkTex();

 const Wn=uint(W), Hn=uint(H);
 // ── pass 1: write a smooth ramp pattern into A via textureStore ──
 const writeA = Fn(()=>{
   const i=instanceIndex.toVar();
   const x=i.mod(Wn).toVar();
   const y=i.div(Wn).toVar();
   const r=float(x).div(float(W-1));               // x ramp (Y-flip independent)
   const g=float(y).div(float(H-1));               // y ramp (detects readback orientation)
   // steep alternating blue so the bilinear-midpoint test is unambiguous:
   const b=TSL.select(x.mod(uint(2)).equal(uint(0)), float(0.85), float(0.15));
   textureStore(A, uvec2(x,y), vec4(r,g,b,float(1))).toWriteOnly();
 })().compute(W*H);

 // ── pass 2: ping-pong — SAMPLE A (HW bilinear) while WRITING B ──
 // proves no read-after-write hazard (A read, B written, distinct bindings).
 const pingpong = Fn(()=>{
   const i=instanceIndex.toVar();
   const x=i.mod(Wn).toVar();
   const y=i.div(Wn).toVar();
   const uv=vec2(float(x).add(0.5).div(float(W)), float(y).add(0.5).div(float(H)));
   const a=texture(A, uv);
   // B.r = A.r*0.5 + 0.25 (marker), B.g = A.g, B.b = A.b (carry alt pattern), A=1
   textureStore(B, uvec2(x,y), vec4(a.x.mul(0.5).add(0.25), a.y, a.z, float(1))).toWriteOnly();
 })().compute(W*H);

 // ── pass 3: octahedral round-trip in a kernel → write A again ──
 // store octEncode(octDecode(uv)) error magnitude into A.r so we can read it
 // back; if the TSL oct nodes are wrong this lights up.
 const octKernel = Fn(()=>{
   const i=instanceIndex.toVar();
   const x=i.mod(Wn).toVar();
   const y=i.div(Wn).toVar();
   const uv=vec2(float(x).add(0.5).div(float(W)), float(y).add(0.5).div(float(H)));
   const dir=octDecodeNode(uv, TSL);
   const uv2=octEncodeNode(dir, TSL);
   const err=uv2.sub(uv).abs();
   textureStore(A, uvec2(x,y), vec4(err.x.mul(64), err.y.mul(64), float(0), float(1))).toWriteOnly();
 })().compute(W*H);

 // blit a storage texture → RGBA8 RT, read back
 const blitUniformTex={ value:B };
 const blitMat=new THREE.MeshBasicNodeMaterial(); blitMat.depthTest=false; blitMat.depthWrite=false; blitMat.toneMapped=false;
 // sample whichever texture we point colorNode at (swap by rebuilding)
 function blitOf(tex){ const m=new THREE.MeshBasicNodeMaterial(); m.depthTest=false; m.depthWrite=false; m.toneMapped=false;
   m.colorNode=texture(tex, screenUV); return new THREE.QuadMesh(m); }
 async function readback(tex){
   const rt=new THREE.RenderTarget(W,H); rt.texture.minFilter=THREE.NearestFilter; rt.texture.magFilter=THREE.NearestFilter;
   const q=blitOf(tex); renderer.setRenderTarget(rt); q.render(renderer); renderer.setRenderTarget(null);
   const buf=await renderer.readRenderTargetPixelsAsync(rt,0,0,W,H); rt.dispose(); q.material.dispose(); q.geometry.dispose();
   return buf; // Uint8 RGBA, W*H*4, origin bottom-left
 }
 const px=(buf,x,y)=>{ const i=((H-1-y)*W+x)*4; return [buf[i],buf[i+1],buf[i+2],buf[i+3]]; }; // flip Y (RT origin)

 try {
   await renderer.computeAsync(writeA);
   await renderer.computeAsync(pingpong);   // read A, write B — the hazard test
   const bBuf=await readback(B);

   // ── checks on B ──
   const checks=[];
   // R is x-based → independent of readback Y orientation: the clean primitive
   // test. G is y-based → used only to DETECT the orientation, not pass/fail.
   let exMaxR=0, zeros=0, nan=0, flipMatch=0, noflipMatch=0;
   for(let y=0;y<H;y++) for(let x=0;x<W;x++){
     const p=px(bBuf,x,y);
     if(p.some(v=>Number.isNaN(v))) nan++;
     if(p[0]===0&&p[1]===0&&p[2]===0) zeros++;
     const eR=Math.round(((x/(W-1))*0.5+0.25)*255);
     exMaxR=Math.max(exMaxR, Math.abs(p[0]-eR));
     // orientation probe via G = y ramp
     if(Math.abs(p[1]-Math.round((y/(H-1))*255))<=3) noflipMatch++;
     if(Math.abs(p[1]-Math.round(((H-1-y)/(H-1))*255))<=3) flipMatch++;
   }
   checks.push({name:'storage write+pingpong exactness, R ramp (max LSB err)', value:exMaxR, pass:exMaxR<=3});
   checks.push({name:'no all-black interior pixels (write/NaN)', value:zeros, pass:zeros===0});
   checks.push({name:'no NaN in readback', value:nan, pass:nan===0});
   checks.push({name:'readback orientation (info)', value:{noflipMatch,flipMatch,total:W*H}, pass:true});

   // ── HW bilinear: steep alternating blue (0.85/0.15 per texel). Sampling
   // BETWEEN two texel centres must yield an INTERPOLATED value strictly
   // interior to [min,max] — nearest-filtering would snap to one endpoint.
   {
     const SS=W*8; const rt=new THREE.RenderTarget(SS,SS);
     const q=blitOf(B); renderer.setRenderTarget(rt); q.render(renderer); renderer.setRenderTarget(null);
     const buf=await renderer.readRenderTargetPixelsAsync(rt,0,0,SS,SS); rt.dispose(); q.material.dispose(); q.geometry.dispose();
     const spB=(x,y)=>{ const i=((SS-1-y)*SS+x)*4; return buf[i+2]; }; // blue
     const c0=px(bBuf,10,10)[2], c1=px(bBuf,11,10)[2];  // ~217 and ~38
     const sx=Math.round((11/W)*SS-0.5), sy=Math.round((10.5/H)*SS-0.5); // ~boundary uv=11/64
     const mid=spB(sx,sy);
     const lo=Math.min(c0,c1), hi=Math.max(c0,c1);
     // bilinear ⇒ steep contrast AND boundary sample interpolated (not snapped)
     checks.push({name:'HW bilinear: boundary sample interpolated (not nearest)', value:{mid,c0,c1}, pass:(hi-lo)>50 && mid>(lo+25) && mid<(hi-25)});
   }

   // ── octahedral TSL nodes round-trip on GPU (gate #3 GPU side) ──
   await renderer.computeAsync(octKernel);
   const aBuf=await readback(A);
   let octMax=0; for(let y=0;y<H;y++) for(let x=0;x<W;x++){ const p=px(aBuf,x,y); octMax=Math.max(octMax,p[0],p[1]); }
   // err stored as err*64 in [0,1]→*255; round-trip err should be ~0 → channel ~0
   checks.push({name:'octEncode(octDecode(uv)) GPU err (8-bit)', value:octMax, pass:octMax<=2});

   // show B on the visible canvas
   const q=blitOf(B); renderer.setRenderTarget(null); renderer.clear(); q.render(renderer);

   const pass=checks.every(c=>c.pass);
   report({pass, gate:'#1 StorageTexture ping-pong + gutter/bilinear + #3 GPU oct', W, H, checks, log});
 } catch(e){ log.push('run:'+(e&&e.stack||e)); report({pass:false,reason:'exception',log}); }
})();
</script></body></html>
