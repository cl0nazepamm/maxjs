<!DOCTYPE html><html><head><meta charset="utf-8"><title>GI traverse debug</title>
<style>html,body{margin:0;height:100%;background:#111;color:#cde;font:12px monospace}#c{width:50vw;height:100vh;float:left}#o{padding:10px}</style>
<script type="importmap">{ "imports": {
  "three":"./vendor/three-r184/build/three.webgpu.js",
  "three/webgpu":"./vendor/three-r184/build/three.webgpu.js",
  "three/tsl":"./vendor/three-r184/build/three.tsl.js",
  "three-mesh-bvh":"./node_modules/three-mesh-bvh/src/index.js" },
  "scopes":{"./node_modules/three-mesh-bvh/":{"three":"./vendor/three-r184/build/three.module.js"}}}</script>
</head><body><canvas id="c"></canvas><pre id="o">running…</pre><script type="module">
// Isolate buildTraversal from the probe machinery: cast one ray per pixel from
// the room centre, write hit material baseColor (miss=black) into a StorageTexture.
const log=[]; const out=document.getElementById('o');
window.addEventListener('error',e=>log.push(''+(e.error?e.error.stack:e.message)));
window.addEventListener('unhandledrejection',e=>log.push('rej:'+(e.reason&&e.reason.stack||e.reason)));
const report=(o)=>{ window.__DONE=o; out.textContent=JSON.stringify(o,null,2); };

(async()=>{
 const THREE=await import('three'); const T=await import('three/tsl');
 const { buildSpectralScene }=await import('./js/spectral_scene.js');
 const { buildTraversal, T_MAX, RAY_EPS }=await import('./js/spectral_traverse.js');
 const canvas=document.getElementById('c'); const renderer=new THREE.WebGPURenderer({canvas});
 renderer.setPixelRatio(1); renderer.setSize(Math.floor(innerWidth*0.5),innerHeight,false); await renderer.init();
 if(renderer.backend?.isWebGPUBackend!==true){ report({pass:false,reason:'not webgpu',log}); return; }

 const scene=new THREE.Scene();
 const wall=(w,h,color,pos,rot)=>{ const m=new THREE.Mesh(new THREE.PlaneGeometry(w,h), new THREE.MeshStandardMaterial({color,roughness:1})); m.position.set(...pos); if(rot)m.rotation.set(...rot); scene.add(m); };
 const S=2.5,Hh=5;
 wall(2*S,Hh,0xdddddd,[0,Hh/2,-S]); wall(2*S,2*S,0xdddddd,[0,0,0],[-Math.PI/2,0,0]); wall(2*S,2*S,0xdddddd,[0,Hh,0],[Math.PI/2,0,0]);
 wall(Hh,2*S,0xff2222,[-S,Hh/2,0],[0,Math.PI/2,0]); wall(Hh,2*S,0x22ff22,[S,Hh/2,0],[0,-Math.PI/2,0]);
 scene.updateMatrixWorld(true);

 const built=buildSpectralScene({THREE,scene,maxTriangles:4_000_000});
 if(!built||built.error){ report({pass:false,reason:'scene:'+(built&&built.error),log}); return; }

 const buffers={ bvhNodes:new THREE.StorageBufferAttribute(built.bvhNodes,1), triIndex:new THREE.StorageBufferAttribute(built.triIndex,1),
   vertexData:new THREE.StorageBufferAttribute(built.vertexData,1), triMaterial:new THREE.StorageBufferAttribute(built.triMaterial,1),
   materials:new THREE.StorageBufferAttribute(built.materials,1), lights:new THREE.StorageBufferAttribute(built.lights,1) };
 const bvhNodes=T.storage(buffers.bvhNodes,'uint',buffers.bvhNodes.count);
 const triIndex=T.storage(buffers.triIndex,'uint',buffers.triIndex.count);
 const vertexData=T.storage(buffers.vertexData,'float',buffers.vertexData.count);
 const triMaterial=T.storage(buffers.triMaterial,'uint',buffers.triMaterial.count);
 const materials=T.storage(buffers.materials,'float',buffers.materials.count);
 const U={ nodeCount:T.uniform(built.nodeCount>>>0,'uint'), envRotation:T.uniform(0), envIntensity:T.uniform(1) };
 const trav=buildTraversal({ storages:{bvhNodes,triIndex,vertexData,triMaterial,materials}, U, env:null, lut:null, lutRes:0, maps:{} });
 const { traverseClosest, matFloat, triVert }=trav;

 const W=64,H=64;
 const atlas=new THREE.StorageTexture(W,H); atlas.type=THREE.HalfFloatType; atlas.format=THREE.RGBAFormat; atlas.generateMipmaps=false; atlas.mipmapsAutoUpdate=false;
 const k=T.Fn(()=>{
   const i=T.instanceIndex.toVar(); const x=i.mod(T.uint(W)).toVar(); const y=i.div(T.uint(W)).toVar();
   // ray from room centre over a hemisphere mapped to the screen
   const u=T.float(x).div(T.float(W)).mul(2).sub(1); const v=T.float(y).div(T.float(H)).mul(2).sub(1);
   const ro=T.vec3(0,2.5,0);
   const rd=T.normalize(T.vec3(u, v.mul(0.6).add(0.2), T.float(-1)));
   const bestT=T.float(T_MAX).toVar(); const bestTri=T.int(-1).toVar();
   traverseClosest(ro,rd,bestT,bestTri);
   const col=T.vec3(0).toVar();
   T.If(bestTri.greaterThanEqual(T.int(0)), ()=>{
     const mid=triMaterial.element(T.uint(bestTri));
     col.assign(T.vec3(matFloat(mid,0),matFloat(mid,1),matFloat(mid,2)));
   });
   T.textureStore(atlas, T.uvec2(x,y), T.vec4(col, 1)).toWriteOnly();
 })().compute(W*H);

 try { await renderer.computeAsync(k); } catch(e){ report({pass:false,reason:'compute:'+(e&&e.stack||e),log,nodeCount:built.nodeCount,tris:built.triCount}); return; }

 const m=new THREE.MeshBasicNodeMaterial(); m.depthTest=false; m.depthWrite=false; m.toneMapped=false; m.colorNode=T.texture(atlas,T.screenUV);
 const q=new THREE.QuadMesh(m); const rt=new THREE.RenderTarget(W,H); rt.texture.minFilter=THREE.NearestFilter; rt.texture.magFilter=THREE.NearestFilter;
 renderer.setRenderTarget(rt); q.render(renderer); renderer.setRenderTarget(null);
 const buf=await renderer.readRenderTargetPixelsAsync(rt,0,0,W,H); rt.dispose();
 renderer.setRenderTarget(null); renderer.clear(); q.render(renderer);

 let nonblack=0,red=0,green=0,white=0,max=0;
 for(let i=0;i<buf.length;i+=4){ const r=buf[i],g=buf[i+1],b=buf[i+2]; max=Math.max(max,r,g,b); if(r+g+b>20){nonblack++; if(r>g+30&&r>b+30)red++; else if(g>r+30&&g>b+30)green++; else if(r>60&&g>60&&b>60)white++; }}
 report({ pass: nonblack>100, nodeCount:built.nodeCount, tris:built.triCount, lights:built.lightCount, max, nonblack, red, green, white, log });
})();
</script></body></html>
