<!DOCTYPE html><html><head><meta charset="utf-8"><title>HALO-GI probe volumes verify</title>
<style>html,body{margin:0;height:100%;background:#111;color:#cde;font:12px/1.5 monospace}#c{width:40vw;height:100vh;float:left}#o{padding:10px}</style>
<script type="importmap">{ "imports": {
  "three":"./vendor/three-r184/build/three.webgpu.js",
  "three/webgpu":"./vendor/three-r184/build/three.webgpu.js",
  "three/tsl":"./vendor/three-r184/build/three.tsl.js",
  "three-mesh-bvh":"./node_modules/three-mesh-bvh/src/index.js" },
  "scopes":{"./node_modules/three-mesh-bvh/":{"three":"./vendor/three-r184/build/three.module.js"}}}</script>
</head><body><canvas id="c"></canvas><pre id="o">running…</pre><script type="module">
// Probe Origin: setBounds/setVolumes override the whole-scene auto-fit. A tight
// box → fewer probes, grid fits the box (perf + targeting). Multiple boxes union.
const log=[]; const out=document.getElementById('o');
window.addEventListener('error',e=>log.push(''+(e.error?e.error.stack:e.message)));
window.addEventListener('unhandledrejection',e=>log.push('rej:'+(e.reason&&e.reason.stack||e.reason)));
const report=(o)=>{ window.__DONE=o; out.textContent=JSON.stringify(o,null,2); };

(async()=>{
 const THREE=await import('three'); const { createProbeField }=await import('./js/gi_probes.js');
 const renderer=new THREE.WebGPURenderer({canvas:document.getElementById('c')}); renderer.setSize(64,64,false); await renderer.init();
 if(renderer.backend?.isWebGPUBackend!==true){ report({pass:false,reason:'not webgpu',log}); return; }
 const scene=new THREE.Scene();
 // geometry spread over a LARGE area (so auto-fit makes a big, coarse-ish grid)
 const mk=(x,z)=>{ const m=new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshStandardMaterial({color:0xcccccc})); m.position.set(x,0.5,z); scene.add(m); };
 mk(-9,-9); mk(9,9); mk(0,0); // 18x18 spread
 const lamp=new THREE.PointLight(0xffffff,20,0,2); lamp.position.set(0,5,0); scene.add(lamp);
 scene.updateMatrixWorld(true);

 const field=createProbeField({ renderer, scene, intensity:1.0 });
 field.setEnabled(true);
 const tickN=async(n)=>{ for(let i=0;i<n;i++){ await field.tick(); } };

 // (1) auto-fit: grid spans the whole 18x18 spread
 await tickN(3);
 const autoStats=field.getStats(); const autoBox=field.getBounds?.();

 // (2) one tight Probe Origin box around the centre cube only
 field.setBounds(new THREE.Box3(new THREE.Vector3(-1.5,-1.5,-1.5), new THREE.Vector3(1.5,1.5,1.5)));
 await tickN(3);
 const boxStats=field.getStats();
 const bx=field.getBounds?.();

 // (3) two boxes (corner cubes) → union grid
 field.setVolumes([
   new THREE.Box3(new THREE.Vector3(-10,-2,-10), new THREE.Vector3(-8,2,-8)),
   new THREE.Box3(new THREE.Vector3(8,-2,8), new THREE.Vector3(10,2,10)),
 ]);
 await tickN(3);
 const unionStats=field.getStats(); const ub=field.getBounds?.();

 // (4) back to auto-fit
 field.setBounds(null);
 await tickN(3);
 const backStats=field.getStats();

 const near=(a,b,t=0.4)=>Math.abs(a-b)<=t;
 const boxNear=(box,minA,maxA)=> box && near(box.min.x,minA[0])&&near(box.min.y,minA[1])&&near(box.min.z,minA[2]) && near(box.max.x,maxA[0])&&near(box.max.y,maxA[1])&&near(box.max.z,maxA[2]);
 const J=(b)=> b ? {min:[+b.min.x.toFixed(1),+b.min.y.toFixed(1),+b.min.z.toFixed(1)], max:[+b.max.x.toFixed(1),+b.max.y.toFixed(1),+b.max.z.toFixed(1)]} : null;
 // auto-fit should span the whole 18x18 spread (cubes at ±9); a tight box should
 // fit the box exactly; union should span both corner boxes.
 const autoSpans = autoBox && autoBox.min.x < -8 && autoBox.max.x > 8;
 const checks=[
   {name:'auto-fit grid spans the whole scene (±9)', value:J(autoBox), pass: !!autoSpans},
   {name:'one Probe Origin box → grid FITS the box (not the scene)', value:J(bx), pass: boxNear(bx,[-1.5,-1.5,-1.5],[1.5,1.5,1.5])},
   {name:'multiple boxes → grid = UNION of the boxes', value:J(ub), pass: boxNear(ub,[-10,-2,-10],[10,2,10])},
   {name:'setBounds(null) reverts to whole-scene auto-fit', value:J(field.getBounds?.()), pass: backStats.probes>0 && field.getBounds && field.getBounds().min.x < -8},
 ];
 const pass=checks.every(c=>c.pass);
 report({pass, probes:{auto:autoStats.probes,box:boxStats.probes,union:unionStats.probes,back:backStats.probes}, autoBox:J(autoBox), boxBox:J(bx), unionBox:J(ub), checks, log});
})();
</script></body></html>
