<!DOCTYPE html><html><head><meta charset="utf-8"><title>JH spectral verify</title>
<style>html,body{margin:0;height:100%;background:#111}#c{width:100vw;height:100vh;display:block}</style>
<script type="importmap">{ "imports": {
  "three":"./vendor/three-r184/build/three.webgpu.js",
  "three/webgpu":"./vendor/three-r184/build/three.webgpu.js",
  "three/tsl":"./vendor/three-r184/build/three.tsl.js",
  "three-mesh-bvh":"./node_modules/three-mesh-bvh/src/index.js" },
  "scopes":{"./node_modules/three-mesh-bvh/":{"three":"./vendor/three-r184/build/three.module.js"}}}</script>
</head><body><canvas id="c"></canvas><script type="module">
const log=[]; window.addEventListener('error',e=>log.push(''+(e.error?e.error.stack:e.message)));
window.addEventListener('unhandledrejection',e=>log.push('rej:'+e.reason));
const Q = new URLSearchParams(location.search);
const MODE = Q.get('m') || 'scene';      // scene | redgreen | texorient | texlit | normaltest
const RASTER = Q.get('r') === '1';       // r=1 → plain raster reference (no path tracer)

// ── procedural textures ──────────────────────────────────────────
function quadTex(THREE){ // 2x2: TL red, TR green, BL blue, BR yellow
  const c=document.createElement('canvas'); c.width=2; c.height=2;
  const x=c.getContext('2d');
  x.fillStyle='#ff0000'; x.fillRect(0,0,1,1);   // top-left
  x.fillStyle='#00ff00'; x.fillRect(1,0,1,1);   // top-right
  x.fillStyle='#0000ff'; x.fillRect(0,1,1,1);   // bottom-left
  x.fillStyle='#ffff00'; x.fillRect(1,1,1,1);   // bottom-right
  const t=new THREE.CanvasTexture(c); t.magFilter=THREE.NearestFilter; t.minFilter=THREE.NearestFilter; t.needsUpdate=true; return t;
}
function checkerTex(THREE,n=8,a='#dd5522',b='#2266cc'){
  const S=256, c=document.createElement('canvas'); c.width=S; c.height=S; const x=c.getContext('2d');
  const t=S/n; for(let j=0;j<n;j++)for(let i=0;i<n;i++){x.fillStyle=((i+j)&1)?a:b; x.fillRect(i*t,j*t,t,t);}
  const tex=new THREE.CanvasTexture(c); tex.colorSpace=THREE.SRGBColorSpace; tex.needsUpdate=true; return tex;
}
function domeNormalTex(THREE,n=4){ // n×n grid of raised domes (OpenGL tangent normals)
  const S=256, c=document.createElement('canvas'); c.width=S; c.height=S; const x=c.getContext('2d');
  const id=x.createImageData(S,S), d=id.data, t=S/n;
  for(let py=0;py<S;py++)for(let px=0;px<S;px++){
    const lx=((px%t)/t)*2-1, ly=((py%t)/t)*2-1, r2=lx*lx+ly*ly;
    let nx=0,ny=0,nz=1; if(r2<1){nx=lx; ny=ly; nz=Math.sqrt(1-r2);}
    const o=(py*S+px)*4; d[o]=(nx*0.5+0.5)*255; d[o+1]=(ny*0.5+0.5)*255; d[o+2]=(nz*0.5+0.5)*255; d[o+3]=255;
  }
  x.putImageData(id,0,0);
  const tex=new THREE.CanvasTexture(c); tex.colorSpace=THREE.NoColorSpace; tex.needsUpdate=true; return tex;
}

(async()=>{
 const THREE=await import('three'); const{createSpectralTracer}=await import('./js/spectral_tracer.js');
 const canvas=document.getElementById('c'); const renderer=new THREE.WebGPURenderer({canvas});
 renderer.setPixelRatio(1); renderer.setSize(innerWidth,innerHeight,false);
 await renderer.init(); renderer.toneMappingExposure=1.0;
 const scene=new THREE.Scene(); const cam=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,100);
 const blackEnv=new THREE.DataTexture(new Uint8Array([0,0,0,255]),1,1); blackEnv.mapping=THREE.EquirectangularReflectionMapping; blackEnv.needsUpdate=true;
 scene.environment=blackEnv;

 if (MODE==='redgreen') {
   cam.position.set(0,1.2,6); cam.lookAt(0,1,0);
   const red=new THREE.Mesh(new THREE.SphereGeometry(1,64,48), new THREE.MeshStandardMaterial({color:0xff0000,roughness:0.55,metalness:0}));
   red.position.set(0,1,0); scene.add(red);
   const floor=new THREE.Mesh(new THREE.PlaneGeometry(40,40), new THREE.MeshStandardMaterial({color:0x111111,roughness:1})); floor.rotation.x=-Math.PI/2; scene.add(floor);
   scene.add(new THREE.PointLight(0x00ff00,70,0,2).translateY(4));
   const key=new THREE.DirectionalLight(0x00ff00,2.2); key.position.set(3,6,4); key.target.position.set(0,1,0); scene.add(key,key.target);
 } else if (MODE==='texorient') {
   // Emissive-textured quad facing the camera; PT shows the texture unlit, so PT
   // and three's own raster must put the same colour in each screen quadrant.
   cam.position.set(0,0,2.6); cam.lookAt(0,0,0);
   const m=new THREE.MeshStandardMaterial({color:0x000000, emissive:0xffffff, emissiveMap:quadTex(THREE), emissiveIntensity:1, roughness:1});
   scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), m));
 } else if (MODE==='texlit') {
   cam.position.set(0,0,4); cam.lookAt(0,0,0);
   const m=new THREE.MeshStandardMaterial({map:checkerTex(THREE,8), roughness:0.6, metalness:0});
   scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.2,64,48), m));
   const d=new THREE.DirectionalLight(0xffffff,3.0); d.position.set(4,5,6); scene.add(d,d.target);
   scene.add(new THREE.PointLight(0xffffff,40,0,2).translateZ(3).translateY(2));
 } else if (MODE==='normaltest') {
   cam.position.set(0,0,3.2); cam.lookAt(0,0,0);
   const m=new THREE.MeshStandardMaterial({color:0xcccccc, normalMap:domeNormalTex(THREE,4), roughness:0.5, metalness:0});
   m.normalScale=new THREE.Vector2(1,1);
   scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2.4,2.4,1,1), m));
   const d=new THREE.DirectionalLight(0xffffff,3.2); d.position.set(-4,1.5,3); d.target.position.set(0,0,0); scene.add(d,d.target);
 } else if (MODE==='allmaps') {
   // all five map types on one material → exercises the full binding set
   // (env + 3 LUT Data3DTextures + 5 DataArrayTextures) in one kernel compile.
   cam.position.set(0,0,4); cam.lookAt(0,0,0);
   const rough=checkerTex(THREE,4,'#ffffff','#202020'); rough.colorSpace=THREE.NoColorSpace;
   const metal=checkerTex(THREE,4,'#ffffff','#000000'); metal.colorSpace=THREE.NoColorSpace;
   const m=new THREE.MeshStandardMaterial({
     map:checkerTex(THREE,8), roughnessMap:rough, metalnessMap:metal,
     emissiveMap:domeNormalTex(THREE,8), emissive:0x222200, emissiveIntensity:1,
     normalMap:domeNormalTex(THREE,6), roughness:1, metalness:1,
   });
   m.normalScale=new THREE.Vector2(1,1);
   scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.2,64,48), m));
   const d=new THREE.DirectionalLight(0xffffff,3.0); d.position.set(4,5,6); scene.add(d,d.target);
   scene.add(new THREE.PointLight(0xffffff,40,0,2).translateZ(3).translateY(2));
 } else { // 'scene' — saturated spheres under white light
   cam.position.set(0,1.6,7); cam.lookAt(0,0.8,0);
   const floor=new THREE.Mesh(new THREE.PlaneGeometry(40,40), new THREE.MeshStandardMaterial({color:0xbbbbbb,roughness:0.9})); floor.rotation.x=-Math.PI/2; scene.add(floor);
   [0xff2020,0x20ff20,0x2020ff,0xffff20,0xff20ff,0x20ffff].forEach((c,i)=>{const s=new THREE.Mesh(new THREE.SphereGeometry(0.6,48,32), new THREE.MeshStandardMaterial({color:c,roughness:0.4,metalness:0})); s.position.set((i-2.5)*1.3,0.6,0); scene.add(s);});
   const dir=new THREE.DirectionalLight(0xffffff,2.5); dir.position.set(4,8,5); scene.add(dir,dir.target);
   scene.add(new THREE.PointLight(0xffffff,30,0,2).translateY(5).translateZ(3));
 }
 cam.updateMatrixWorld(true); scene.updateMatrixWorld(true);

 // sample the 4 screen quadrant centres from a pixel buffer
 const W=canvas.width, H=canvas.height;
 function quad(buf){
   const at=(fx,fy)=>{const px=Math.floor(W*fx),py=Math.floor(H*fy),i=(py*W+px)*4;return [buf[i],buf[i+1],buf[i+2]];};
   return { TL:at(0.3,0.3), TR:at(0.7,0.3), BL:at(0.3,0.7), BR:at(0.7,0.7) };
 }
 async function grabRaster(){
   const rt=new THREE.RenderTarget(W,H); renderer.setRenderTarget(rt); renderer.render(scene,cam); renderer.setRenderTarget(null);
   const b=await renderer.readRenderTargetPixelsAsync(rt,0,0,W,H); rt.dispose(); return b;
 }

 if (RASTER) { renderer.render(scene,cam); window.__DONE={mode:MODE,raster:true,log}; return; }

 // path-traced render
 const t=createSpectralTracer({renderer,scene,camera:cam,enabled:true,settings:{samplesPerFrame:8,giClamp:8},onError:e=>log.push('tracer:'+e)});
 t.start();
 let n=0; (function f(){ t.render(); n++; if(n<320) requestAnimationFrame(f); else done(); })();

 async function done(){
   let measure=null, rasterRef=null;
   try {
     const rtb=new THREE.RenderTarget(W,H); renderer.setRenderTarget(rtb); t.render(); renderer.setRenderTarget(null);
     const buf=await renderer.readRenderTargetPixelsAsync(rtb,0,0,W,H); rtb.dispose();
     let nlit=0,R=0,G=0,B=0,peak=0;
     for(let i=0;i<buf.length;i+=4){const r=buf[i],g=buf[i+1],b=buf[i+2],l=r+g+b; if(l<40)continue; R+=r;G+=g;B+=b;nlit++; if(l>peak)peak=l;}
     // FNV-1a over the full readback buffer — a deterministic pixel fingerprint
     // for the traverse-extraction A/B gate (#2). Equivalent code → equal hash.
     let h=0x811c9dc5>>>0; for(let i=0;i<buf.length;i++){ h^=buf[i]; h=Math.imul(h,0x01000193)>>>0; }
     measure={ meanRGB: nlit?[Math.round(R/nlit),Math.round(G/nlit),Math.round(B/nlit)]:[0,0,0], litPixels:nlit, peakLum:peak, ptQuad: quad(buf), pixelHash: h>>>0 };
     if (MODE==='texorient') { const rb=await grabRaster(); rasterRef={ rasterQuad: quad(rb) }; }
   } catch(e){ log.push('measure:'+e); }
   window.__DONE={ mode:MODE, spp:t.getSampleCount(), log, measure, rasterRef };
 }
})();
</script></body></html>
