<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MaxJS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #353535; position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; }
        #splatLayer {
            position: absolute;
            inset: 0;
            z-index: 5;
            pointer-events: none;
        }
        #splatLayer canvas {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        #hud {
            position: absolute; top: 8px; left: 8px;
            color: rgba(180, 180, 180, 0.8);
            font: 10px/1.4 'Segoe UI', system-ui, sans-serif;
            pointer-events: none;
            z-index: 20;
        }
        #info {
            background: rgba(20, 20, 20, 0.55);
            padding: 4px 8px;
            border-radius: 6px;
            margin-bottom: 5px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(16px);
        }
        #controls {
            pointer-events: auto;
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            max-width: min(880px, calc(100vw - 32px));
        }
        #controls button {
            background: rgba(255, 255, 255, 0.06);
            color: #999;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 3px 9px;
            border-radius: 5px;
            font: 10px/1 'Segoe UI', system-ui, sans-serif;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            cursor: pointer;
            backdrop-filter: blur(12px);
            transition: all 0.15s ease;
        }
        #controls button.active {
            background: rgba(64, 200, 176, 0.1);
            color: #40c8b0;
            border-color: rgba(64, 200, 176, 0.35);
        }
        #controls button:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ccc;
        }
        /* ── Side Panel ─────────────────────────────── */
        .sidepanel-resize {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 5px;
            cursor: ew-resize;
            z-index: 2;
            border-radius: 10px 0 0 10px;
            transition: background 0.15s ease;
        }
        .sidepanel-resize:hover,
        .sidepanel-resize.active {
            background: rgba(64, 200, 176, 0.25);
        }
        .sidepanel {
            position: absolute;
            top: 8px;
            right: 8px;
            width: min(280px, calc(100vw - 16px));
            min-width: 200px;
            max-width: calc(100vw - 16px);
            max-height: calc(100vh - 16px);
            padding: 8px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(30, 30, 30, 0.72);
            color: #bbb;
            font: 11px/1.4 'Segoe UI', system-ui, sans-serif;
            backdrop-filter: blur(28px) saturate(1.4);
            -webkit-backdrop-filter: blur(28px) saturate(1.4);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.06),
                inset 0 -1px 0 rgba(0, 0, 0, 0.2);
            overflow-y: auto;
            overflow-x: hidden;
            opacity: 0;
            pointer-events: none;
            transform: translateX(14px) scale(0.98);
            transition: opacity 0.2s ease, transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 30;
            scrollbar-width: thin;
            scrollbar-color: rgba(120,120,120,0.2) transparent;
        }
        .sidepanel::-webkit-scrollbar { width: 4px; }
        .sidepanel::-webkit-scrollbar-track { background: transparent; }
        .sidepanel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
        .sidepanel.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(0) scale(1);
        }
        .sidepanel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 6px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .sidepanel-title {
            font-size: 12px;
            font-weight: 700;
            color: #ddd;
        }
        .sidepanel-subtitle {
            color: #888;
            font-size: 10px;
        }
        .sidepanel button,
        .fx-toggle {
            background: rgba(255, 255, 255, 0.06);
            color: #aaa;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 5px;
            padding: 3px 7px;
            font: 10px/1 'Segoe UI', system-ui, sans-serif;
            font-weight: 600;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.15s ease;
            white-space: nowrap;
            backdrop-filter: blur(4px);
        }
        .sidepanel button:hover,
        .fx-toggle:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ccc;
        }
        .fx-toggle.active {
            background: rgba(64, 200, 176, 0.12);
            border-color: rgba(64, 200, 176, 0.5);
            color: #40c8b0;
            box-shadow: 0 0 8px rgba(64, 200, 176, 0.1);
        }
        .sidepanel button:disabled,
        .fx-toggle:disabled,
        .sidepanel input:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }
        .sidepanel-body {
            display: grid;
            gap: 4px;
        }
        /* ── FX Sections ───────────────────────────── */
        .fx-section {
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 7px;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px;
            transition: background 0.15s ease, border-color 0.15s ease;
        }
        .fx-section:hover {
            background: rgba(255, 255, 255, 0.045);
            border-color: rgba(255, 255, 255, 0.08);
        }
        .fx-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }
        .fx-section-title {
            font-size: 10px;
            font-weight: 700;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .fx-section-copy {
            display: none;
        }
        .fx-grid {
            display: grid;
            gap: 3px;
            margin-top: 5px;
        }
        .fx-control {
            display: grid;
            gap: 1px;
        }
        .fx-control-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
            font-size: 10px;
            color: #999;
        }
        .fx-check {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
            font-size: 10px;
            color: #999;
        }
        .fx-value {
            color: #ddd;
            font-size: 10px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }
        /* ── Custom Range Slider ───────────────────── */
        .fx-range {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 3px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            cursor: pointer;
        }
        .fx-range::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #40c8b0;
            border: 1px solid #2a9a85;
            box-shadow: 0 0 4px rgba(60, 200, 175, 0.3);
            cursor: pointer;
            transition: box-shadow 0.12s ease, transform 0.1s ease;
        }
        .fx-range::-webkit-slider-thumb:hover {
            transform: scale(1.25);
            box-shadow: 0 0 8px rgba(60, 200, 175, 0.5);
        }
        .fx-range::-webkit-slider-thumb:active {
            transform: scale(1.1);
            background: #50d8c0;
        }
        .fx-range::-moz-range-thumb {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #40c8b0;
            border: 1px solid #2a9a85;
            box-shadow: 0 0 4px rgba(60, 200, 175, 0.3);
            cursor: pointer;
        }
        .fx-range::-moz-range-track {
            height: 3px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.1);
        }
        /* ── Custom Checkbox (toggle switch) ────────── */
        .fx-check input[type="checkbox"] {
            -webkit-appearance: none;
            appearance: none;
            width: 26px;
            height: 13px;
            border-radius: 7px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
            transition: background 0.15s ease, border-color 0.15s ease;
        }
        .fx-check input[type="checkbox"]::after {
            content: '';
            position: absolute;
            top: 1px;
            left: 1px;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transition: transform 0.15s cubic-bezier(0.16, 1, 0.3, 1), background 0.15s ease;
        }
        .fx-check input[type="checkbox"]:checked {
            background: rgba(64, 200, 176, 0.15);
            border-color: rgba(64, 200, 176, 0.4);
        }
        .fx-check input[type="checkbox"]:checked::after {
            transform: translateX(13px);
            background: #40c8b0;
            box-shadow: 0 0 4px rgba(64, 200, 176, 0.4);
        }
        .fx-note {
            margin-top: 3px;
            min-height: 0;
            color: #777;
            font-size: 9px;
            line-height: 1.3;
        }
        .fx-note:empty { display: none; }
        .fx-note.error {
            color: #e88;
        }
        .fx-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .fx-row-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-width: 48px;
            font-size: 10px;
            color: #999;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div id="info">MaxJS Live — hot reload works!</div>
        <div id="controls">
            <button id="btnKill">Kill</button>
            <button id="btnRefresh">Refresh</button>
            <button id="btnCamLock" class="active">Cam Lock: ON</button>
            <button id="btnEnv">Env: OFF</button>
            <button id="btnLightProbe" class="active">Probe: ON</button>
            <button id="btnPostFxPanel">Post FX</button>
        </div>
    </div>
    <aside id="postPanel" class="sidepanel" aria-hidden="true" inert></aside>
    <div id="splatLayer" aria-hidden="true"></div>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.webgpu.js",
            "three-std": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js",
            "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.webgpu.js",
            "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.tsl.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/",
            "gaussian-splats-3d": "https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.7/build/gaussian-splats-3d.module.js"
        },
        "scopes": {
            "https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.7/": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js"
            }
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import * as THREE_STD from 'three-std';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { HDRLoader } from 'three/addons/loaders/HDRLoader.js';
        import { EXRLoader } from 'three/addons/loaders/EXRLoader.js';
        import { LightProbeGenerator } from 'three/addons/lights/LightProbeGenerator.js';
        import { RectAreaLightTexturesLib } from 'three/addons/lights/RectAreaLightTexturesLib.js';
        import { hashBlur } from 'three/addons/tsl/display/hashBlur.js';
        import { XRButton } from 'three/addons/webxr/XRButton.js';
        import { SkyMesh } from 'three/addons/objects/SkyMesh.js';
        import * as GaussianSplats3D from 'gaussian-splats-3d';
        import {
            color as tslColor,
            float as tslFloat,
            linearDepth,
            screenUV,
            texture as tslTexture,
            viewportLinearDepth,
            viewportSharedTexture,
        } from 'three/tsl';
        import { applyDeltaFrame } from './js/protocol.js';
        import { createPerfHud } from './js/perf_hud.js';
        import { createSSGIController } from './js/ssgi_fx.js';

        // ── Scene Setup (Z-up, matching Max) ────────────────
        const hiddenBackgroundColor = 0x353535;
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(hiddenBackgroundColor);

        const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 100000);
        camera.up.set(0, 0, 1);  // Z-up to match Max
        camera.position.set(200, -200, 150);

        function configureRenderer(nextRenderer) {
            nextRenderer.setSize(innerWidth, innerHeight);
            nextRenderer.setPixelRatio(devicePixelRatio);
            nextRenderer.toneMapping = THREE.ACESFilmicToneMapping;
            nextRenderer.toneMappingExposure = 1.2;
            nextRenderer.shadowMap.enabled = true;
            nextRenderer.domElement.style.position = 'absolute';
            nextRenderer.domElement.style.inset = '0';
            nextRenderer.domElement.style.zIndex = '0';
            document.body.appendChild(nextRenderer.domElement);
        }

        async function createRenderer() {
            // Check if VR mode was requested (forces WebGL for XR compat)
            const forceVR = sessionStorage.getItem('maxjs_force_webgl') === '1';
            if (forceVR) sessionStorage.removeItem('maxjs_force_webgl');

            let nextRenderer;
            let backendLabel;

            if (forceVR) {
                nextRenderer = new THREE.WebGPURenderer({ antialias: true, alpha: true, forceWebGL: true });
                backendLabel = 'WebGL2 (VR)';
                configureRenderer(nextRenderer);
                await nextRenderer.init();
            } else {
                nextRenderer = new THREE.WebGPURenderer({ antialias: true, alpha: true });
                backendLabel = 'WebGPU';
                try {
                    configureRenderer(nextRenderer);
                    await nextRenderer.init();
                } catch (error) {
                    console.warn('MaxJS WebGPU init failed, retrying with forced WebGL2 backend.', error);
                    nextRenderer.domElement.remove();
                    nextRenderer.dispose?.();
                    nextRenderer = new THREE.WebGPURenderer({ antialias: true, alpha: true, forceWebGL: true });
                    backendLabel = 'WebGL2 fallback';
                    configureRenderer(nextRenderer);
                    await nextRenderer.init();
                }
            }

            return { renderer: nextRenderer, backendLabel };
        }

        let renderer = null;
        let rendererBackendLabel = 'WebGPU';
        try {
            ({ renderer, backendLabel: rendererBackendLabel } = await createRenderer());
        } catch (error) {
            const message = error?.message || String(error);
            document.getElementById('info').textContent = `MaxJS - renderer init failed: ${message}`;
            throw error;
        }

        if (THREE.RectAreaLightNode?.setLTC) {
            THREE.RectAreaLightNode.setLTC(RectAreaLightTexturesLib.init());
        }

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.enabled = false;  // cam lock ON by default

        // Grid on XY plane (Z-up)
        const grid = new THREE.GridHelper(200, 20, 0x555555, 0x444444);
        grid.rotation.x = Math.PI / 2;  // Rotate to XY plane for Z-up
        scene.add(grid);

        // Lights (fallback, hidden when HDRI loads)
        // Default lighting — neutral, camera-aligned
        const defaultLights = new THREE.Group();
        defaultLights.add(new THREE.AmbientLight(0xffffff, 0.4));
        const defaultKey = new THREE.DirectionalLight(0xffffff, 2.5);
        defaultKey.castShadow = true;
        defaultKey.shadow.mapSize.set(2048, 2048);
        defaultKey.shadow.camera.near = 0.1;
        defaultKey.shadow.camera.far = 2000;
        defaultKey.shadow.camera.left = -500;
        defaultKey.shadow.camera.right = 500;
        defaultKey.shadow.camera.top = 500;
        defaultKey.shadow.camera.bottom = -500;
        defaultKey.shadow.bias = -0.001;
        defaultKey.shadow.normalBias = 0.02;
        const defaultFill = new THREE.DirectionalLight(0xe8e8e8, 0.8);
        defaultFill.position.set(-1, 1, 0.5);
        defaultLights.add(defaultKey);
        defaultLights.add(defaultFill);
        scene.add(defaultLights);
        const lightProbe = new THREE.LightProbe();
        scene.add(lightProbe);

        // ── Loaders & Caches ────────────────────────────────
        const textureLoader = new THREE.TextureLoader();
        const rgbeLoader = new HDRLoader();
        const exrLoader = new EXRLoader();
        textureLoader.setCrossOrigin?.('anonymous');
        rgbeLoader.setCrossOrigin?.('anonymous');
        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        pmremGenerator.compileEquirectangularShader();

        const textureCache = new Map();
        const materialCache = new Map();
        const nodeMap = new Map();
        const splatLayer = document.getElementById('splatLayer');
        const splatHandleMap = new Map();
        const splatMatrix = new THREE_STD.Matrix4();
        const splatPosition = new THREE_STD.Vector3();
        const splatQuaternion = new THREE_STD.Quaternion();
        const splatScale = new THREE_STD.Vector3();
        let splatOverlay = null;
        let splatMutationQueue = Promise.resolve();
        const perfHud = createPerfHud(document.getElementById('info'));
        perfHud.setStatus(`MaxJS - ${rendererBackendLabel} renderer ready`);
        const ssgiFx = createSSGIController({
            renderer,
            scene,
            camera,
            backendLabel: rendererBackendLabel,
            environmentVisible: false,
            hiddenBackgroundColor,
            onError(message) {
                perfHud.setStatus(`MaxJS - ${message}`);
            },
        });
        // Default camera light available for contact shadows from the start
        if (ssgiFx.setMainLight) ssgiFx.setMainLight(defaultKey);

        function queueSplatMutation(work) {
            splatMutationQueue = splatMutationQueue
                .then(() => work())
                .catch(error => {
                    reportBridgeError('splat sync error', error);
                });
            return splatMutationQueue;
        }

        function syncSplatLayerVisibility() {
            const visible = splatHandleMap.size > 0;
            splatLayer.style.display = visible ? 'block' : 'none';
            if (splatOverlay?.renderer?.domElement) {
                splatOverlay.renderer.domElement.style.display = visible ? 'block' : 'none';
            }
        }

        function ensureSplatOverlay() {
            if (splatOverlay) return splatOverlay;

            const overlayRenderer = new THREE_STD.WebGLRenderer({
                antialias: true,
                alpha: true,
                premultipliedAlpha: true,
            });
            overlayRenderer.setPixelRatio(devicePixelRatio);
            overlayRenderer.setSize(innerWidth, innerHeight, false);
            overlayRenderer.setClearColor(0x000000, 0);
            overlayRenderer.domElement.style.position = 'absolute';
            overlayRenderer.domElement.style.inset = '0';
            overlayRenderer.domElement.style.pointerEvents = 'none';
            overlayRenderer.domElement.style.zIndex = '5';
            overlayRenderer.outputColorSpace = THREE_STD.SRGBColorSpace;
            splatLayer.appendChild(overlayRenderer.domElement);

            const overlayCamera = new THREE_STD.PerspectiveCamera(camera.fov, camera.aspect, camera.near, camera.far);
            overlayCamera.up.set(0, 0, 1);

            const viewer = new GaussianSplats3D.Viewer({
                selfDrivenMode: false,
                renderer: overlayRenderer,
                camera: overlayCamera,
                rootElement: splatLayer,
                useBuiltInControls: false,
                renderMode: GaussianSplats3D.RenderMode.Always,
                dynamicScene: true,
                gpuAcceleratedSort: false,
                sharedMemoryForWorkers: false,
                integerBasedSort: false,
                sceneRevealMode: GaussianSplats3D.SceneRevealMode.Instant,
                logLevel: GaussianSplats3D.LogLevel.Warn,
            });

            splatOverlay = {
                renderer: overlayRenderer,
                camera: overlayCamera,
                viewer,
            };
            syncSplatLayerVisibility();
            return splatOverlay;
        }

        function updateSplatViewerTransforms() {
            splatOverlay?.viewer?.getSplatMesh?.()?.updateTransforms?.();
            splatOverlay?.viewer?.forceRenderNextFrame?.();
        }

        function updateSplatCamera() {
            if (!splatOverlay) return;

            const overlayCamera = splatOverlay.camera;
            overlayCamera.position.set(camera.position.x, camera.position.y, camera.position.z);
            overlayCamera.quaternion.set(camera.quaternion.x, camera.quaternion.y, camera.quaternion.z, camera.quaternion.w);
            overlayCamera.scale.set(camera.scale.x, camera.scale.y, camera.scale.z);
            overlayCamera.up.set(camera.up.x, camera.up.y, camera.up.z);
            overlayCamera.near = Math.max(camera.near, 0.01);
            overlayCamera.far = Math.max(camera.far, overlayCamera.near + 1.0);
            overlayCamera.aspect = camera.aspect;
            overlayCamera.fov = camera.fov;
            overlayCamera.updateProjectionMatrix();
            overlayCamera.updateMatrixWorld(true);
        }

        function applySplatTransform(sceneRef, splat) {
            if (!sceneRef) return;

            if (isFiniteArray(splat?.t, 16)) {
                splatMatrix.fromArray(splat.t);
                splatMatrix.decompose(splatPosition, splatQuaternion, splatScale);
                sceneRef.position.copy(splatPosition);
                sceneRef.quaternion.copy(splatQuaternion);
                sceneRef.scale.copy(splatScale);
            } else {
                sceneRef.position.set(0, 0, 0);
                sceneRef.quaternion.identity();
                sceneRef.scale.set(1, 1, 1);
            }

            sceneRef.visible = splat?.v == null ? true : !!splat.v;
            sceneRef.updateMatrixWorld(true);
            updateSplatViewerTransforms();
        }

        function findSplatSceneIndex(sceneRef) {
            const viewer = splatOverlay?.viewer;
            if (!viewer || !sceneRef) return -1;

            const sceneCount = viewer.getSceneCount();
            for (let i = 0; i < sceneCount; i++) {
                if (viewer.getSplatScene(i) === sceneRef) return i;
            }
            return -1;
        }

        async function removeTrackedSplat(handle) {
            const entry = splatHandleMap.get(handle);
            if (!entry) return;

            splatHandleMap.delete(handle);

            if (splatOverlay) {
                const index = findSplatSceneIndex(entry.scene);
                if (index >= 0) {
                    await splatOverlay.viewer.removeSplatScene(index, false);
                }
            }

            syncSplatLayerVisibility();
        }

        async function upsertTrackedSplat(splat) {
            const handle = splat?.h;
            if (handle == null) return;

            const url = typeof splat.url === 'string' ? splat.url : '';
            if (!url) {
                await removeTrackedSplat(handle);
                return;
            }

            const overlay = ensureSplatOverlay();
            const existing = splatHandleMap.get(handle);

            if (existing && existing.url === url) {
                applySplatTransform(existing.scene, splat);
                syncSplatLayerVisibility();
                return;
            }

            if (existing) {
                await removeTrackedSplat(handle);
            }

            const lowerUrl = url.toLowerCase();
            let format;
            if (lowerUrl.endsWith('.ply')) format = GaussianSplats3D.SceneFormat.Ply;
            else if (lowerUrl.endsWith('.splat')) format = GaussianSplats3D.SceneFormat.Splat;
            else if (lowerUrl.endsWith('.ksplat')) format = GaussianSplats3D.SceneFormat.KSplat;

            await overlay.viewer.addSplatScene(url, {
                format,
                showLoadingUI: true,
                splatAlphaRemovalThreshold: 1,
                position: [0, 0, 0],
                rotation: [0, 0, 0, 1],
                scale: [1, 1, 1],
                onProgress(percent, label, stage) {
                    const stageLabel = stage?.toString?.() ?? 'Loading';
                    perfHud.setStatus(`MaxJS - Splat ${stageLabel} ${label ?? `${percent ?? 0}%`}`);
                },
            });

            const sceneRef = overlay.viewer.getSplatScene(overlay.viewer.getSceneCount() - 1);
            if (!sceneRef) return;

            sceneRef.name = splat.n || `Splat ${handle}`;
            splatHandleMap.set(handle, { url, scene: sceneRef });
            applySplatTransform(sceneRef, splat);
            perfHud.setStatus(`MaxJS - Splat ready: ${sceneRef.name}`);
            syncSplatLayerVisibility();
        }

        function reconcileSplats(splats = []) {
            return queueSplatMutation(async () => {
                const incomingHandles = new Set(splats.map(splat => splat.h));
                const staleHandles = [];

                for (const handle of splatHandleMap.keys()) {
                    if (!incomingHandles.has(handle)) staleHandles.push(handle);
                }

                for (const handle of staleHandles) {
                    await removeTrackedSplat(handle);
                }

                for (const splat of splats) {
                    await upsertTrackedSplat(splat);
                }
            });
        }

        function applySplatUpdates(splats = []) {
            if (!splats.length) return;

            return queueSplatMutation(async () => {
                for (const splat of splats) {
                    await upsertTrackedSplat(splat);
                }
            });
        }
        function createSolidTexture(r, g, b, a = 255) {
            const tex = new THREE.DataTexture(new Uint8Array([r, g, b, a]), 1, 1);
            tex.colorSpace = THREE.NoColorSpace;
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            tex.minFilter = tex.magFilter = THREE.LinearFilter;
            tex.needsUpdate = true;
            tex.updateMatrix();
            return tex;
        }

        function createSteppedGradientTexture(values) {
            const data = new Uint8Array(values.length * 4);
            for (let i = 0; i < values.length; i++) {
                const value = values[i];
                const offset = i * 4;
                data[offset + 0] = value;
                data[offset + 1] = value;
                data[offset + 2] = value;
                data[offset + 3] = 255;
            }
            const tex = new THREE.DataTexture(data, values.length, 1);
            tex.colorSpace = THREE.NoColorSpace;
            tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
            tex.minFilter = tex.magFilter = THREE.NearestFilter;
            tex.generateMipmaps = false;
            tex.needsUpdate = true;
            tex.updateMatrix();
            return tex;
        }

        const fallbackWhiteTexture = createSolidTexture(255, 255, 255, 255);
        const fallbackFlatNormalTexture = createSolidTexture(128, 128, 255, 255);
        const fallbackHeightTexture = createSolidTexture(255, 255, 255, 255);
        const fallbackToonGradientTexture = createSteppedGradientTexture([32, 96, 160, 255]);

        let firstSync = true;
        let camLock = true;
        let envVisible = false;
        let lightProbeEnabled = true;
        const lightProbeIntensity = 1.0;
        let currentHdriUrl = null;
        let currentHdriProbeSignature = '';
        let currentEnvParams = null;
        let hasLightProbeData = false;
        let hdriLoadGeneration = 0;

        // Local HDRI override (independent of Max environment)
        let localHdriObjectUrl = null;   // file loaded in memory
        let localHdriEnvMap = null;      // cached PMREM texture
        let localHdriEnabled = true;     // on/off toggle (file stays loaded)
        let localHdriFileName = '';
        let localHdriRotation = 0;
        let localHdriIntensity = 1.0;
        let localHdriShowBg = false;
        let localHdriBlur = 0;
        let localHdriFlip = false;

        function isLocalHdriLoaded() { return localHdriObjectUrl != null; }
        function isLocalHdriActive() { return isLocalHdriLoaded() && localHdriEnabled; }

        function applyLightProbeState() {
            lightProbe.intensity = lightProbeEnabled ? lightProbeIntensity : 0.0;
        }

        function clearLightProbe() {
            lightProbe.copy(new THREE.LightProbe());
            hasLightProbeData = false;
            applyLightProbeState();
        }

        async function updateLightProbeFromHDRI(hdrTex, probeSignature, loadGeneration) {
            const captureScene = new THREE.Scene();
            captureScene.background = hdrTex;
            captureScene.backgroundRotation.copy(scene.environmentRotation);

            const CubeRenderTargetCtor =
                typeof THREE.WebGLCubeRenderTarget === 'function'
                    ? THREE.WebGLCubeRenderTarget
                    : THREE_STD.WebGLCubeRenderTarget;
            const CubeCameraCtor =
                typeof THREE.CubeCamera === 'function'
                    ? THREE.CubeCamera
                    : THREE_STD.CubeCamera;

            if (typeof CubeRenderTargetCtor !== 'function' || typeof CubeCameraCtor !== 'function') {
                hasLightProbeData = false;
                console.warn('MaxJS light probe generation unavailable: missing cube capture constructors');
                return;
            }

            const cubeRenderTarget = new CubeRenderTargetCtor(128, {
                type: hdrTex.type ?? THREE.HalfFloatType,
                colorSpace: hdrTex.colorSpace ?? THREE.LinearSRGBColorSpace,
            });
            const cubeCamera = new CubeCameraCtor(0.1, 10, cubeRenderTarget);

            try {
                cubeCamera.update(renderer, captureScene);
                const nextProbe = await LightProbeGenerator.fromCubeRenderTarget(renderer, cubeRenderTarget);

                if (loadGeneration !== hdriLoadGeneration || probeSignature !== currentHdriProbeSignature) {
                    return;
                }

                lightProbe.copy(nextProbe);
                hasLightProbeData = true;
                applyLightProbeState();
            } catch (error) {
                hasLightProbeData = false;
                console.warn('MaxJS light probe generation failed:', error);
            } finally {
                cubeRenderTarget.dispose();
            }
        }

        function normalizeTextureTransform(xf) {
            if (!xf) return null;
            return {
                scale: Number.isFinite(xf.scale) && Math.abs(xf.scale) > 1e-6 ? xf.scale : 1.0,
                tiling: [
                    Number.isFinite(xf.tiling?.[0]) ? xf.tiling[0] : 1.0,
                    Number.isFinite(xf.tiling?.[1]) ? xf.tiling[1] : 1.0,
                ],
                offset: [
                    Number.isFinite(xf.offset?.[0]) ? xf.offset[0] : 0.0,
                    Number.isFinite(xf.offset?.[1]) ? xf.offset[1] : 0.0,
                ],
                rotate: Number.isFinite(xf.rotate) ? xf.rotate : 0.0,
                center: [
                    Number.isFinite(xf.center?.[0]) ? xf.center[0] : 0.5,
                    Number.isFinite(xf.center?.[1]) ? xf.center[1] : 0.5,
                ],
                realWorld: !!xf.realWorld,
                realWidth: Number.isFinite(xf.realWidth) && Math.abs(xf.realWidth) > 1e-6 ? xf.realWidth : 1.0,
                realHeight: Number.isFinite(xf.realHeight) && Math.abs(xf.realHeight) > 1e-6 ? xf.realHeight : 1.0,
                wrap: typeof xf.wrap === 'string' ? xf.wrap : 'periodic',
                channel: Number.isFinite(xf.channel) ? Math.max(1, Math.round(xf.channel)) : 1,
            };
        }

        function wrapModeToThree(mode) {
            switch ((mode || 'periodic').toLowerCase()) {
                case 'mirror': return THREE.MirroredRepeatWrapping;
                case 'clamp':
                case 'black': return THREE.ClampToEdgeWrapping;
                case 'default':
                case 'periodic':
                default: return THREE.RepeatWrapping;
            }
        }

        function applyTextureTransform(tex, xf) {
            const wrap = wrapModeToThree(xf?.wrap);
            tex.wrapS = tex.wrapT = wrap;

            if (!xf) return;

            const worldScaleU = xf.realWorld ? xf.realWidth : 1.0;
            const worldScaleV = xf.realWorld ? xf.realHeight : 1.0;
            const repeatU = xf.tiling[0] / worldScaleU / xf.scale;
            const repeatV = xf.tiling[1] / worldScaleV / xf.scale;

            tex.repeat.set(repeatU, repeatV);
            tex.offset.set(-xf.offset[0] * repeatU, -xf.offset[1] * repeatV);
            tex.center.set(xf.center[0], xf.center[1]);
            tex.rotation = THREE.MathUtils.degToRad(xf.rotate);
            tex.updateMatrix();
        }

        function applyFallbackImage(tex, fallbackTex, colorSpace, xf, url) {
            tex.image = fallbackTex.image;
            tex.colorSpace = colorSpace;
            applyTextureTransform(tex, xf);
            tex.needsUpdate = true;
            console.warn('MaxJS missing texture, using fallback:', url);
        }

        function configureGradientTexture(tex) {
            if (!tex) return null;
            tex.colorSpace = THREE.NoColorSpace;
            tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
            tex.minFilter = tex.magFilter = THREE.NearestFilter;
            tex.generateMipmaps = false;
            tex.needsUpdate = true;
            return tex;
        }

        function applyTextureChannelSelection(tex, xf) {
            const channel = xf?.channel ?? 1;
            if (channel <= 1) return;

            const image = tex?.image;
            const width = image?.width ?? image?.videoWidth ?? 0;
            const height = image?.height ?? image?.videoHeight ?? 0;
            if (!width || !height) return;

            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            if (!ctx) return;

            ctx.drawImage(image, 0, 0, width, height);
            const imageData = ctx.getImageData(0, 0, width, height);
            const { data } = imageData;

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                const a = data[i + 3];
                let value = r;

                switch (channel) {
                case 2:
                    value = r;
                    break;
                case 3:
                    value = g;
                    break;
                case 4:
                    value = b;
                    break;
                case 5:
                    value = a;
                    break;
                case 6:
                    value = Math.round((0.2126 * r) + (0.7152 * g) + (0.0722 * b));
                    break;
                case 7:
                    value = Math.round((r + g + b) / 3);
                    break;
                default:
                    value = r;
                    break;
                }

                data[i] = value;
                data[i + 1] = value;
                data[i + 2] = value;
                data[i + 3] = channel === 5 ? value : a;
            }

            ctx.putImageData(imageData, 0, 0);
            tex.image = canvas;
        }

        function loadTexture(url, colorSpace = THREE.LinearSRGBColorSpace, xf = null, fallbackTex = fallbackWhiteTexture) {
            if (!url) return null;
            const normalizedXf = normalizeTextureTransform(xf);
            const cacheKey = JSON.stringify([url, String(colorSpace), normalizedXf]);
            if (textureCache.has(cacheKey)) return textureCache.get(cacheKey);
            const tex = textureLoader.load(
                url,
                loadedTex => {
                    applyTextureChannelSelection(loadedTex, normalizedXf);
                    loadedTex.colorSpace = colorSpace;
                    applyTextureTransform(loadedTex, normalizedXf);
                    loadedTex.needsUpdate = true;
                },
                undefined,
                () => applyFallbackImage(tex, fallbackTex, colorSpace, normalizedXf, url)
            );
            tex.colorSpace = colorSpace;
            applyTextureTransform(tex, normalizedXf);
            textureCache.set(cacheKey, tex);
            return tex;
        }

        function refreshLightProbeFromCurrentHDRI() {
            if (!currentEnvParams?.hdri) return;
            loadHDRI(currentEnvParams, { forceProbeRefresh: true });
        }

        function loadHDRI(envParams, options = {}) {
            if (!envParams?.hdri) return;
            currentEnvParams = envParams;

            let hdriUrl = envParams.hdri;
            try {
                hdriUrl = new URL(envParams.hdri, window.location.href).href;
            } catch {
                hdriUrl = envParams.hdri;
            }

            // Exposure
            renderer.toneMappingExposure = Math.pow(2, envParams.exp || 0) * (envParams.gamma || 1.0);

            // Autodesk HDRIenv:
            //   u = rot + atan2( x, y )
            //   v sample = 1 - ( 0.5 + asin( z ) / PI )
            // Three.js equirect:
            //   u = atan2( z, x )
            //   v = 0.5 + asin( y ) / PI
            // So the lookup direction remap is:
            //   (x, y, z)_three = ( y, -z, x )_max
            // with Autodesk rotation applied around Max's Z axis before the basis remap.
            const rot = (envParams.rot || 0) * Math.PI / 180;
            const envBasis = new THREE.Matrix4().makeBasis(
                new THREE.Vector3(0, 0, 1),
                new THREE.Vector3(1, 0, 0),
                new THREE.Vector3(0, -1, 0)
            );
            const envYaw = new THREE.Matrix4().makeRotationZ(-rot);
            const envRotation = new THREE.Matrix4().multiplyMatrices(envBasis, envYaw);
            scene.environmentRotation.setFromRotationMatrix(envRotation);
            scene.backgroundRotation.copy(scene.environmentRotation);
            const probeSignature = JSON.stringify([hdriUrl, envParams.rot || 0, envParams.flip || 0, envParams.zup || 0]);
            const shouldRefreshTexture = hdriUrl !== currentHdriUrl;
            const shouldRefreshProbe = !!options.forceProbeRefresh
                || probeSignature !== currentHdriProbeSignature
                || !hasLightProbeData;

            if (!shouldRefreshTexture && !shouldRefreshProbe) return;

            currentHdriUrl = hdriUrl;
            currentHdriProbeSignature = probeSignature;
            hdriLoadGeneration += 1;
            const loadGeneration = hdriLoadGeneration;

            rgbeLoader.load(hdriUrl, async (hdrTex) => {
                if (loadGeneration !== hdriLoadGeneration) {
                    hdrTex.dispose();
                    return;
                }
                hdrTex.mapping = THREE.EquirectangularReflectionMapping;
                const envMap = pmremGenerator.fromEquirectangular(hdrTex).texture;
                scene.environment = envMap;
                if (envVisible) scene.background = envMap;
                defaultLights.visible = false;
                if (lightProbeEnabled || shouldRefreshProbe) {
                    await updateLightProbeFromHDRI(hdrTex, probeSignature, loadGeneration);
                }
                hdrTex.dispose();
            }, undefined, (error) => {
                console.error('MaxJS HDRI load failed', { hdriUrl, error });
                currentHdriUrl = null;
                currentHdriProbeSignature = null;
                currentEnvParams = null;
                scene.environment = null;
                clearLightProbe();
                if (envVisible) scene.background = new THREE.Color(hiddenBackgroundColor);
                defaultLights.visible = true;
            });
        }

        // ── Local HDRI (independent of Max) ─────────────────
        function loadLocalHDRIFile(file) {
            if (localHdriObjectUrl) URL.revokeObjectURL(localHdriObjectUrl);
            if (localHdriEnvMap) { localHdriEnvMap.dispose(); localHdriEnvMap = null; }
            localHdriObjectUrl = URL.createObjectURL(file);
            localHdriFileName = file.name;
            localHdriEnabled = true;

            const isExr = file.name.toLowerCase().endsWith('.exr');
            const loader = isExr ? exrLoader : rgbeLoader;

            hdriLoadGeneration += 1;
            const loadGen = hdriLoadGeneration;

            loader.load(localHdriObjectUrl, async (hdrTex) => {
                if (loadGen !== hdriLoadGeneration) { hdrTex.dispose(); return; }
                hdrTex.mapping = THREE.EquirectangularReflectionMapping;
                localHdriEnvMap = pmremGenerator.fromEquirectangular(hdrTex).texture;
                applyLocalHDRIToScene();
                currentHdriUrl = localHdriObjectUrl;
                if (lightProbeEnabled) {
                    await updateLightProbeFromHDRI(hdrTex, 'local-' + localHdriFileName, loadGen);
                }
                hdrTex.dispose();
                savePostFxState();
                syncHdriPanel();
            }, undefined, (error) => {
                console.error('MaxJS local HDRI load failed', error);
                clearLocalHDRI();
            });
        }

        function applyLocalHDRIToScene() {
            if (!localHdriEnvMap) return;
            if (localHdriEnabled) {
                scene.environment = localHdriEnvMap;
                scene.environmentIntensity = localHdriIntensity;
                const rot = localHdriRotation * Math.PI / 180;
                const envBasis = new THREE.Matrix4().makeBasis(
                    new THREE.Vector3(0, 0, 1),
                    new THREE.Vector3(1, 0, 0),
                    new THREE.Vector3(0, -1, 0)
                );
                const envYaw = new THREE.Matrix4().makeRotationZ(-rot);
                const flipMat = localHdriFlip
                    ? new THREE.Matrix4().makeScale(1, 1, -1)
                    : new THREE.Matrix4();
                const envRotation = new THREE.Matrix4().multiplyMatrices(envBasis, envYaw).multiply(flipMat);
                scene.environmentRotation.setFromRotationMatrix(envRotation);
                scene.backgroundRotation.copy(scene.environmentRotation);
                scene.backgroundBlurriness = localHdriBlur;
                if (localHdriShowBg) {
                    scene.background = localHdriEnvMap;
                    scene.backgroundIntensity = localHdriIntensity;
                } else {
                    scene.background = new THREE.Color(hiddenBackgroundColor);
                }
                defaultLights.visible = false;
            } else {
                scene.environment = null;
                scene.background = new THREE.Color(hiddenBackgroundColor);
                defaultLights.visible = true;
            }
        }

        function applyLocalHDRISettings() {
            if (!isLocalHdriActive()) return;
            applyLocalHDRIToScene();
        }

        function toggleLocalHDRI(enabled) {
            localHdriEnabled = enabled;
            applyLocalHDRIToScene();
            savePostFxState();
            syncHdriPanel();
        }

        function clearLocalHDRI() {
            localHdriFileName = '';
            localHdriEnabled = true;
            if (localHdriEnvMap) { localHdriEnvMap.dispose(); localHdriEnvMap = null; }
            if (localHdriObjectUrl) { URL.revokeObjectURL(localHdriObjectUrl); localHdriObjectUrl = null; }
            currentHdriUrl = null;
            currentHdriProbeSignature = '';
            scene.environment = null;
            scene.environmentIntensity = 1.0;
            scene.environmentRotation.set(0, 0, 0);
            scene.backgroundRotation.set(0, 0, 0);
            scene.backgroundBlurriness = 0;
            scene.background = new THREE.Color(hiddenBackgroundColor);
            clearLightProbe();
            defaultLights.visible = true;
            savePostFxState();
            syncHdriPanel();
        }

        function syncHdriPanel() {
            const nameEl = document.getElementById('fx-hdri-name');
            const toggleEl = document.getElementById('fx-hdri-toggle');
            if (nameEl) {
                nameEl.textContent = isLocalHdriLoaded()
                    ? localHdriFileName + (localHdriEnabled ? '' : ' (off)')
                    : 'No HDRI loaded';
            }
            if (toggleEl) {
                toggleEl.textContent = localHdriEnabled ? 'On' : 'Off';
                toggleEl.classList.toggle('active', localHdriEnabled && isLocalHdriLoaded());
            }
        }

        // ── Sky Environment ──────────────────────────────────
        // Matches the official Three.js webgpu_sky example pattern:
        // SkyMesh added directly to scene, no PMREM (broken with TSL).
        // Lighting via DirectionalLight (sun) + HemisphereLight (sky fill).
        let skyMesh = null;
        let skySunLight = null;
        let skyFillLight = null;
        let lastSkySig = '';
        let skyActive = false;

        function applySky(skyParams) {
            if (!skyParams) return;

            const sig = JSON.stringify(skyParams);
            if (sig === lastSkySig) return;
            lastSkySig = sig;

            try {
                if (!skyMesh) {
                    skyMesh = new SkyMesh();
                    skyMesh.scale.setScalar(450000);
                    skyMesh.name = '__maxjs_sky__';
                    skyMesh.frustumCulled = false;
                }

                // Update sky uniforms — exact same pattern as official example
                skyMesh.turbidity.value = skyParams.turbidity;
                skyMesh.rayleigh.value = skyParams.rayleigh;
                skyMesh.mieCoefficient.value = skyParams.mieCoefficient;
                skyMesh.mieDirectionalG.value = skyParams.mieDirectionalG;

                // Tell SkyMesh shader that Z is up (matches Max/camera convention)
                skyMesh.upUniform.value.set(0, 0, 1);

                // Sun direction in Z-up: elevation from XY plane, azimuth around Z
                const elevRad = THREE.MathUtils.degToRad(skyParams.elevation);
                const azimRad = THREE.MathUtils.degToRad(skyParams.azimuth);
                const sunDir = new THREE.Vector3(
                    Math.cos(elevRad) * Math.sin(azimRad),
                    Math.cos(elevRad) * Math.cos(azimRad),
                    Math.sin(elevRad)
                );
                skyMesh.sunPosition.value.copy(sunDir);

                renderer.toneMappingExposure = skyParams.exposure;

                if (skyMesh.parent !== scene) scene.add(skyMesh);
                scene.background = null;
                scene.environment = null;
                scene.environmentRotation.identity();
                scene.backgroundRotation.identity();

                // Sun DirectionalLight along sun direction
                if (!skySunLight) {
                    skySunLight = new THREE.DirectionalLight(0xffffff, 2.0);
                    skySunLight.name = '__maxjs_sky_sun__';
                }
                if (skySunLight.parent !== scene) scene.add(skySunLight);
                const sunStrength = Math.max(0.1, Math.sin(elevRad));
                const warmth = 1.0 - sunStrength * 0.2;
                skySunLight.color.setRGB(1.0, warmth, warmth * 0.85);
                skySunLight.intensity = 1.0 + sunStrength * 3.0;
                skySunLight.position.copy(sunDir).multiplyScalar(200);

                // Sky fill HemisphereLight
                if (!skyFillLight) {
                    skyFillLight = new THREE.HemisphereLight(0x87CEEB, 0x362D1B, 1.0);
                    skyFillLight.name = '__maxjs_sky_fill__';
                }
                if (skyFillLight.parent !== scene) scene.add(skyFillLight);
                skyFillLight.intensity = 0.5 + sunStrength * 0.5;

                defaultLights.visible = false;
                skyActive = true;

                // Clear HDRI state
                currentHdriUrl = null;
                currentHdriProbeSignature = '';

            } catch (err) {
                console.error('[MaxJS] applySky error:', err);
            }
        }

        function removeSky() {
            lastSkySig = '';
            skyActive = false;
            if (skyMesh?.parent) skyMesh.parent.remove(skyMesh);
            if (skySunLight?.parent) skySunLight.parent.remove(skySunLight);
            if (skyFillLight?.parent) skyFillLight.parent.remove(skyFillLight);
        }

        // ── Material Creation ───────────────────────────────
        function rememberMaterialEmissiveBase(material) {
            if (!material?.emissive) return;
            material.userData ??= {};
            material.userData.maxjsBaseEmissive = [
                material.emissive.r,
                material.emissive.g,
                material.emissive.b,
            ];
            material.userData.maxjsBaseEmissiveIntensity = Number.isFinite(material.emissiveIntensity)
                ? material.emissiveIntensity
                : 1.0;
        }

        function applyMaterialSelectionState(material, selected) {
            // Selection is now handled by outline post-processing pass
            // Just restore base emissive
            if (!material?.emissive) return;
            const base = material.userData?.maxjsBaseEmissive || [0, 0, 0];
            const baseIntensity = Number.isFinite(material.userData?.maxjsBaseEmissiveIntensity)
                ? material.userData.maxjsBaseEmissiveIntensity
                : 1.0;
            material.emissive.setRGB(base[0], base[1], base[2]);
            material.emissiveIntensity = baseIntensity;
        }

        function applyMeshShadowState(mesh) {
            if (!mesh?.isMesh) return;
            mesh.castShadow = true;
            mesh.receiveShadow = true;
        }

        function applyNodeProps(mesh, props) {
            if (!mesh?.isMesh || !props) return;
            if (props.rend === 0) mesh.visible = false;
            mesh.castShadow = props.cshadow !== 0;
            mesh.receiveShadow = props.rshadow !== 0;
            const side = props.bcull ? THREE.FrontSide : THREE.DoubleSide;
            const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
            for (const m of mats) {
                if (m && m.side !== side) m.side = side;
                if (!m) continue;
                if (props.opacity != null && props.opacity < 0.999) {
                    m.transparent = true;
                    m.opacity = props.opacity;
                } else if (m.userData?._propsOpacity) {
                    m.transparent = false;
                    m.opacity = 1.0;
                }
                if (!m.userData) m.userData = {};
                m.userData._propsOpacity = props.opacity != null && props.opacity < 0.999;
            }
        }

        function applySSSMaterialNodes(material, md) {
            if (!material || typeof material !== 'object') return;

            const sssColor = Array.isArray(md.sssColor) && md.sssColor.length === 3
                ? new THREE.Color(md.sssColor[0], md.sssColor[1], md.sssColor[2])
                : new THREE.Color(1, 1, 1);
            let thicknessColorNode = tslColor(sssColor);

            if (md.sssMap) {
                const sssMap = loadTexture(md.sssMap, THREE.SRGBColorSpace, md.sssMapXf, fallbackWhiteTexture);
                thicknessColorNode = tslTexture(sssMap).rgb.mul(thicknessColorNode);
            }

            material.thicknessColorNode = thicknessColorNode;
            material.thicknessDistortionNode = tslFloat(md.sssDistortion ?? 0.1);
            material.thicknessAmbientNode = tslFloat(md.sssAmbient ?? 0.0);
            material.thicknessAttenuationNode = tslFloat(md.sssAttenuation ?? 0.1);
            material.thicknessPowerNode = tslFloat(md.sssPower ?? 2.0);
            material.thicknessScaleNode = tslFloat(md.sssScale ?? 10.0);
        }

        const utilityMaterialModels = new Set([
            'MeshDistanceMaterial',
            'MeshDepthMaterial',
            'MeshBackdropNodeMaterial',
            'MeshLambertMaterial',
            'MeshMatcapMaterial',
            'MeshNormalMaterial',
            'MeshPhongMaterial',
        ]);

        function createBackdropUtilityMaterial(md) {
            const material = new THREE.MeshBasicNodeMaterial();
            const opacity = Math.min(1.0, Math.max(0.0, md.opacity ?? 1.0));
            const tintStrength = Math.max(0.0, md.mapS ?? 1.0);
            const blurStrength = Math.max(0.0, md.rough ?? 0.5);
            const pixelGrid = Math.max(8.0, (1.0 - Math.min(1.0, blurStrength)) * 128.0);
            const backdropMode = md.backdropMode ?? 0;
            const depthDistance = viewportLinearDepth.distance(linearDepth());
            const depthAlphaNode = depthDistance.oneMinus().smoothstep(0.90, 2.0).mul(10.0).saturate();
            const blurAmountNode = depthDistance.smoothstep(0.0, 0.6).mul(blurStrength * 40.0).clamp().mul(0.1);

            let tintNode = tslColor(new THREE.Color(md.color[0], md.color[1], md.color[2])).mul(tslFloat(tintStrength));
            let colorMapNode = null;

            if (md.map) {
                const tintMap = loadTexture(md.map, THREE.SRGBColorSpace, md.mapXf, fallbackWhiteTexture);
                colorMapNode = tslTexture(tintMap);
                tintNode = colorMapNode.rgb.mul(tintNode);
            }

            let flatOpacityNode = tslFloat(opacity);
            if (md.opMap) {
                const alphaMap = loadTexture(md.opMap, THREE.LinearSRGBColorSpace, md.opMapXf, fallbackWhiteTexture);
                flatOpacityNode = flatOpacityNode.mul(tslTexture(alphaMap).r.mul(tslFloat(md.opMapS ?? 1.0)));
            }
            const depthOpacityNode = depthAlphaNode.mul(flatOpacityNode);

            switch (backdropMode) {
            case 1:
                material.backdropNode = depthAlphaNode;
                material.opacityNode = depthOpacityNode;
                break;
            case 2:
                material.backdropNode = colorMapNode ? colorMapNode.rgb.mul(tslFloat(tintStrength)) : hashBlur(viewportSharedTexture(), tslFloat(0.05));
                material.opacityNode = colorMapNode ? flatOpacityNode.mul(colorMapNode.a) : flatOpacityNode;
                break;
            case 3:
                material.backdropNode = viewportSharedTexture(screenUV.mul(pixelGrid).floor().div(pixelGrid));
                material.opacityNode = flatOpacityNode;
                break;
            case 0:
            default:
                // Frosted glass: depth-based blur + tint (matches webgpu_backdrop_area example)
                material.backdropNode = hashBlur(viewportSharedTexture(), blurAmountNode)
                    .add(depthAlphaNode.mix(tintNode.mul(0.3), 0));
                // No opacityNode — let backdropNode handle the compositing
                break;
            }
            material.side = md.side === 0 ? THREE.FrontSide : THREE.DoubleSide;
            material.transparent = true;
            material.depthWrite = false;
            return material;
        }

        function createUtilityMaterial(runtimeModelName, md) {
            if (runtimeModelName === 'MeshBackdropNodeMaterial') {
                return createBackdropUtilityMaterial(md);
            }

            let material;
            switch (runtimeModelName) {
            case 'MeshDistanceMaterial':
                material = new THREE.MeshDistanceMaterial();
                break;
            case 'MeshDepthMaterial':
                material = new THREE.MeshDepthMaterial();
                break;
            case 'MeshMatcapMaterial':
                material = new THREE.MeshMatcapMaterial();
                break;
            case 'MeshNormalMaterial':
                material = new THREE.MeshNormalMaterial();
                break;
            case 'MeshPhongMaterial':
                material = new THREE.MeshPhongMaterial();
                break;
            case 'MeshLambertMaterial':
            default:
                material = new THREE.MeshLambertMaterial();
                break;
            }

            material.side = md.side === 0 ? THREE.FrontSide : THREE.DoubleSide;
            material.opacity = md.opacity ?? 1.0;
            material.transparent = material.opacity < 0.999;

            if ('color' in material && Array.isArray(md.color)) {
                material.color.setRGB(md.color[0], md.color[1], md.color[2]);
            }
            if ('emissive' in material) {
                if (Array.isArray(md.em)) {
                    material.emissive.setRGB(md.em[0], md.em[1], md.em[2]);
                }
                material.emissiveIntensity = md.emI ?? material.emissiveIntensity ?? 1.0;
            }
            if ('envMapIntensity' in material && md.envI != null) material.envMapIntensity = md.envI;
            if ('flatShading' in material) material.flatShading = !!md.flat;
            if ('wireframe' in material) material.wireframe = !!md.wireframe;
            if ('shininess' in material && md.shininess != null) material.shininess = md.shininess;
            if ('specular' in material && Array.isArray(md.spec)) {
                material.specular.setRGB(md.spec[0], md.spec[1], md.spec[2]);
            }
            if (md.normScl != null && 'normalScale' in material) {
                material.normalScale = new THREE.Vector2(md.normScl, md.normScl);
            }
            if (md.bumpS != null && 'bumpScale' in material) material.bumpScale = md.bumpS;
            if (md.dispS != null && 'displacementScale' in material) material.displacementScale = md.dispS;
            if (md.dispB != null && 'displacementBias' in material) material.displacementBias = md.dispB;
            if (md.aoI != null && 'aoMapIntensity' in material) material.aoMapIntensity = md.aoI;
            if (md.lmI != null && 'lightMapIntensity' in material) material.lightMapIntensity = md.lmI;

            if (md.map && 'map' in material) {
                material.map = loadTexture(md.map, THREE.SRGBColorSpace, md.mapXf, fallbackWhiteTexture);
            }
            if (md.normMap && 'normalMap' in material) {
                material.normalMap = loadTexture(md.normMap, THREE.LinearSRGBColorSpace, md.normMapXf, fallbackFlatNormalTexture);
            }
            if (md.bumpMap && 'bumpMap' in material) {
                material.bumpMap = loadTexture(md.bumpMap, THREE.NoColorSpace, md.bumpMapXf, fallbackHeightTexture);
            }
            if (md.dispMap && 'displacementMap' in material) {
                material.displacementMap = loadTexture(md.dispMap, THREE.NoColorSpace, md.dispMapXf, fallbackHeightTexture);
            }
            if (md.aoMap && 'aoMap' in material) {
                material.aoMap = loadTexture(md.aoMap, THREE.LinearSRGBColorSpace, md.aoMapXf, fallbackWhiteTexture);
            }
            if (md.emMap && 'emissiveMap' in material) {
                material.emissiveMap = loadTexture(md.emMap, THREE.SRGBColorSpace, md.emMapXf, fallbackWhiteTexture);
            }
            if (md.opMap && 'alphaMap' in material) {
                material.alphaMap = loadTexture(md.opMap, THREE.LinearSRGBColorSpace, md.opMapXf, fallbackWhiteTexture);
                material.transparent = true;
            }
            if (md.lmMap && 'lightMap' in material) {
                material.lightMap = loadTexture(md.lmMap, THREE.LinearSRGBColorSpace, md.lmMapXf, fallbackWhiteTexture);
            }
            if (md.matcapMap && 'matcap' in material) {
                material.matcap = loadTexture(md.matcapMap, THREE.SRGBColorSpace, md.matcapMapXf, fallbackWhiteTexture);
            }

            rememberMaterialEmissiveBase(material);
            material.needsUpdate = true;
            return material;
        }

        function createMaterial(md) {
            const requestedModelName = md.model || 'MeshStandardMaterial';
            const wantsUtilityMaterial = utilityMaterialModels.has(requestedModelName);
            const wantsToonMaterial = requestedModelName === 'MeshToonMaterial';
            const wantsSSSMaterial = requestedModelName === 'MeshSSSNodeMaterial';
            const wantsAdvancedMaterial =
                requestedModelName === 'MeshPhysicalMaterial' ||
                requestedModelName === 'MeshStandardNodeMaterial';
            const canUseBackdropUtility =
                requestedModelName === 'MeshBackdropNodeMaterial' &&
                rendererBackendLabel === 'WebGPU' &&
                typeof THREE.MeshBasicNodeMaterial === 'function' &&
                typeof hashBlur === 'function';
            const hasUtilityCtor =
                wantsUtilityMaterial &&
                requestedModelName !== 'MeshBackdropNodeMaterial' &&
                typeof THREE[requestedModelName] === 'function';
            const canUseToonMaterial = wantsToonMaterial && typeof THREE.MeshToonMaterial === 'function';
            const canUseSSSMaterial =
                wantsSSSMaterial &&
                typeof THREE.MeshSSSNodeMaterial === 'function' &&
                typeof tslColor === 'function' &&
                typeof tslFloat === 'function' &&
                typeof tslTexture === 'function';
            const runtimeModelName = wantsUtilityMaterial
                ? ((hasUtilityCtor || canUseBackdropUtility) ? requestedModelName : 'MeshLambertMaterial')
                : (canUseToonMaterial
                ? 'MeshToonMaterial'
                : (canUseSSSMaterial
                    ? 'MeshSSSNodeMaterial'
                    : ((wantsAdvancedMaterial || wantsSSSMaterial) ? 'MeshPhysicalMaterial' : 'MeshStandardMaterial')));
            const key = JSON.stringify([requestedModelName, runtimeModelName, md]);
            let template = materialCache.get(key);

            if (!template) {
                if (wantsUtilityMaterial) {
                    template = createUtilityMaterial(runtimeModelName, md);
                } else {
                    const params = {
                        color: new THREE.Color(md.color[0], md.color[1], md.color[2]),
                        side: md.side === 0 ? THREE.FrontSide : THREE.DoubleSide,
                    };

                    if (!wantsToonMaterial) {
                        params.roughness = md.rough ?? 0.5;
                        params.metalness = md.metal ?? 0.0;
                        params.envMapIntensity = md.envI ?? 1.0;
                    }

                    if (md.opacity != null && md.opacity < 0.999) {
                        params.transparent = true;
                        params.opacity = md.opacity;
                    }

                    if (wantsAdvancedMaterial) {
                        if (Array.isArray(md.specularColor)) {
                            params.specularColor = new THREE.Color(md.specularColor[0], md.specularColor[1], md.specularColor[2]);
                        }
                        if (md.specularIntensity != null) params.specularIntensity = md.specularIntensity;
                        if (md.clearcoat != null) params.clearcoat = md.clearcoat;
                        if (md.clearcoatRoughness != null) params.clearcoatRoughness = md.clearcoatRoughness;
                        if (md.sheen != null) params.sheen = md.sheen;
                        if (md.sheenRoughness != null) params.sheenRoughness = md.sheenRoughness;
                        if (Array.isArray(md.sheenColor)) {
                            params.sheenColor = new THREE.Color(md.sheenColor[0], md.sheenColor[1], md.sheenColor[2]);
                        }
                        if (md.iridescence != null) params.iridescence = md.iridescence;
                        if (md.iridescenceIOR != null) params.iridescenceIOR = md.iridescenceIOR;
                        if (md.transmission != null) params.transmission = md.transmission;
                        if (md.ior != null) params.ior = md.ior;
                        if (md.thickness != null) params.thickness = md.thickness;
                        if (md.dispersion != null) params.dispersion = md.dispersion;
                        if (Array.isArray(md.attenuationColor)) {
                            params.attenuationColor = new THREE.Color(md.attenuationColor[0], md.attenuationColor[1], md.attenuationColor[2]);
                        }
                        if (md.attenuationDistance != null && md.attenuationDistance > 0) {
                            params.attenuationDistance = md.attenuationDistance;
                        }
                        if (md.anisotropy != null) params.anisotropy = md.anisotropy;
                        if ((md.transmission ?? 0) > 0) params.transparent = true;
                    }

                    const hasEmissiveColor = Array.isArray(md.em) && md.em.length === 3 &&
                        md.em.some(value => Math.abs(value) > 1.0e-5);

                    if (md.em && md.emI > 0) {
                        params.emissive = new THREE.Color(md.em[0], md.em[1], md.em[2]);
                        params.emissiveIntensity = md.emI;
                    }

                    if (md.emMap) {
                        if (!params.emissive) {
                            params.emissive = hasEmissiveColor
                                ? new THREE.Color(md.em[0], md.em[1], md.em[2])
                                : new THREE.Color(1, 1, 1);
                        }
                        if (params.emissiveIntensity == null || params.emissiveIntensity <= 0) {
                            params.emissiveIntensity = md.emMapS ?? 1.0;
                        }
                    }

                    if (md.normScl != null) params.normalScale = new THREE.Vector2(md.normScl, md.normScl);
                    if (md.bumpS != null) params.bumpScale = md.bumpS;
                    if (md.dispS != null) params.displacementScale = md.dispS;
                    if (md.dispB != null) params.displacementBias = md.dispB;
                    if (md.aoI != null) params.aoMapIntensity = md.aoI;

                    if (canUseToonMaterial) {
                        template = new THREE.MeshToonMaterial(params);
                    } else if (canUseSSSMaterial) {
                        template = new THREE.MeshSSSNodeMaterial(params);
                    } else if (wantsAdvancedMaterial) {
                        template = new THREE.MeshPhysicalMaterial(params);
                    } else if (wantsSSSMaterial) {
                        template = new THREE.MeshPhysicalMaterial(params);
                    } else {
                        template = new THREE.MeshStandardMaterial(params);
                    }

                    // Textures
                    if (md.map) template.map = loadTexture(md.map, THREE.SRGBColorSpace, md.mapXf, fallbackWhiteTexture);
                    if (!wantsToonMaterial && md.roughMap) template.roughnessMap = loadTexture(md.roughMap, THREE.LinearSRGBColorSpace, md.roughMapXf, fallbackWhiteTexture);
                    if (!wantsToonMaterial && md.metalMap) template.metalnessMap = loadTexture(md.metalMap, THREE.LinearSRGBColorSpace, md.metalMapXf, fallbackWhiteTexture);
                    if (md.normMap) template.normalMap = loadTexture(md.normMap, THREE.LinearSRGBColorSpace, md.normMapXf, fallbackFlatNormalTexture);
                    if (md.bumpMap) template.bumpMap = loadTexture(md.bumpMap, THREE.NoColorSpace, md.bumpMapXf, fallbackHeightTexture);
                    if (md.dispMap) template.displacementMap = loadTexture(md.dispMap, THREE.NoColorSpace, md.dispMapXf, fallbackHeightTexture);
                    if (md.aoMap) template.aoMap = loadTexture(md.aoMap, THREE.LinearSRGBColorSpace, md.aoMapXf, fallbackWhiteTexture);
                    if (md.emMap) template.emissiveMap = loadTexture(md.emMap, THREE.SRGBColorSpace, md.emMapXf, fallbackWhiteTexture);
                    if (md.opMap) { template.alphaMap = loadTexture(md.opMap, THREE.LinearSRGBColorSpace, md.opMapXf, fallbackWhiteTexture); template.transparent = true; }
                    if (canUseToonMaterial) {
                        template.gradientMap = md.gradMap
                            ? configureGradientTexture(loadTexture(md.gradMap, THREE.NoColorSpace, null, fallbackToonGradientTexture))
                            : fallbackToonGradientTexture;
                    }

                    // Lightmap
                    if (md.lmMap) {
                        template.lightMap = loadTexture(md.lmMap, THREE.LinearSRGBColorSpace, md.lmMapXf, fallbackWhiteTexture);
                        template.lightMapIntensity = md.lmI ?? 1.0;
                    }

                    if (canUseSSSMaterial) {
                        applySSSMaterialNodes(template, md);
                    }
                }
                template.userData ??= {};
                template.userData.maxjsRequestedMaterialModel = requestedModelName;
                template.userData.maxjsMaterialModel = runtimeModelName;
                template.userData.maxjsUtilityMaterialFallback =
                    wantsUtilityMaterial && !(hasUtilityCtor || canUseBackdropUtility);
                template.userData.maxjsToonMaterialFallback =
                    wantsToonMaterial && !canUseToonMaterial;
                template.userData.maxjsSSSMaterialFallback =
                    wantsSSSMaterial && !canUseSSSMaterial;

                rememberMaterialEmissiveBase(template);
                template.needsUpdate = true;
                materialCache.set(key, template);
            }

            const material = template.clone();
            rememberMaterialEmissiveBase(material);
            return material;
        }

        // ── Max Bridge ──────────────────────────────────────
        const bridge = {
            send(type, data = {}) { window.chrome?.webview?.postMessage({ type, ...data }); },
            handlers: {},
            on(type, fn) { (this.handlers[type] ??= []).push(fn); },
            dispatch(msg) { (this.handlers[msg.type] || []).forEach(fn => fn(msg)); }
        };

        let hasInitialSync = false;
        let readyRetryTimer = 0;
        let transportMode = 'waiting';

        function setInfoText(text) {
            perfHud.setStatus(text);
        }

        function setTransportMode(mode) {
            transportMode = mode;
        }

        function countInstances() {
            const geoms = new Set();
            let count = 0;
            for (const [, mesh] of nodeMap) {
                if (geoms.has(mesh.geometry)) count++;
                else geoms.add(mesh.geometry);
            }
            // Count Forest Pack GPU instances
            for (const [, im] of forestMeshes) {
                count += im.count; // InstancedMesh.count = number of instances
            }
            return count;
        }

        function updateSyncHud(partial = {}) {
            perfHud.updateSync({
                transport: partial.transport ?? transportMode,
                frameId: partial.frameId ?? 0,
                producerBytes: partial.producerBytes ?? 0,
                decodeMs: partial.decodeMs ?? 0,
                applyMs: partial.applyMs ?? 0,
                nodeCount: nodeMap.size,
                instanceCount: countInstances(),
                textureCount: textureCache.size,
            });
        }

        function scheduleReadyRetry() {
            if (!window.chrome?.webview || readyRetryTimer) return;
            readyRetryTimer = setInterval(() => {
                if (hasInitialSync) {
                    clearInterval(readyRetryTimer);
                    readyRetryTimer = 0;
                    return;
                }
                bridge.send('ready');
            }, 1000);
        }

        function stopReadyRetry() {
            if (!readyRetryTimer) return;
            clearInterval(readyRetryTimer);
            readyRetryTimer = 0;
        }

        function markInitialSync() {
            if (hasInitialSync) return;
            hasInitialSync = true;
            stopReadyRetry();
        }

        function startBridgeHandshake() {
            if (!window.chrome?.webview) return;
            setInfoText('MaxJS - connected, waiting for sync...');
            bridge.send('ready');
            scheduleReadyRetry();
        }

        function reportBridgeError(prefix, err) {
            const message = err?.message || String(err);
            console.error(`[MaxJS ${prefix}]`, err);
            setInfoText(`MaxJS - ${prefix}: ${message}`);
        }

        bridge.on('debug', msg => {
            if (!hasInitialSync) {
                setInfoText('MaxJS - ' + (msg.msg || 'debug'));
            } else {
                console.log('[MaxJS debug]', msg.msg || 'debug');
            }
        });

        // ── Clay Mode ───────────────────────────────────
        let clayModeActive = false;
        let clayPreFxSnapshot = null;
        const clayMat = new THREE.MeshStandardMaterial({
            color: 0x9d3d31, roughness: 0.6, metalness: 0.05, side: THREE.DoubleSide,
        });

        function enterClayMode() {
            // Snapshot current FX state
            clayPreFxSnapshot = {
                ssgi: ssgiFx.isEnabled(),
                ssr: ssgiFx.isSSREnabled(),
                gtao: ssgiFx.isGTAOEnabled(),
                bloom: ssgiFx.isBloomEnabled(),
                toonOutline: ssgiFx.isToonOutlineEnabled(),
                motionBlur: ssgiFx.isMotionBlurEnabled(),
                traa: ssgiFx.isTRAAEnabled(),
                contactShadow: ssgiFx.isContactShadowEnabled(),
                retro: ssgiFx.isRetroEnabled(),
                volumetric: ssgiFx.isVolumetricEnabled(),
                pixel: ssgiFx.isPixelEnabled(),
                fog: ssgiFx.isFogEnabled(),
            };
            // Disable everything
            ssgiFx.setEnabled(false);
            ssgiFx.setSSREnabled(false);
            ssgiFx.setBloomEnabled(false);
            ssgiFx.setToonOutlineEnabled(false);
            ssgiFx.setMotionBlurEnabled(false);
            ssgiFx.setTRAAEnabled(false);
            ssgiFx.setContactShadowEnabled(false);
            ssgiFx.setRetroEnabled(false);
            ssgiFx.setVolumetricEnabled(false);
            ssgiFx.setPixelEnabled(false);
            ssgiFx.setFogEnabled(false);
            // Force GTAO on with inverted (bright) AO
            if (ssgiFx.setClayOverride) ssgiFx.setClayOverride(true);
            ssgiFx.setGTAOEnabled(true);

            // Swap materials
            for (const [, mesh] of nodeMap) {
                if (!mesh.isMesh) continue;
                mesh.userData._origMaterial = mesh.material;
                mesh.material = Array.isArray(mesh.userData._origMaterial)
                    ? mesh.userData._origMaterial.map(() => clayMat) : clayMat;
            }
        }

        function exitClayMode() {
            // Restore materials
            for (const [, mesh] of nodeMap) {
                if (!mesh.isMesh) continue;
                if (mesh.userData._origMaterial) {
                    mesh.material = mesh.userData._origMaterial;
                    delete mesh.userData._origMaterial;
                }
            }
            // Restore FX state
            if (clayPreFxSnapshot) {
                if (ssgiFx.setClayOverride) ssgiFx.setClayOverride(false);
                ssgiFx.setGTAOEnabled(clayPreFxSnapshot.gtao);
                ssgiFx.setEnabled(clayPreFxSnapshot.ssgi);
                ssgiFx.setSSREnabled(clayPreFxSnapshot.ssr);
                ssgiFx.setBloomEnabled(clayPreFxSnapshot.bloom);
                ssgiFx.setToonOutlineEnabled(clayPreFxSnapshot.toonOutline);
                ssgiFx.setMotionBlurEnabled(clayPreFxSnapshot.motionBlur);
                ssgiFx.setTRAAEnabled(clayPreFxSnapshot.traa);
                ssgiFx.setContactShadowEnabled(clayPreFxSnapshot.contactShadow);
                ssgiFx.setRetroEnabled(clayPreFxSnapshot.retro);
                ssgiFx.setVolumetricEnabled(clayPreFxSnapshot.volumetric);
                ssgiFx.setPixelEnabled(clayPreFxSnapshot.pixel);
                ssgiFx.setFogEnabled(clayPreFxSnapshot.fog);
                clayPreFxSnapshot = null;
            }
        }

        bridge.on('clay_mode', msg => {
            const enabled = !!msg.enabled;
            if (enabled === clayModeActive) return;
            clayModeActive = enabled;
            if (enabled) enterClayMode(); else exitClayMode();
            syncPostFxPanel(true);
        });

        // ── Shadow Mode (synced to Nitrous viewport shadows toggle) ──
        let nitrousShadowActive = false;
        bridge.on('shadow_mode', msg => {
            const enabled = !!msg.enabled;
            if (enabled === nitrousShadowActive) return;
            nitrousShadowActive = enabled;
            // Toggle castShadow on all lights
            defaultKey.castShadow = enabled;
            for (const [, light] of lightHandleMap) {
