<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MaxJS</title>
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { color-scheme: dark; }
        body { overflow: hidden; background: #353535; position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; }
#hud {
            position: absolute; top: 8px; left: 64px;
            color: rgba(180, 180, 180, 0.8);
            font: 10px/1.4 'Segoe UI', system-ui, sans-serif;
            pointer-events: none;
            z-index: 20;
        }
        #info {
            background: rgba(20, 20, 20, 0.55);
            padding: 4px 8px;
            border-radius: 0;
            margin-bottom: 5px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(16px);
        }
        /* ── Side Panel ─────────────────────────────── */
        .sidepanel-resize {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 5px;
            cursor: ew-resize;
            z-index: 2;
            border-radius: 0;
            transition: background 0.15s ease;
        }
        .sidepanel-resize:hover,
        .sidepanel-resize.active {
            background: rgba(255, 255, 255, 0.2);
        }
        .sidepanel {
            position: absolute;
            top: 8px;
            right: 8px;
            width: min(280px, calc(100vw - 16px));
            min-width: 200px;
            max-width: calc(100vw - 16px);
            max-height: calc(100vh - 16px);
            padding: 8px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.07);
            background: rgba(20, 20, 22, 0.78);
            color: #c8c8c8;
            font: 11px/1.4 -apple-system, 'Segoe UI', system-ui, sans-serif;
            letter-spacing: 0.005em;
            backdrop-filter: blur(32px) saturate(1.4);
            -webkit-backdrop-filter: blur(32px) saturate(1.4);
            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.55),
                0 1px 0 rgba(255, 255, 255, 0.04) inset,
                0 -1px 0 rgba(0, 0, 0, 0.25) inset;
            overflow-y: auto;
            overflow-x: hidden;
            opacity: 0;
            pointer-events: none;
            transform: translateX(14px) scale(0.98);
            transition: opacity 0.2s ease, transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 30;
            scrollbar-width: thin;
            scrollbar-color: rgba(120,120,120,0.2) transparent;
        }
        .sidepanel::-webkit-scrollbar { width: 4px; }
        .sidepanel::-webkit-scrollbar-track { background: transparent; }
        .sidepanel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 0; }
        .sidepanel.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(0) scale(1);
        }
        .sidepanel-left {
            right: auto;
            left: 8px;
            transform: translateX(-14px) scale(0.98);
        }
        .sidepanel-left.visible {
            transform: translateX(0) scale(1);
        }
        .sidepanel-left .sidepanel-resize {
            left: auto;
            right: 0;
            border-radius: 0;
        }
        /* ── Right-side dock ─────────────────────────────────
         * Fixed 280px-wide column pinned to the right edge. Panels
         * stack vertically inside. When more panels are open than
         * fit the viewport height, the dock scrolls vertically. */
        #rightDock {
            position: fixed;
            top: 8px;
            right: 8px;
            bottom: 8px;
            width: 240px;
            display: flex;
            flex-direction: column;
            transition: transform 0.22s cubic-bezier(0.2, 0.7, 0.2, 1);
            align-items: stretch;
            gap: 8px;
            overflow-y: auto;
            overflow-x: hidden;
            pointer-events: none;
            z-index: 30;
            scrollbar-width: thin;
            scrollbar-color: rgba(120,120,120,0.2) transparent;
        }
        #rightDock::-webkit-scrollbar { width: 4px; }
        #rightDock::-webkit-scrollbar-track { background: transparent; }
        #rightDock::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); }
        /* Panels inside the dock drop their own absolute positioning
         * and become flex items. Hidden panels collapse to 0 height so
         * they don't reserve vertical space. */
        #rightDock .sidepanel {
            position: relative;
            top: auto;
            right: auto;
            left: auto;
            width: auto;
            min-width: 0;
            max-width: none;
            max-height: none;
            transform: none;
            flex: 0 0 auto;
            transition: opacity 0.2s ease;
        }
        #rightDock .sidepanel:not(.visible) {
            opacity: 0;
            pointer-events: none;
            display: none;
        }
        #rightDock .sidepanel.visible {
            opacity: 1;
            pointer-events: auto;
            transform: none;
            display: block;
        }
        /* ── Drag-to-hide handles ─────────────────────
         * Rail: drag handle's right edge, flick left to hide.
         * Dock: drag handle's left edge, flick right to hide. */
        #rightRail.is-hidden { transform: translateX(calc(-100% + 4px)); }
        #rightDock.is-hidden { transform: translateX(calc(100% - 4px)); }
        .rail-drag-handle,
        .dock-drag-handle {
            position: fixed;
            top: 8px;
            bottom: 8px;
            width: 10px;
            cursor: ew-resize;
            z-index: 41;
            touch-action: none;
            transition: left 0.22s cubic-bezier(0.2, 0.7, 0.2, 1),
                        right 0.22s cubic-bezier(0.2, 0.7, 0.2, 1);
        }
        .rail-drag-handle { left: 56px; }
        .dock-drag-handle { right: 248px; }
        #rightRail.is-hidden ~ .rail-drag-handle { left: 12px; }
        #rightDock.is-hidden ~ .dock-drag-handle { right: 12px; }
        .rail-drag-handle::after,
        .dock-drag-handle::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 2px;
            height: 28px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 1px;
            transition: background 0.15s ease, height 0.15s ease;
        }
        .rail-drag-handle:hover::after,
        .dock-drag-handle:hover::after,
        .rail-drag-handle.dragging::after,
        .dock-drag-handle.dragging::after {
            background: rgba(255, 255, 255, 0.4);
            height: 44px;
        }
        body.light-mode .rail-drag-handle::after,
        body.light-mode .dock-drag-handle::after { background: rgba(0, 0, 0, 0.18); }
        body.light-mode .rail-drag-handle:hover::after,
        body.light-mode .dock-drag-handle:hover::after,
        body.light-mode .rail-drag-handle.dragging::after,
        body.light-mode .dock-drag-handle.dragging::after { background: rgba(0, 0, 0, 0.45); }
        .layer-item {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 6px;
            padding: 5px 6px;
            border-radius: 0;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .layer-folder { margin-top: 4px; }
        .layer-folder-header {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 3px 6px;
            font-size: 10px;
            letter-spacing: 0.04em;
            color: #9a9a9a;
            text-transform: uppercase;
            list-style: none;
        }
        .layer-folder-header::-webkit-details-marker { display: none; }
        .layer-folder-header::before {
            content: '\25B6';
            font-size: 8px;
            color: #6a6a6a;
            transition: transform 0.12s ease;
        }
        .layer-folder[open] > .layer-folder-header::before { transform: rotate(90deg); }
        .layer-folder-name { color: #bdbdbd; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .layer-folder-count {
            font-size: 9px;
            color: #8a8a8a;
            padding: 0 4px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 2px;
        }
        .layer-folder-body { display: flex; flex-direction: column; gap: 2px; padding-left: 10px; border-left: 1px solid rgba(255, 255, 255, 0.06); margin: 2px 0 4px 6px; }
        .layer-priority {
            font-size: 9px;
            color: #8a8a8a;
            padding: 1px 4px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 2px;
            font-variant-numeric: tabular-nums;
        }
        .layer-item.error {
            border-color: rgba(255, 80, 80, 0.3);
        }
        .layer-item.inactive {
            opacity: 0.45;
        }
        .layer-main {
            min-width: 0;
        }
        .layer-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
        }
        .layer-name {
            font-size: 11px;
            color: #ccc;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .layer-source {
            font-size: 9px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #8a8a8a;
            padding: 1px 4px;
            border-radius: 0;
            border: 1px solid rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
        }
        .layer-source.project {
            color: #8fd4ff;
            border-color: rgba(90, 180, 255, 0.22);
        }
        .layer-source.inline {
            color: #ffd27a;
            border-color: rgba(255, 180, 80, 0.18);
        }
        .layer-status {
            font-size: 9px;
            color: #666;
            flex-shrink: 0;
        }
        .layer-status.live { color: #e8e8e8; }
        .layer-status.err { color: #ff5050; }
        .layer-status.off { color: #9e9e9e; }
        .layer-detail {
            margin-top: 3px;
            font-size: 9px;
            color: #6f6f6f;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .layer-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        .layer-action {
            border-radius: 0;
            padding: 1px 5px;
            font: 9px/1 'Segoe UI', system-ui, sans-serif;
            cursor: pointer;
            flex-shrink: 0;
        }
        .layer-toggle {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.18);
            color: #e0e0e0;
        }
        .layer-toggle:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        .layer-remove {
            background: rgba(255, 80, 80, 0.1);
            border: 1px solid rgba(255, 80, 80, 0.2);
            color: #ff6666;
        }
        .layer-remove:hover {
            background: rgba(255, 80, 80, 0.25);
        }
        .layers-empty {
            color: #555;
            font-size: 10px;
            text-align: center;
            padding: 12px 0;
        }
        .sidepanel-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 6px;
            margin-bottom: 6px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .sidepanel-title {
            font-size: 11px;
            font-weight: 700;
            color: #f0f0f0;
            letter-spacing: -0.01em;
            line-height: 1.1;
        }
        .sidepanel-subtitle {
            color: #777;
            font-size: 9px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-top: 2px;
        }
        .sidepanel button,
        .fx-toggle {
            background: rgba(255, 255, 255, 0.05);
            color: #b0b0b0;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2px;
            padding: 3px 7px;
            font: 9px/1 -apple-system, 'Segoe UI', system-ui, sans-serif;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
            white-space: nowrap;
        }
        .sidepanel button:hover,
        .fx-toggle:hover {
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 255, 255, 0.14);
            color: #e0e0e0;
        }
        .sidepanel button:focus-visible,
        .fx-toggle:focus-visible,
        .sidepanel input:focus-visible,
        .sidepanel select:focus-visible,
        .sidepanel textarea:focus-visible {
            outline: 1px solid rgba(255, 255, 255, 0.35);
            outline-offset: 1px;
        }
        .fx-toggle.active {
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255, 255, 255, 0.32);
            color: #ffffff;
        }
        .sidepanel button:disabled,
        .fx-toggle:disabled,
        .sidepanel input:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }
        .sidepanel-body {
            display: grid;
            gap: 5px;
        }
        .snapshot-grid {
            display: grid;
            gap: 4px;
        }
        .snapshot-inline {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 6px;
            align-items: center;
        }
        .snapshot-inline input[type="number"] {
            width: 72px;
            background: rgba(255, 255, 255, 0.05);
            color: #bbb;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 0;
            padding: 4px 6px;
            font: 10px/1 'Segoe UI', system-ui, sans-serif;
        }
        .snapshot-actions {
            display: flex;
            gap: 6px;
        }
        .snapshot-actions button {
            flex: 1 1 0;
        }
        .snapshot-note {
            color: #777;
            font-size: 9px;
            line-height: 1.35;
        }
        /* ── FX Sections ───────────────────────────── */
        .fx-section {
            border: 0;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.025);
            padding: 6px 8px;
            transition: background 0.15s ease;
        }
        .fx-section:hover {
            background: rgba(255, 255, 255, 0.035);
        }
        .fx-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
            cursor: pointer;
            user-select: none;
            min-height: 14px;
        }
        .fx-section.collapsed {
            padding: 6px 8px;
        }
        .fx-section.collapsed .fx-grid,
        .fx-section.collapsed .fx-note,
        .fx-section.collapsed .clone-subsection {
            display: none;
        }
        .fx-section-title::before {
            content: '–';
            display: inline-block;
            width: 10px;
            color: #555;
            font-weight: 400;
        }
        .fx-section.collapsed .fx-section-title::before {
            content: '+';
            color: #777;
        }
        .sidepanel-body.ascii-takeover .fx-section:not([data-fx-section="clone"]):not([data-fx-section="ascii"]) {
            opacity: 0.25;
            pointer-events: none;
        }
        .fx-section.disabled-by-other {
            opacity: 0.45;
        }
        .fx-section.disabled-by-other .fx-section-title,
        .fx-section.disabled-by-other .fx-control-head,
        .fx-section.disabled-by-other .fx-check {
            color: #666;
        }
        .fx-section.disabled-by-other .fx-toggle {
            cursor: not-allowed;
        }
        .fx-section-title {
            font-size: 10px;
            font-weight: 600;
            color: #d8d8d8;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .fx-section-copy {
            display: none;
        }
        .fx-grid {
            display: grid;
            gap: 5px;
            margin-top: 6px;
        }
        .fx-control {
            display: grid;
            gap: 2px;
        }
        .fx-control-head {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 6px;
            font-size: 9px;
            color: #888;
            font-weight: 500;
        }
        .fx-check {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
            font-size: 9px;
            color: #aaa;
            font-weight: 500;
            min-height: 14px;
        }
        .fx-value {
            color: #e0e0e0;
            font-size: 9px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0;
        }
        /* ── Custom Range Slider ───────────────────── */
        .fx-range {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 2px;
            border-radius: 1px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            cursor: pointer;
            margin: 3px 0;
        }
        .fx-range::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #f0f0f0;
            border: none;
            box-shadow:
                0 0 0 1px rgba(0, 0, 0, 0.4),
                0 1px 3px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.12s ease;
        }
        .fx-range::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.3),
                0 2px 6px rgba(0, 0, 0, 0.5);
        }
        .fx-range::-webkit-slider-thumb:active {
            transform: scale(1.05);
            background: #ffffff;
        }
        .fx-range::-moz-range-thumb {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #f0f0f0;
            border: none;
            box-shadow:
                0 0 0 1px rgba(0, 0, 0, 0.4),
                0 1px 3px rgba(0, 0, 0, 0.4);
            cursor: pointer;
        }
        .fx-range::-moz-range-track {
            height: 2px;
            border-radius: 1px;
            background: rgba(255, 255, 255, 0.1);
        }
        /* ── Custom Checkbox (toggle switch) ────────── */
        .fx-check input[type="checkbox"] {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 11px;
            border-radius: 0;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
            transition: background 0.15s ease, border-color 0.15s ease;
        }
        .fx-check input[type="checkbox"]::after {
            content: '';
            position: absolute;
            top: 1px;
            left: 1px;
            width: 7px;
            height: 7px;
            border-radius: 0;
            background: rgba(255, 255, 255, 0.3);
            transition: transform 0.15s cubic-bezier(0.16, 1, 0.3, 1), background 0.15s ease;
        }
        .fx-check input[type="checkbox"]:checked {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
        }
        .fx-check input[type="checkbox"]:checked::after {
            transform: translateX(9px);
            background: #e8e8e8;
            box-shadow: 0 0 4px rgba(255, 255, 255, 0.35);
        }
        .fx-note {
            margin-top: 3px;
            min-height: 0;
            color: #777;
            font-size: 9px;
            line-height: 1.3;
        }
        .fx-note:empty { display: none; }
        .fx-note.error {
            color: #e88;
        }
        .fx-warn {
            margin: 4px 0 6px 0;
            padding: 6px 8px;
            border-left: 2px solid #ffb340;
            background: rgba(255, 179, 64, 0.08);
            color: #ffcf80;
            font-size: 11px;
            font-weight: 600;
            line-height: 1.35;
            letter-spacing: 0.02em;
            text-transform: none;
        }
        .fx-warn:empty { display: none; }
        .fx-section.collapsed .fx-warn { display: none; }
        body.light-mode .fx-warn {
            background: rgba(200, 110, 0, 0.10);
            color: #8a4a00;
            border-left-color: #c46a00;
        }
        .fx-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .fx-row-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-width: 48px;
            font-size: 10px;
            color: #999;
        }
        /* ── Light Mode — brushed metal / CLONE.LLC ── */
        body.light-mode { background: #2a2a2a; }

        /* HUD info — dark translucent terminal style */
        body.light-mode #info {
            background: rgba(18, 18, 18, 0.88);
            color: #b0b0b0;
            border-color: rgba(80, 80, 80, 0.3);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
        }

        /* Side panels — brushed metal window chrome */
        body.light-mode .sidepanel {
            background: linear-gradient(180deg, #d4d4d4 0%, #c0c0c0 3%, #d0d0d0 4%, #bcbcbc 100%);
            color: #2a2a2a;
            border: 1px solid #777;
            border-top-color: #999;
            box-shadow:
                0 6px 28px rgba(0, 0, 0, 0.55),
                inset 0 1px 0 rgba(255, 255, 255, 0.5),
                inset 0 -1px 0 rgba(0, 0, 0, 0.08);
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            scrollbar-color: rgba(80, 80, 80, 0.35) transparent;
        }
        body.light-mode .sidepanel-title {
            color: #1a1a1a;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.5);
        }
        body.light-mode .sidepanel-header {
            border-bottom-color: rgba(0, 0, 0, 0.12);
        }
        body.light-mode .sidepanel-subtitle { color: #555; }

        /* Panel buttons — embossed metal */
        body.light-mode .sidepanel button,
        body.light-mode .fx-toggle {
            background: linear-gradient(180deg, #d8d8d8 0%, #b4b4b4 100%);
            color: #333;
            border: 1px solid #888;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.45), 0 1px 1px rgba(0, 0, 0, 0.12);
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.35);
            backdrop-filter: none;
        }
        body.light-mode .sidepanel button:hover,
        body.light-mode .fx-toggle:hover {
            background: linear-gradient(180deg, #e2e2e2 0%, #c4c4c4 100%);
            color: #111;
            border-color: #777;
        }
        body.light-mode .fx-toggle.active {
            background: linear-gradient(180deg, #b8ddd4 0%, #88bfb0 100%);
            color: #1a4a3e;
            border-color: #6a9a8a;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.3), 0 0 6px rgba(255, 255, 255, 0.12);
        }

        /* FX sections — inset panels */
        body.light-mode .fx-section {
            background: rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.06);
        }
        body.light-mode .fx-section:hover {
            background: rgba(0, 0, 0, 0.06);
            border-color: rgba(0, 0, 0, 0.15);
        }
        body.light-mode .fx-section-title {
            color: #222;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.4);
        }
        body.light-mode .fx-control-head,
        body.light-mode .fx-check { color: #444; }
        body.light-mode .fx-value { color: #111; }

        /* Slider — metal track */
        body.light-mode .fx-range {
            background: rgba(0, 0, 0, 0.12);
            box-shadow: inset 0 1px 1px rgba(0, 0, 0, 0.1);
        }
        body.light-mode .fx-range::-webkit-slider-thumb {
            background: linear-gradient(180deg, #e0e0e0, #b0b0b0);
            border-color: #777;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
        }
        body.light-mode .fx-range::-moz-range-thumb {
            background: linear-gradient(180deg, #e0e0e0, #b0b0b0);
            border-color: #777;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
        }
        body.light-mode .fx-note { color: #666; }

        /* Toggle switch — metal */
        body.light-mode .fx-check input[type="checkbox"] {
            background: rgba(0, 0, 0, 0.1);
            border-color: rgba(0, 0, 0, 0.2);
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.1);
        }
        body.light-mode .fx-check input[type="checkbox"]::after {
            background: linear-gradient(180deg, #ddd, #aaa);
            box-shadow: 0 1px 1px rgba(0, 0, 0, 0.15);
        }
        body.light-mode .fx-check input[type="checkbox"]:checked {
            background: rgba(255, 255, 255, 0.16);
            border-color: rgba(255, 255, 255, 0.3);
        }
        body.light-mode .fx-check input[type="checkbox"]:checked::after {
            background: linear-gradient(180deg, #60d8c0, #40b8a0);
            box-shadow: 0 0 4px rgba(255, 255, 255, 0.24);
        }

        /* Layer items — inset rows */
        body.light-mode .layer-item {
            background: rgba(255, 255, 255, 0.35);
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5);
        }
        body.light-mode .layer-name { color: #1a1a1a; }
        body.light-mode .layer-source {
            color: #555;
            border-color: rgba(0, 0, 0, 0.15);
        }
        body.light-mode .layer-source.project {
            color: #2a6a8a;
            border-color: rgba(40, 100, 140, 0.3);
        }
        body.light-mode .layer-source.inline {
            color: #8a6a2a;
            border-color: rgba(140, 100, 40, 0.3);
        }
        body.light-mode .layer-status { color: #888; }
        body.light-mode .layer-status.live { color: #2a8a6a; }
        body.light-mode .layer-status.err { color: #cc3333; }
        body.light-mode .layers-empty { color: #999; }

        /* Inputs — inset field */
        body.light-mode .snapshot-inline input[type="number"] {
            background: rgba(255, 255, 255, 0.5);
            color: #222;
            border: 1px solid rgba(0, 0, 0, 0.18);
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.08);
        }

        body.light-mode .sidepanel::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.15);
        }
        body.light-mode .sidepanel-resize:hover,
        body.light-mode .sidepanel-resize.active {
            background: rgba(255, 255, 255, 0.3);
        }

        /* ── Dark Mode — rounded corners (light mode stays sharp at base 0) ── */
        body:not(.light-mode) #info { border-radius: 6px; }
        body:not(.light-mode) .sidepanel { border-radius: 10px; }
        body:not(.light-mode) .sidepanel::-webkit-scrollbar-thumb { border-radius: 2px; }
        body:not(.light-mode) .sidepanel-resize { border-radius: 10px 0 0 10px; }
        body:not(.light-mode) .sidepanel-left .sidepanel-resize { border-radius: 0 10px 10px 0; }
        body:not(.light-mode) .layer-item { border-radius: 5px; }
        body:not(.light-mode) .layer-source { border-radius: 999px; }
        body:not(.light-mode) .layer-action { border-radius: 3px; }
        body:not(.light-mode) .sidepanel button,
        body:not(.light-mode) .fx-toggle { border-radius: 5px; }
        body:not(.light-mode) .snapshot-inline input[type="number"] { border-radius: 5px; }
        body:not(.light-mode) .fx-section { border-radius: 7px; }
        body:not(.light-mode) .fx-range { border-radius: 2px; }
        body:not(.light-mode) .fx-range::-moz-range-track { border-radius: 2px; }
        body:not(.light-mode) .fx-check input[type="checkbox"] { border-radius: 7px; }
        body:not(.light-mode) .fx-check input[type="checkbox"]::after { border-radius: 50%; }
        body:not(.light-mode) .sidepanel select { border-radius: 5px !important; }

        /* ── Light Mode — Clone section inline color fixes ── */
        body.light-mode .clone-subsection { border-top-color: rgba(0, 0, 0, 0.1) !important; }
        body.light-mode .clone-subsection span[style*="color:#ccc"] { color: #333 !important; }
        body.light-mode [data-fx-section="clone"] > .fx-note { color: #666 !important; }
        body.light-mode .sidepanel select {
            background: rgba(0, 0, 0, 0.06) !important;
            color: #333 !important;
            border-color: rgba(0, 0, 0, 0.15) !important;
        }
        body.light-mode #fx-hdri-name { color: #666 !important; }
        body.light-mode #rightRail {
            background: rgba(245, 245, 245, 0.85);
            border-color: rgba(0, 0, 0, 0.08);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.18);
        }
        body.light-mode .rail-group-label { color: rgba(0, 0, 0, 0.42); }
        body.light-mode .rail-sep { background: rgba(0, 0, 0, 0.08); }
        body.light-mode .rail-btn {
            background: rgba(0, 0, 0, 0.03);
            border-color: rgba(0, 0, 0, 0.08);
            color: #555;
        }
        body.light-mode .rail-btn:hover {
            background: rgba(0, 0, 0, 0.06);
            border-color: rgba(0, 0, 0, 0.12);
            color: #222;
        }
        body.light-mode .rail-btn.active {
            background: rgba(0, 0, 0, 0.08);
            border-color: rgba(0, 0, 0, 0.2);
            color: #111;
        }
        body.light-mode .rail-btn-badge {
            background: rgba(0, 0, 0, 0.045);
            border-color: rgba(0, 0, 0, 0.08);
        }
        body.light-mode .rail-btn.active .rail-btn-badge {
            background: rgba(0, 0, 0, 0.08);
            border-color: rgba(0, 0, 0, 0.14);
        }
        .ll-mode {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            color: #888;
            cursor: pointer;
            border-radius: 0;
        }
        .ll-mode.active {
            background: rgba(255,255,255,0.1);
            color: #e8e8e8;
            border-color: rgba(255,255,255,0.3);
        }
        #ll-obj-list label:hover { background: rgba(255,255,255,0.04); }
        /* ── Left Rail ───────────────────────────────── */
        #rightRail {
            position: fixed;
            top: 8px;
            left: 8px;
            bottom: 8px;
            width: 56px;
            transition: transform 0.22s cubic-bezier(0.2, 0.7, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 6px 4px;
            background: rgba(20, 20, 22, 0.78);
            backdrop-filter: blur(32px) saturate(1.4);
            -webkit-backdrop-filter: blur(32px) saturate(1.4);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 4px;
            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.55),
                0 1px 0 rgba(255, 255, 255, 0.04) inset,
                0 -1px 0 rgba(0, 0, 0, 0.25) inset;
            z-index: 40;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: thin;
            scrollbar-color: rgba(120, 120, 120, 0.2) transparent;
        }
        #rightRail::-webkit-scrollbar { width: 4px; }
        #rightRail::-webkit-scrollbar-track { background: transparent; }
        #rightRail::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.08); }
        .rail-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex-shrink: 0;
        }
        .rail-group-label {
            padding: 1px 4px 3px;
            font: 700 8px/1 'Segoe UI', system-ui, sans-serif;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.38);
            user-select: none;
        }
        .rail-sep {
            height: 1px;
            background: rgba(255, 255, 255, 0.06);
            margin: 4px 2px;
            flex-shrink: 0;
        }
        /* Pushes the final group (Prefs) to the bottom of the rail. */
        .rail-spacer { flex: 1 1 auto; min-height: 4px; }
        .rail-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 36px;
            gap: 2px;
            padding: 5px 3px;
            font: 8px/1 'Segoe UI', system-ui, sans-serif;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #888;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            cursor: pointer;
            transition: background 0.12s ease, color 0.12s ease, border-color 0.12s ease;
            white-space: nowrap;
            overflow: hidden;
        }
        .rail-btn svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            display: block;
        }
        .rail-btn svg.rail-btn-logo-lg {
            width: 24px;
            height: 24px;
            transform: translateY(-1px);
        }
        .rail-btn-label {
            font-size: 7px;
            line-height: 1;
            letter-spacing: 0.12em;
            opacity: 0.7;
        }
        .rail-btn-badge {
            min-width: 22px;
            padding: 1px 4px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: inherit;
            font-size: 7px;
            line-height: 1.15;
            letter-spacing: 0.1em;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }
        /* Theme icon crossfade — both present, CSS swaps by mode. */
        .rail-btn .icon-sun { display: none; }
        body.light-mode .rail-btn .icon-moon { display: none; }
        body.light-mode .rail-btn .icon-sun { display: block; }
        .rail-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #ccc;
            border-color: rgba(255, 255, 255, 0.1);
        }
        .rail-btn.active {
            background: rgba(255, 255, 255, 0.08);
            color: #f0f0f0;
            border-color: rgba(255, 255, 255, 0.18);
        }
        .rail-btn.active .rail-btn-badge {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.16);
        }
        .rail-btn:disabled,
        .rail-btn.is-gated {
            opacity: 0.36;
            cursor: not-allowed;
        }
        .rail-btn:disabled:hover,
        .rail-btn.is-gated:hover {
            background: rgba(255, 255, 255, 0.02);
            color: #888;
            border-color: rgba(255, 255, 255, 0.05);
        }
        /* Camera picker: visually a rail-btn with a camera icon; the native
         * <select> is an invisible overlay so clicks still open the dropdown. */
        .rail-cam { position: relative; }
        .rail-cam-native {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            border: 0;
            background: transparent;
            color: transparent;
            opacity: 0;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            font: inherit;
        }

        /* Rail button visibility gates. In a standalone demo page the viewer
           shouldn't see Max-host buttons (Kill Panel, Snapshot, Layers, etc.)
           or dev-mode buttons (Renderer backend, Light Probe, Light Helpers,
           etc.). Body classes are set by the inline bootstrap below, before
           the rail paints — no FOUC. */
        .maxonly, .devonly { display: none !important; }
        body.is-max-host .maxonly { display: revert !important; }
        body.is-dev .devonly { display: revert !important; }
        /* Hide rail-group wrappers the bootstrap marks empty, and the
           separators that follow them, so we don't leave dangling labels. */
        .rail-group.rail-empty { display: none; }
        .rail-group.rail-empty + .rail-sep { display: none; }
    </style>
</head>

                    var t = document.getElementById('btnTheme');
                    /* icon swaps via CSS — no label rewrite needed */
                    void t;
                }
            } catch (e) { /* private mode / disabled storage */ }

            // Rail visibility: set body classes before the rail paints so
            // maxonly/devonly CSS gates resolve without a flash.
            try {
                var isMaxHost = !!(window.chrome && window.chrome.webview && window.chrome.webview.postMessage);
                var qs = new URLSearchParams(location.search);
                var modeParam = qs.get('mode');
                var devFlag = qs.get('dev') === '1' || modeParam === 'dev';
                // Dev mode when: running in Max, or explicitly requested via
                // ?dev=1 / ?mode=dev. Standalone release demos stay clean.
                var isDev = isMaxHost || devFlag;
                if (isMaxHost) document.body.classList.add('is-max-host');
                if (isDev) document.body.classList.add('is-dev');

                // Mark rail-groups whose only remaining children are labels /
                // separators (so the CSS can collapse them). Runs once — the
                // DOM isn't reordered after this point.
                var groups = document.querySelectorAll('#rightRail .rail-group');
                for (var i = 0; i < groups.length; i++) {
                    var g = groups[i];
                    var hasLive = false;
                    var kids = g.children;
                    for (var j = 0; j < kids.length; j++) {
                        var c = kids[j];
                        if (c.classList.contains('rail-group-label')) continue;
                        if (c.classList.contains('maxonly') && !isMaxHost) continue;
                        if (c.classList.contains('devonly') && !isDev) continue;
                        hasLive = true;
                        break;
                    }
                    if (!hasLive) g.classList.add('rail-empty');
                }
            } catch (e) { /* defensive — don't break boot on rail cleanup */ }
        })();
