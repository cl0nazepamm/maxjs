<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MaxJS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #353535; position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; }
#hud {
            position: absolute; top: 8px; left: 8px;
            color: rgba(180, 180, 180, 0.8);
            font: 10px/1.4 'Segoe UI', system-ui, sans-serif;
            pointer-events: none;
            z-index: 20;
        }
        #info {
            background: rgba(20, 20, 20, 0.55);
            padding: 4px 8px;
            border-radius: 6px;
            margin-bottom: 5px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(16px);
        }
        #controls {
            pointer-events: auto;
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            max-width: min(880px, calc(100vw - 32px));
        }
        #controls button {
            background: rgba(255, 255, 255, 0.06);
            color: #999;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 3px 9px;
            border-radius: 5px;
            font: 10px/1 'Segoe UI', system-ui, sans-serif;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            cursor: pointer;
            backdrop-filter: blur(12px);
            transition: all 0.15s ease;
        }
        #controls button.active {
            background: rgba(64, 200, 176, 0.1);
            color: #40c8b0;
            border-color: rgba(64, 200, 176, 0.35);
        }
        #controls button:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ccc;
        }
        /* ── Side Panel ─────────────────────────────── */
        .sidepanel-resize {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 5px;
            cursor: ew-resize;
            z-index: 2;
            border-radius: 10px 0 0 10px;
            transition: background 0.15s ease;
        }
        .sidepanel-resize:hover,
        .sidepanel-resize.active {
            background: rgba(64, 200, 176, 0.25);
        }
        .sidepanel {
            position: absolute;
            top: 8px;
            right: 8px;
            width: min(280px, calc(100vw - 16px));
            min-width: 200px;
            max-width: calc(100vw - 16px);
            max-height: calc(100vh - 16px);
            padding: 8px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(30, 30, 30, 0.72);
            color: #bbb;
            font: 11px/1.4 'Segoe UI', system-ui, sans-serif;
            backdrop-filter: blur(28px) saturate(1.4);
            -webkit-backdrop-filter: blur(28px) saturate(1.4);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.06),
                inset 0 -1px 0 rgba(0, 0, 0, 0.2);
            overflow-y: auto;
            overflow-x: hidden;
            opacity: 0;
            pointer-events: none;
            transform: translateX(14px) scale(0.98);
            transition: opacity 0.2s ease, transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 30;
            scrollbar-width: thin;
            scrollbar-color: rgba(120,120,120,0.2) transparent;
        }
        .sidepanel::-webkit-scrollbar { width: 4px; }
        .sidepanel::-webkit-scrollbar-track { background: transparent; }
        .sidepanel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
        .sidepanel.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(0) scale(1);
        }
        .sidepanel-left {
            right: auto;
            left: 8px;
            transform: translateX(-14px) scale(0.98);
        }
        .sidepanel-left.visible {
            transform: translateX(0) scale(1);
        }
        .sidepanel-left .sidepanel-resize {
            left: auto;
            right: 0;
            border-radius: 0 10px 10px 0;
        }
        .layer-item {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 6px;
            padding: 5px 6px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .layer-item.error {
            border-color: rgba(255, 80, 80, 0.3);
        }
        .layer-item.inactive {
            opacity: 0.45;
        }
        .layer-main {
            min-width: 0;
        }
        .layer-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
        }
        .layer-name {
            font-size: 11px;
            color: #ccc;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .layer-source {
            font-size: 9px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #8a8a8a;
            padding: 1px 4px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
        }
        .layer-source.project {
            color: #8fd4ff;
            border-color: rgba(90, 180, 255, 0.22);
        }
        .layer-source.inline {
            color: #ffd27a;
            border-color: rgba(255, 180, 80, 0.18);
        }
        .layer-status {
            font-size: 9px;
            color: #666;
            flex-shrink: 0;
        }
        .layer-status.live { color: #40c8b0; }
        .layer-status.err { color: #ff5050; }
        .layer-status.off { color: #9e9e9e; }
        .layer-detail {
            margin-top: 3px;
            font-size: 9px;
            color: #6f6f6f;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .layer-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        .layer-action {
            border-radius: 3px;
            padding: 1px 5px;
            font: 9px/1 'Segoe UI', system-ui, sans-serif;
            cursor: pointer;
            flex-shrink: 0;
        }
        .layer-toggle {
            background: rgba(64, 200, 176, 0.08);
            border: 1px solid rgba(64, 200, 176, 0.22);
            color: #65d3bf;
        }
        .layer-toggle:hover {
            background: rgba(64, 200, 176, 0.18);
        }
        .layer-remove {
            background: rgba(255, 80, 80, 0.1);
            border: 1px solid rgba(255, 80, 80, 0.2);
            color: #ff6666;
        }
        .layer-remove:hover {
            background: rgba(255, 80, 80, 0.25);
        }
        .layers-empty {
            color: #555;
            font-size: 10px;
            text-align: center;
            padding: 12px 0;
        }
        .sidepanel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 6px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .sidepanel-title {
            font-size: 12px;
            font-weight: 700;
            color: #ddd;
        }
        .sidepanel-subtitle {
            color: #888;
            font-size: 10px;
        }
        .sidepanel button,
        .fx-toggle {
            background: rgba(255, 255, 255, 0.06);
            color: #aaa;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 5px;
            padding: 3px 7px;
            font: 10px/1 'Segoe UI', system-ui, sans-serif;
            font-weight: 600;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.15s ease;
            white-space: nowrap;
            backdrop-filter: blur(4px);
        }
        .sidepanel button:hover,
        .fx-toggle:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ccc;
        }
        .fx-toggle.active {
            background: rgba(64, 200, 176, 0.12);
            border-color: rgba(64, 200, 176, 0.5);
            color: #40c8b0;
            box-shadow: 0 0 8px rgba(64, 200, 176, 0.1);
        }
        .sidepanel button:disabled,
        .fx-toggle:disabled,
        .sidepanel input:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }
        .sidepanel-body {
            display: grid;
            gap: 4px;
        }
        .snapshot-grid {
            display: grid;
            gap: 6px;
        }
        .snapshot-inline {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            align-items: center;
        }
        .snapshot-inline input[type="number"] {
            width: 72px;
            background: rgba(255, 255, 255, 0.05);
            color: #bbb;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 5px;
            padding: 4px 6px;
            font: 10px/1 'Segoe UI', system-ui, sans-serif;
        }
        .snapshot-actions {
            display: flex;
            gap: 6px;
        }
        .snapshot-actions button {
            flex: 1 1 0;
        }
        .snapshot-note {
            color: #777;
            font-size: 9px;
            line-height: 1.35;
        }
        /* ── FX Sections ───────────────────────────── */
        .fx-section {
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 7px;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px;
            transition: background 0.15s ease, border-color 0.15s ease;
        }
        .fx-section:hover {
            background: rgba(255, 255, 255, 0.045);
            border-color: rgba(255, 255, 255, 0.08);
        }
        .fx-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }
        .fx-section-title {
            font-size: 10px;
            font-weight: 700;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .fx-section-copy {
            display: none;
        }
        .fx-grid {
            display: grid;
            gap: 3px;
            margin-top: 5px;
        }
        .fx-control {
            display: grid;
            gap: 1px;
        }
        .fx-control-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
            font-size: 10px;
            color: #999;
        }
        .fx-check {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
            font-size: 10px;
            color: #999;
        }
        .fx-value {
            color: #ddd;
            font-size: 10px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }
        /* ── Custom Range Slider ───────────────────── */
        .fx-range {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 3px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            cursor: pointer;
        }
        .fx-range::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #40c8b0;
            border: 1px solid #2a9a85;
            box-shadow: 0 0 4px rgba(60, 200, 175, 0.3);
            cursor: pointer;
            transition: box-shadow 0.12s ease, transform 0.1s ease;
        }
        .fx-range::-webkit-slider-thumb:hover {
            transform: scale(1.25);
            box-shadow: 0 0 8px rgba(60, 200, 175, 0.5);
        }
        .fx-range::-webkit-slider-thumb:active {
            transform: scale(1.1);
            background: #50d8c0;
        }
        .fx-range::-moz-range-thumb {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #40c8b0;
            border: 1px solid #2a9a85;
            box-shadow: 0 0 4px rgba(60, 200, 175, 0.3);
            cursor: pointer;
        }
        .fx-range::-moz-range-track {
            height: 3px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.1);
        }
        /* ── Custom Checkbox (toggle switch) ────────── */
        .fx-check input[type="checkbox"] {
            -webkit-appearance: none;
            appearance: none;
            width: 26px;
            height: 13px;
            border-radius: 7px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
            transition: background 0.15s ease, border-color 0.15s ease;
        }
        .fx-check input[type="checkbox"]::after {
            content: '';
            position: absolute;
            top: 1px;
            left: 1px;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transition: transform 0.15s cubic-bezier(0.16, 1, 0.3, 1), background 0.15s ease;
        }
        .fx-check input[type="checkbox"]:checked {
            background: rgba(64, 200, 176, 0.15);
            border-color: rgba(64, 200, 176, 0.4);
        }
        .fx-check input[type="checkbox"]:checked::after {
            transform: translateX(13px);
            background: #40c8b0;
            box-shadow: 0 0 4px rgba(64, 200, 176, 0.4);
        }
        .fx-note {
            margin-top: 3px;
            min-height: 0;
            color: #777;
            font-size: 9px;
            line-height: 1.3;
        }
        .fx-note:empty { display: none; }
        .fx-note.error {
            color: #e88;
        }
        .fx-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .fx-row-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-width: 48px;
            font-size: 10px;
            color: #999;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div id="info">MaxJS Live — hot reload works!</div>
        <div id="controls">
            <button id="btnKill" class="maxonly devonly">Kill</button>
            <button id="btnRefresh" class="maxonly devonly">Refresh</button>
            <button id="btnSnapshot" class="maxonly devonly">Snapshot</button>
            <button id="btnSnapshotPanel" class="maxonly devonly">Snap Opts</button>
            <button id="btnCamLock" class="active devonly">Cam Lock: ON</button>
            <button id="btnEnv" class="devonly">Env: OFF</button>
            <button id="btnLightProbe" class="active devonly">Probe: ON</button>
            <button id="btnLayersPanel" class="maxonly devonly">Layers</button>
            <button id="btnPostFxPanel" class="devonly">Post FX</button>
            <button id="btnDebug" style="display:none">Debug</button>
        </div>
    </div>
    <aside id="layersPanel" class="sidepanel sidepanel-left" aria-hidden="true" inert></aside>
    <aside id="snapshotPanel" class="sidepanel" aria-hidden="true" inert></aside>
    <aside id="postPanel" class="sidepanel" aria-hidden="true" inert></aside>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.webgpu.js",
            "three-std": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js",
            "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.webgpu.js",
            "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.tsl.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/",
            "@sparkjsdev/spark": "./node_modules/@sparkjsdev/spark/dist/spark.module.js"
        },
        "scopes": {
            "./node_modules/@sparkjsdev/spark/": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js"
            }
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import * as THREE_STD from 'three-std';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { HDRLoader } from 'three/addons/loaders/HDRLoader.js';
        import { EXRLoader } from 'three/addons/loaders/EXRLoader.js';
        import { MaterialXLoader } from 'three/addons/loaders/MaterialXLoader.js';
        import { LightProbeGenerator } from 'three/addons/lights/LightProbeGenerator.js';
        import { RectAreaLightTexturesLib } from 'three/addons/lights/RectAreaLightTexturesLib.js';
        import { hashBlur } from 'three/addons/tsl/display/hashBlur.js';
        import { XRButton } from 'three/addons/webxr/XRButton.js';
        import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';
        import { SkyMesh } from 'three/addons/objects/SkyMesh.js';
        // Spark.js uses GLSL3/ShaderChunk — needs WebGL THREE build (scoped in importmap).
        // Lazy-import to avoid crashing on page load.
        let Spark = null;
        import {
            color as tslColor,
            float as tslFloat,
            linearDepth,
            screenUV,
            texture as tslTexture,
            viewportLinearDepth,
            viewportSharedTexture,
        } from 'three/tsl';
        import * as TSL from 'three/tsl';
        import { applyDeltaFrame } from './js/protocol.js';
        import { createPerfHud } from './js/perf_hud.js';
        import { createSSGIController } from './js/ssgi_fx.js';
        import { createLayerManager } from './js/layer_manager.js';
        import { createMaxJSAnimationSystem } from './js/maxjs_animation.js';
        import { createProjectRuntime } from './js/project_runtime.js';


        // ── Scene Setup (Y-up world + Max basis boundary) ───
        const hiddenBackgroundColor = 0x353535;
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(hiddenBackgroundColor);
        const maxBasisRoot = new THREE.Group();
        maxBasisRoot.name = '__maxjs_max_basis_root__';
        maxBasisRoot.rotation.x = -Math.PI / 2;
        scene.add(maxBasisRoot);
        const maxRoot = new THREE.Group();
        maxRoot.name = '__maxjs_max_root__';
        maxBasisRoot.add(maxRoot);
        const jsRoot = new THREE.Group();
        jsRoot.name = '__maxjs_js_root__';
        scene.add(jsRoot);
        const overlayRoot = new THREE.Group();
        overlayRoot.name = '__maxjs_overlay_root__';
        maxBasisRoot.add(overlayRoot);

        const MAX_TO_WORLD_ROTATION_X = -Math.PI / 2;
        const MAX_TO_WORLD_QUATERNION = new THREE.Quaternion()
            .setFromEuler(new THREE.Euler(MAX_TO_WORLD_ROTATION_X, 0, 0, 'XYZ'));
        const WORLD_TO_MAX_QUATERNION = MAX_TO_WORLD_QUATERNION.clone().invert();
        const MAX_TO_WORLD_MATRIX = new THREE.Matrix4()
            .makeRotationFromQuaternion(MAX_TO_WORLD_QUATERNION);
        const MAX_TO_WORLD_MATRIX_STD = new THREE_STD.Matrix4()
            .makeRotationX(MAX_TO_WORLD_ROTATION_X);
        const cameraTargetWorld = new THREE.Vector3();
        const cameraPositionWorld = new THREE.Vector3();
        const lightTargetWorld = new THREE.Vector3();

        function readVector3(target, value) {
            if (Array.isArray(value) || ArrayBuffer.isView(value)) {
                target.set(value[0] ?? 0, value[1] ?? 0, value[2] ?? 0);
                return target;
            }
            if (value && Number.isFinite(value.x) && Number.isFinite(value.y) && Number.isFinite(value.z)) {
                target.set(value.x, value.y, value.z);
                return target;
            }
            target.set(0, 0, 0);
            return target;
        }

        function copyMaxArrayToWorld(target, values) {
            target.set(values[0], values[1], values[2]);
            target.applyQuaternion(MAX_TO_WORLD_QUATERNION);
            return target;
        }

        function copyMaxComponentsToWorld(target, x, y, z) {
            target.set(x, y, z);
            target.applyQuaternion(MAX_TO_WORLD_QUATERNION);
            return target;
        }

        function copyMaxMatrixArrayToWorld(target, matrixArray) {
            target.fromArray(matrixArray);
            target.premultiply(MAX_TO_WORLD_MATRIX);
            return target;
        }

        function copyMaxMatrixArrayToWorldStd(target, matrixArray) {
            target.fromArray(matrixArray);
            target.premultiply(MAX_TO_WORLD_MATRIX_STD);
            return target;
        }

        const cameraDefaultPosition = copyMaxComponentsToWorld(new THREE.Vector3(), 200, -200, 150);
        const cameraDefaultDirection = cameraDefaultPosition.clone().normalize();
        const sceneSpace = Object.freeze({
            maxUpAxis: Object.freeze(new THREE.Vector3(0, 0, 1)),
            worldUpAxis: Object.freeze(new THREE.Vector3(0, 1, 0)),
            toWorldPosition(value, target = new THREE.Vector3()) {
                return readVector3(target, value).applyQuaternion(MAX_TO_WORLD_QUATERNION);
            },
            toWorldDirection(value, target = new THREE.Vector3()) {
                return readVector3(target, value).applyQuaternion(MAX_TO_WORLD_QUATERNION);
            },
            toWorldMatrix(value, target = new THREE.Matrix4()) {
                return copyMaxMatrixArrayToWorld(target, value);
            },
            toMaxPosition(value, target = new THREE.Vector3()) {
                return readVector3(target, value).applyQuaternion(WORLD_TO_MAX_QUATERNION);
            },
        });

        function getActiveCameraWorldPosition(target = new THREE.Vector3()) {
            const activeCamera = renderer.xr?.isPresenting ? renderer.xr.getCamera(camera) : camera;
            return activeCamera.getWorldPosition(target);
        }

        const perspCamera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 100000);
        const orthoCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 100000);
        perspCamera.up.set(0, 1, 0);
        orthoCamera.up.set(0, 1, 0);
        perspCamera.position.copy(cameraDefaultPosition);
        let camera = perspCamera;

        function configureRenderer(nextRenderer) {
            nextRenderer.setSize(innerWidth, innerHeight);
            nextRenderer.setPixelRatio(devicePixelRatio);
            nextRenderer.toneMapping = THREE.ACESFilmicToneMapping;
            nextRenderer.toneMappingExposure = 1.2;
            nextRenderer.shadowMap.enabled = true;
            nextRenderer.domElement.style.position = 'absolute';
            nextRenderer.domElement.style.inset = '0';
            nextRenderer.domElement.style.zIndex = '0';
            document.body.appendChild(nextRenderer.domElement);
        }

        async function createRenderer() {
            // Check if VR mode was requested (forces WebGL for XR compat)
            const forceVR = sessionStorage.getItem('maxjs_force_webgl') === '1';
            if (forceVR) sessionStorage.removeItem('maxjs_force_webgl');

            let nextRenderer;
            let backendLabel;

            if (forceVR) {
                nextRenderer = new THREE.WebGPURenderer({ antialias: true, alpha: true, forceWebGL: true });
                backendLabel = 'WebGL2 (VR)';
                configureRenderer(nextRenderer);
                await nextRenderer.init();
            } else {
                nextRenderer = new THREE.WebGPURenderer({ antialias: true, alpha: true });
                backendLabel = 'WebGPU';
                try {
                    configureRenderer(nextRenderer);
                    await nextRenderer.init();
                } catch (error) {
                    console.warn('MaxJS WebGPU init failed, retrying with forced WebGL2 backend.', error);
                    nextRenderer.domElement.remove();
                    nextRenderer.dispose?.();
                    nextRenderer = new THREE.WebGPURenderer({ antialias: true, alpha: true, forceWebGL: true });
                    backendLabel = 'WebGL2 fallback';
                    configureRenderer(nextRenderer);
                    await nextRenderer.init();
                }
            }

            return { renderer: nextRenderer, backendLabel };
        }

        let renderer = null;
        let rendererBackendLabel = 'WebGPU';
        try {
            ({ renderer, backendLabel: rendererBackendLabel } = await createRenderer());
        } catch (error) {
            const message = error?.message || String(error);

        function createSolidTexture(r, g, b, a = 255) {

        async function updateLightProbeFromHDRI(hdrTex, probeSignature, loadGeneration) {
            const captureScene = new THREE.Scene();

            const CubeRenderTargetCtor =
                typeof THREE.WebGLCubeRenderTarget === 'function'

            const CubeCameraCtor =
                typeof THREE.CubeCamera === 'function'

                hasLightProbeData = false;

            const cubeRenderTarget = new CubeRenderTargetCtor(128, {

            const cubeCamera = new CubeCameraCtor(0.1, 10, cubeRenderTarget);

        function normalizeTextureTransform(xf) {
            if (!xf) return null;
            return {
                scale: Number.isFinite(xf.scale) && Math.abs(xf.scale) > 1e-6 ? xf.scale : 1.0,
                tiling: [
                    Number.isFinite(xf.tiling?.[0]) ? xf.tiling[0] : 1.0,
                    Number.isFinite(xf.tiling?.[1]) ? xf.tiling[1] : 1.0,
                ],
                offset: [
                    Number.isFinite(xf.offset?.[0]) ? xf.offset[0] : 0.0,
                    Number.isFinite(xf.offset?.[1]) ? xf.offset[1] : 0.0,
                ],
                rotate: Number.isFinite(xf.rotate) ? xf.rotate : 0.0,
                center: [
                    Number.isFinite(xf.center?.[0]) ? xf.center[0] : 0.5,
                    Number.isFinite(xf.center?.[1]) ? xf.center[1] : 0.5,
                ],
                realWorld: !!xf.realWorld,
                realWidth: Number.isFinite(xf.realWidth) && Math.abs(xf.realWidth) > 1e-6 ? xf.realWidth : 1.0,
                realHeight: Number.isFinite(xf.realHeight) && Math.abs(xf.realHeight) > 1e-6 ? xf.realHeight : 1.0,
                wrap: typeof xf.wrap === 'string' ? xf.wrap : 'periodic',
                channel: Number.isFinite(xf.channel) ? Math.max(1, Math.round(xf.channel)) : 1,
                invert: !!xf.invert,
                colorSpace: typeof xf.colorSpace === 'string' ? xf.colorSpace : '',
                manualGamma: Number.isFinite(xf.manualGamma) ? xf.manualGamma : 1.0,
            };

        function wrapModeToThree(mode) {
            switch ((mode || 'periodic').toLowerCase()) {
                case 'mirror': return THREE.MirroredRepeatWrapping;
                case 'clamp':
                case 'black': return THREE.ClampToEdgeWrapping;
                case 'default':
                case 'periodic':
                default: return THREE.RepeatWrapping;
            }
        }

        function applyTextureTransform(tex, xf) {
            const wrap = wrapModeToThree(xf?.wrap);
            tex.wrapS = tex.wrapT = wrap;

            if (!xf) return;

            const worldScaleU = xf.realWorld ? xf.realWidth : 1.0;
            const worldScaleV = xf.realWorld ? xf.realHeight : 1.0;
            const repeatU = xf.tiling[0] / worldScaleU / xf.scale;
            const repeatV = xf.tiling[1] / worldScaleV / xf.scale;

            tex.repeat.set(repeatU, repeatV);
            tex.offset.set(-xf.offset[0] * repeatU, -xf.offset[1] * repeatV);
            tex.center.set(xf.center[0], xf.center[1]);
            tex.rotation = THREE.MathUtils.degToRad(xf.rotate);
            tex.updateMatrix();
        }

        function applyFallbackImage(tex, fallbackTex, colorSpace, xf, url) {

        function configureGradientTexture(tex) {

            tex.minFilter = tex.magFilter = THREE.NearestFilter;

        function applyTextureChannelSelection(tex, xf) {
            const channel = xf?.channel ?? 1;
            const invert = !!xf?.invert;
            if (channel <= 1 && !invert) return;

            const image = tex?.image;
            const width = image?.width ?? image?.videoWidth ?? 0;
            const height = image?.height ?? image?.videoHeight ?? 0;
            if (!width || !height) return;

            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            if (!ctx) return;

            ctx.drawImage(image, 0, 0, width, height);
            const imageData = ctx.getImageData(0, 0, width, height);
            const { data } = imageData;

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                const a = data[i + 3];
                if (channel <= 1) {
                    data[i] = 255 - r;
                    data[i + 1] = 255 - g;
                    data[i + 2] = 255 - b;
                    continue;
                }

                let value = r;

                switch (channel) {
                case 2:
                    value = r;
                    break;
                case 3:
                    value = g;
                    break;
                case 4:
                    value = b;
                    break;
                case 5:
                    value = a;
                    break;
                case 6:
                    value = Math.round((0.2126 * r) + (0.7152 * g) + (0.0722 * b));
                    break;
                case 7:
                    value = Math.round((r + g + b) / 3);
                    break;
                default:
                    value = r;
                    break;
                }

                if (invert) value = 255 - value;
                data[i] = value;
                data[i + 1] = value;
                data[i + 2] = value;
                data[i + 3] = channel === 5 ? value : a;
            }

            ctx.putImageData(imageData, 0, 0);
            tex.image = canvas;
        }

        function resolveColorSpace(slotColorSpace, xf) {
            const cs = xf?.colorSpace;
            if (!cs) return slotColorSpace;
            const lc = cs.toLowerCase();
            if (lc === 'srgb' || lc === 'srgb texture') return THREE.SRGBColorSpace;
            if (lc === 'linear' || lc === 'raw' || lc === 'data' || lc === 'non-color') return THREE.LinearSRGBColorSpace;

            if (isAbsoluteWindowsPath(value)) return toAssetUrl(value);
            return value.replace(/\\/g, '/');

        function pickMaterialXMaterial(materials, md) {
            const entries = Object.entries(materials ?? {});
            if (!entries.length) return null;

            const requestedName = String(md.materialXName ?? '').trim();
            if (requestedName) {
                const namedEntry = entries.find(([name]) => name === requestedName);
                if (namedEntry) return namedEntry[1];
            }

            const requestedIndex = Number.isFinite(md.materialXIndex)
                ? Math.max(1, Math.round(md.materialXIndex))
                : 1;
            return entries[Math.min(entries.length - 1, requestedIndex - 1)][1];

        function createPendingMaterialXMaterial(md) {
            const material = new THREE.MeshPhysicalNodeMaterial({
                color: new THREE.Color(md.color[0], md.color[1], md.color[2]),
                roughness: md.rough ?? 0.5,
                metalness: md.metal ?? 0.0,
                side: md.side === 0 ? THREE.FrontSide : THREE.DoubleSide,

            if (md.opacity != null && md.opacity < 0.999) {

            material.userData ??= {};
            material.userData.maxjsMaterialXPending = true;
            material.needsUpdate = true;

        function normalizeMaterialXDocument(text) {
            const source = String(text ?? '');
            if (!source.trim()) return source;

            const parser = new DOMParser();
            const doc = parser.parseFromString(source, 'application/xml');
            if (doc.querySelector('parsererror')) return source;

            const hasNamedChild = (node, name) => Array.from(node.children).some(child => child.getAttribute('name') === name);
            const appendElement = (node, tagName, attrs) => {
                const child = doc.createElement(tagName);
                for (const [key, value] of Object.entries(attrs)) child.setAttribute(key, value);
                node.appendChild(child);
            };

            const ensureNamedChild = (selector, name, tagName, attrs) => {
                for (const node of doc.querySelectorAll(selector)) {
                    if (!hasNamedChild(node, name)) appendElement(node, tagName, { name, ...attrs });
                }
            };

            // Max's MaterialX export can omit the procedural coordinate input,
            // while Three's MaterialXLoader only wires what is explicitly present.
            ensureNamedChild('noise2d, cellnoise2d, worleynoise2d, unifiednoise2d', 'texcoord', 'texcoord', { type: 'vector2' });
            ensureNamedChild('noise3d, cellnoise3d, worleynoise3d, unifiednoise3d', 'texcoord', 'position', { type: 'vector3' });
            ensureNamedChild('fractal3d', 'position', 'position', { type: 'vector3' });

            return new XMLSerializer().serializeToString(doc);
        }

        function applyLoadedMaterialXTemplate(target, source, md) {
            target.copy(source);

            target.side = md.side === 0 ? THREE.FrontSide : THREE.DoubleSide;

        async function ensureMaterialXTemplateLoaded(cacheKey, template, md) {
            if (!md.materialXFile && !md.materialXInline) return template;

            let pending = materialXLoadCache.get(cacheKey);
            if (pending) return pending;

            const manager = new THREE.LoadingManager();
            manager.setURLModifier(url => normalizeMaterialXResourceUrl(url));

            const loader = new MaterialXLoader(manager);
            if (md.materialXBase) loader.setPath(md.materialXBase);

            // Get MaterialX XML — either from inline string or file fetch
            const getXml = md.materialXInline
                ? Promise.resolve(md.materialXInline)
                : fetch(md.materialXFile, { cache: 'no-store' })
                    .then(response => {
                        if (!response.ok) {
                            throw new Error(`MaterialX fetch failed: ${response.status} ${response.statusText}`);
                        }
                        return response.text();
                    });

            pending = getXml
                .then(text => loader.parse(normalizeMaterialXDocument(text)))
                .then(({ materials }) => {
                    const loadedMaterial = pickMaterialXMaterial(materials, md);
                    if (!loadedMaterial) {
                        throw new Error(`No MaterialX material resolved for ${md.materialXFile || 'inline'}`);
                    }

                    applyLoadedMaterialXTemplate(template, loadedMaterial, md);
                    return template;

                .catch(error => {

                    template.userData ??= {};
                    template.userData.maxjsMaterialXPending = false;
                    template.needsUpdate = true;
                    return template;
                })
                .finally(() => {
                    materialXLoadCache.delete(cacheKey);
                });

            materialXLoadCache.set(cacheKey, pending);
            return pending;
        }

        function loadVideoTexture(url, xf) {
            const playbackKey = JSON.stringify({

                muted: xf?.muted !== false,

            const cacheKey = `video:${url}:${playbackKey}`;
            if (textureCache.has(cacheKey)) return textureCache.get(cacheKey);
            const video = document.createElement('video');
            video.src = url;
            video.crossOrigin = 'anonymous';
            video.loop = xf?.loop !== false;
            video.muted = xf?.muted !== false;
            video.playbackRate = xf?.rate ?? 1.0;
            video.playsInline = true;
            video.autoplay = true;
            video.play().catch(() => {});
            const tex = new THREE.VideoTexture(video);
            tex.colorSpace = THREE.SRGBColorSpace;
            tex.minFilter = THREE.LinearFilter;
            tex.magFilter = THREE.LinearFilter;
            textureCache.set(cacheKey, tex);
            return tex;

            colorSpace = resolveColorSpace(colorSpace, xf);
            const normalizedXf = normalizeTextureTransform(xf);
            const cacheKey = JSON.stringify([url, String(colorSpace), normalizedXf]);
            if (textureCache.has(cacheKey)) return textureCache.get(cacheKey);
            const tex = textureLoader.load(
                url,
                loadedTex => {
                    applyTextureChannelSelection(loadedTex, normalizedXf);
                    loadedTex.colorSpace = colorSpace;
                    applyTextureTransform(loadedTex, normalizedXf);
                    loadedTex.needsUpdate = true;
                },
                undefined,
                () => applyFallbackImage(tex, fallbackTex, colorSpace, normalizedXf, url)
            );
            tex.colorSpace = colorSpace;
            applyTextureTransform(tex, normalizedXf);
            textureCache.set(cacheKey, tex);
            return tex;
        }

        // Evaluate TSL texture code — code must return a THREE.Texture or THREE.DataTexture
        function evalTSLTexture(code, tslParams) {
            if (!code) return null;
            const cacheKey = 'tsl_tex:' + code + JSON.stringify(tslParams || {});
            if (textureCache.has(cacheKey)) return textureCache.get(cacheKey);
            try {
                const params = buildTSLParams(code, tslParams || {});
                const fn = new Function('THREE', 'TSL', 'params', code);
                const result = fn(THREE, TSL, params);
                if (result && result.isTexture) {
                    result.needsUpdate = true;
                    textureCache.set(cacheKey, result);
                    return result;
                }
                console.warn('[TSL Texture] Code did not return a Texture');
            } catch (err) {
                console.error('[TSL Texture] Eval error:', err);
            }
            return null;
        }

        // Load a map slot — checks for TSL procedural texture first, then falls back to URL
        function loadMapSlot(md, key, colorSpace, xfKey, fallback) {
            const tslCode = md[key + 'TSL'];
            if (tslCode) return evalTSLTexture(tslCode, md[key + 'TSLParams']);
            const url = md[key];
            if (url) return loadTexture(url, colorSpace, xfKey ? md[xfKey] : null, fallback);
            return null;
        }

        function refreshLightProbeFromCurrentHDRI() {
            if (!currentEnvParams?.hdri) return;
            loadHDRI(currentEnvParams, { forceProbeRefresh: true });
        }

        function loadHDRI(envParams, options = {}) {
            if (!envParams?.hdri) return;
            currentEnvParams = envParams;

            let hdriUrl = envParams.hdri;
            try {
                hdriUrl = new URL(envParams.hdri, window.location.href).href;
            } catch {
                hdriUrl = envParams.hdri;
            }

            // Exposure
            renderer.toneMappingExposure = Math.pow(2, envParams.exp || 0) * (envParams.gamma || 1.0);

            const rot = (envParams.rot || 0) * Math.PI / 180;
            scene.environmentRotation.set(0, -rot, 0);
            scene.backgroundRotation.set(0, -rot, 0);
            const probeSignature = JSON.stringify([hdriUrl, envParams.rot || 0, envParams.flip || 0, envParams.zup || 0]);
            const shouldRefreshTexture = hdriUrl !== currentHdriUrl;
            const shouldRefreshProbe = !!options.forceProbeRefresh
                || probeSignature !== currentHdriProbeSignature
                || !hasLightProbeData;

            if (!shouldRefreshTexture && !shouldRefreshProbe) return;

            currentHdriUrl = hdriUrl;
            currentHdriProbeSignature = probeSignature;
            hdriLoadGeneration += 1;
            const loadGeneration = hdriLoadGeneration;

            rgbeLoader.load(hdriUrl, async (hdrTex) => {
                if (loadGeneration !== hdriLoadGeneration) {
                    hdrTex.dispose();
                    return;
                }
                hdrTex.mapping = THREE.EquirectangularReflectionMapping;
                const envMap = pmremGenerator.fromEquirectangular(hdrTex).texture;
                scene.environment = envMap;
                if (envVisible) scene.background = envMap;
                defaultLights.visible = false;
                if (lightProbeEnabled || shouldRefreshProbe) {
                    await updateLightProbeFromHDRI(hdrTex, probeSignature, loadGeneration);
                }
                hdrTex.dispose();
                ssgiFx.markEnvironmentChanged?.();
            }, undefined, (error) => {
                console.error('MaxJS HDRI load failed', { hdriUrl, error });
                currentHdriUrl = null;
                currentHdriProbeSignature = null;
                currentEnvParams = null;
                scene.environment = null;
                clearLightProbe();
                if (envVisible) scene.background = new THREE.Color(hiddenBackgroundColor);
                defaultLights.visible = true;
                ssgiFx.markEnvironmentChanged?.();
            });
        }

        // ── Local HDRI (independent of Max) ─────────────────
        // Persist HDRI across page reloads (VR mode switch) via IndexedDB
        const HDRI_DB_NAME = 'maxjs_hdri_cache';
        const HDRI_DB_STORE = 'files';

        function openHdriDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(HDRI_DB_NAME, 1);
                req.onupgradeneeded = () => req.result.createObjectStore(HDRI_DB_STORE);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        async function stashHdriFile(file) {
            try {
                const db = await openHdriDB();
                const buf = await file.arrayBuffer();
                const tx = db.transaction(HDRI_DB_STORE, 'readwrite');
                tx.objectStore(HDRI_DB_STORE).put({ name: file.name, buffer: buf }, 'current');
                db.close();
            } catch (e) { console.warn('[MaxJS] HDRI stash failed:', e); }
        }

        async function restoreStashedHdri() {
            try {
                const db = await openHdriDB();
                const tx = db.transaction(HDRI_DB_STORE, 'readonly');
                const req = tx.objectStore(HDRI_DB_STORE).get('current');
                return new Promise((resolve) => {
                    req.onsuccess = () => {
                        db.close();
                        const data = req.result;
                        if (data?.buffer && data?.name) {
                            resolve(new File([data.buffer], data.name));
                        } else {
                            resolve(null);
                        }
                    };
                    req.onerror = () => { db.close(); resolve(null); };
                });
            } catch { return null; }
        }

        async function clearStashedHdri() {
            try {
                const db = await openHdriDB();
                const tx = db.transaction(HDRI_DB_STORE, 'readwrite');
                tx.objectStore(HDRI_DB_STORE).delete('current');
                db.close();
            } catch {}
        }

        function loadLocalHDRIFile(file, { preserveEnabled = false } = {}) {
            if (localHdriObjectUrl) URL.revokeObjectURL(localHdriObjectUrl);
            if (localHdriEnvMap) { localHdriEnvMap.dispose(); localHdriEnvMap = null; }
            localHdriObjectUrl = URL.createObjectURL(file);
            localHdriFileName = file.name;
            if (!preserveEnabled) localHdriEnabled = true;
            void stashHdriFile(file);

            const isExr = file.name.toLowerCase().endsWith('.exr');
            const loader = isExr ? exrLoader : rgbeLoader;

            hdriLoadGeneration += 1;
            const loadGen = hdriLoadGeneration;

            loader.load(localHdriObjectUrl, async (hdrTex) => {
                if (loadGen !== hdriLoadGeneration) { hdrTex.dispose(); return; }
                hdrTex.mapping = THREE.EquirectangularReflectionMapping;
                localHdriEnvMap = pmremGenerator.fromEquirectangular(hdrTex).texture;
                applyLocalHDRIToScene();
                currentHdriUrl = localHdriObjectUrl;
                if (lightProbeEnabled) {
                    await updateLightProbeFromHDRI(hdrTex, 'local-' + localHdriFileName, loadGen);
                }
                hdrTex.dispose();
                ssgiFx.markEnvironmentChanged?.();
                savePostFxState();
                syncHdriPanel();
            }, undefined, (error) => {
                console.error('MaxJS local HDRI load failed', error);
                clearLocalHDRI();
            });
        }

        function applyLocalHDRIToScene() {
            if (!localHdriEnvMap) return;
            if (localHdriEnabled) {
                localHdriShowBg = envVisible;
                scene.environment = localHdriEnvMap;
                scene.environmentIntensity = localHdriIntensity;
                const rot = localHdriRotation * Math.PI / 180;
                scene.environmentRotation.set(0, -rot, 0);
                scene.backgroundRotation.set(0, -rot, 0);
                if (localHdriFlip) {
                    scene.environmentRotation.y += Math.PI;
                    scene.backgroundRotation.y += Math.PI;
                }
                scene.backgroundBlurriness = localHdriBlur;
                if (localHdriShowBg) {
                    scene.background = localHdriEnvMap;
                    scene.backgroundIntensity = localHdriIntensity;
                } else {
                    scene.background = new THREE.Color(hiddenBackgroundColor);
                }
                defaultLights.visible = false;
            } else {
                scene.environment = null;
                scene.background = new THREE.Color(hiddenBackgroundColor);
                defaultLights.visible = true;
            }
        }

        function applyLocalHDRISettings() {
            if (!isLocalHdriActive()) return;
            applyLocalHDRIToScene();
        }

        function toggleLocalHDRI(enabled) {
            localHdriEnabled = enabled;
            applyLocalHDRIToScene();
            ssgiFx.markEnvironmentChanged?.();
            savePostFxState();
            syncHdriPanel();
        }

        function clearLocalHDRI() {
            localHdriFileName = '';
            localHdriEnabled = true;
            if (localHdriEnvMap) { localHdriEnvMap.dispose(); localHdriEnvMap = null; }
            if (localHdriObjectUrl) { URL.revokeObjectURL(localHdriObjectUrl); localHdriObjectUrl = null; }
            void clearStashedHdri();
            currentHdriUrl = null;
            currentHdriProbeSignature = '';
            scene.environment = null;
            scene.environmentIntensity = 1.0;
            scene.environmentRotation.set(0, 0, 0);
            scene.backgroundRotation.set(0, 0, 0);
            scene.backgroundBlurriness = 0;
            scene.background = new THREE.Color(hiddenBackgroundColor);
            clearLightProbe();
            defaultLights.visible = true;
            ssgiFx.markEnvironmentChanged?.();
            savePostFxState();
            syncHdriPanel();
        }

        function syncHdriPanel() {
            const nameEl = document.getElementById('fx-hdri-name');
            const toggleEl = document.getElementById('fx-hdri-toggle');
            if (nameEl) {
                nameEl.textContent = isLocalHdriLoaded()
                    ? localHdriFileName + (localHdriEnabled ? '' : ' (off)')
                    : 'No HDRI loaded';
            }
            if (toggleEl) {
                toggleEl.textContent = localHdriEnabled ? 'On' : 'Off';
                toggleEl.classList.toggle('active', localHdriEnabled && isLocalHdriLoaded());
            }
        }

        // ── Sky Environment ──────────────────────────────────
        // Matches the official Three.js webgpu_sky example pattern:
        // SkyMesh added directly to scene, no PMREM (broken with TSL).
        // Lighting via DirectionalLight (sun) + HemisphereLight (sky fill).
        let skyMesh = null;
        let skySunLight = null;
        let skyFillLight = null;
        let skyEnvMap = null;
        let lastSkySig = '';
        let skyActive = false;

        function applySky(skyParams) {
            if (!skyParams) return;

            const sig = JSON.stringify(skyParams);
            if (sig === lastSkySig) return;
            lastSkySig = sig;

            try {
                if (!skyMesh) {
                    skyMesh = new SkyMesh();
                    skyMesh.scale.setScalar(450000);
                    skyMesh.name = '__maxjs_sky__';
                    skyMesh.frustumCulled = false;
                }

                // Update sky uniforms — exact same pattern as official example
                skyMesh.turbidity.value = skyParams.turbidity;
                skyMesh.rayleigh.value = skyParams.rayleigh;
                skyMesh.mieCoefficient.value = skyParams.mieCoefficient;
                skyMesh.mieDirectionalG.value = skyParams.mieDirectionalG;

                // Sky lives in world space, so keep the shader on world Y-up and
                // convert the incoming Max sun direction at the boundary.
                skyMesh.upUniform.value.set(0, 1, 0);

                // Sun direction authored in Max space: elevation from XY plane,
                // azimuth around Z, then converted once into world Y-up space.
                const elevRad = THREE.MathUtils.degToRad(skyParams.elevation);
                const azimRad = THREE.MathUtils.degToRad(skyParams.azimuth);
                const sunDir = copyMaxComponentsToWorld(new THREE.Vector3(),
                    Math.cos(elevRad) * Math.sin(azimRad),
                    Math.cos(elevRad) * Math.cos(azimRad),
                    Math.sin(elevRad)
                );
                skyMesh.sunPosition.value.copy(sunDir);

                renderer.toneMappingExposure = skyParams.exposure;

                if (skyMesh.parent !== scene) scene.add(skyMesh);

                // Generate environment map from sky for PBR reflections
                const skyScene = new THREE.Scene();
                const skyCopy = skyMesh.clone();
                skyScene.add(skyCopy);
                if (skyEnvMap) skyEnvMap.dispose();
                skyEnvMap = pmremGenerator.fromScene(skyScene, 0, 0.1, 1000000).texture;
                skyCopy.geometry?.dispose?.();
                skyScene.clear();

                scene.background = null;
                scene.environment = skyEnvMap;
                scene.environmentRotation.identity();
                scene.backgroundRotation.identity();

                // Sun DirectionalLight along sun direction
                if (!skySunLight) {
                    skySunLight = new THREE.DirectionalLight(0xffffff, 2.0);
                    skySunLight.name = '__maxjs_sky_sun__';
                }
                if (skySunLight.parent !== scene) scene.add(skySunLight);
                const sunStrength = Math.max(0.1, Math.sin(elevRad));
                const warmth = 1.0 - sunStrength * 0.2;
                skySunLight.color.setRGB(1.0, warmth, warmth * 0.85);
                skySunLight.intensity = 1.0 + sunStrength * 3.0;
                skySunLight.position.copy(sunDir).multiplyScalar(200);

                // Sky fill HemisphereLight
                if (!skyFillLight) {
                    skyFillLight = new THREE.HemisphereLight(0x87CEEB, 0x362D1B, 1.0);
                    skyFillLight.name = '__maxjs_sky_fill__';
                }
                if (skyFillLight.parent !== scene) scene.add(skyFillLight);
                skyFillLight.intensity = 0.5 + sunStrength * 0.5;

                defaultLights.visible = false;
                skyActive = true;

                // Clear HDRI state
                currentHdriUrl = null;
                currentHdriProbeSignature = '';

                ssgiFx.markEnvironmentChanged?.();

            } catch (err) {
                console.error('[MaxJS] applySky error:', err);
            }
        }

        function removeSky() {
            lastSkySig = '';
            skyActive = false;
            if (skyMesh?.parent) skyMesh.parent.remove(skyMesh);
            if (skySunLight?.parent) skySunLight.parent.remove(skySunLight);
            if (skyFillLight?.parent) skyFillLight.parent.remove(skyFillLight);
            if (skyEnvMap) { skyEnvMap.dispose(); skyEnvMap = null; }
        }

        // ── Material Creation ───────────────────────────────
        function rememberMaterialEmissiveBase(material) {
            if (!material?.emissive) return;
            material.userData ??= {};
            material.userData.maxjsBaseEmissive = [
                material.emissive.r,
                material.emissive.g,
                material.emissive.b,
            ];
            material.userData.maxjsBaseEmissiveIntensity = Number.isFinite(material.emissiveIntensity)
                ? material.emissiveIntensity
                : 1.0;
        }

        function applyMaterialSelectionState(material, selected) {
            // Selection is now handled by outline post-processing pass
            // Just restore base emissive
            if (!material?.emissive) return;
            const base = material.userData?.maxjsBaseEmissive || [0, 0, 0];
            const baseIntensity = Number.isFinite(material.userData?.maxjsBaseEmissiveIntensity)
                ? material.userData.maxjsBaseEmissiveIntensity
                : 1.0;
            material.emissive.setRGB(base[0], base[1], base[2]);
            material.emissiveIntensity = baseIntensity;
        }

        function applyMeshShadowState(mesh) {
            if (!mesh?.isMesh) return;
            mesh.castShadow = true;
            mesh.receiveShadow = true;
        }

        function applyNodeProps(mesh, props) {
            if (!props) return;
            // Renderable toggle — works for both meshes and splines
            if (props.rend === 0) { mesh.visible = false; }
            if (!mesh?.isMesh) return;
            mesh.castShadow = props.cshadow !== 0;
            mesh.receiveShadow = props.rshadow !== 0;
            const side = props.bcull ? THREE.FrontSide : THREE.DoubleSide;
            const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
            for (const m of mats) {
                if (m && m.side !== side) m.side = side;
                if (!m) continue;
                if (props.opacity != null && props.opacity < 0.999) {
                    m.transparent = true;
                    m.opacity = props.opacity;
                } else if (m.userData?._propsOpacity) {
                    m.transparent = false;
                    m.opacity = 1.0;
                }
                if (!m.userData) m.userData = {};
                m.userData._propsOpacity = props.opacity != null && props.opacity < 0.999;
            }
        }

        function applyJsmodSyncState(mesh, enabled) {
            if (enabled) mesh.userData.jsmod = true;
            else delete mesh.userData.jsmod;
        }

        function applyBridgeVisibility(mesh, visibleFlag) {
            if (!mesh || mesh.userData.jsmod) return;
            const visible = visibleFlag == null ? true : visibleFlag !== 0;
            if (mesh.visible !== visible) mesh.visible = visible;
        }

        function applyInstanceSyncState(mesh, instOfHandle) {
            if (!mesh) return;
            if (Number.isFinite(instOfHandle) && instOfHandle > 0) mesh.userData.maxjsInstOf = instOfHandle;
            else delete mesh.userData.maxjsInstOf;
        }

        function applySSSMaterialNodes(material, md) {
            if (!material || typeof material !== 'object') return;

            const sssColor = Array.isArray(md.sssColor) && md.sssColor.length === 3
                ? new THREE.Color(md.sssColor[0], md.sssColor[1], md.sssColor[2])
                : new THREE.Color(1, 1, 1);
            let thicknessColorNode = tslColor(sssColor);

            if (md.sssMap) {
                const sssMap = loadTexture(md.sssMap, THREE.SRGBColorSpace, md.sssMapXf, fallbackWhiteTexture);
                thicknessColorNode = tslTexture(sssMap).rgb.mul(thicknessColorNode);
            }

            material.thicknessColorNode = thicknessColorNode;
            material.thicknessDistortionNode = tslFloat(md.sssDistortion ?? 0.1);
            material.thicknessAmbientNode = tslFloat(md.sssAmbient ?? 0.0);
            material.thicknessAttenuationNode = tslFloat(md.sssAttenuation ?? 0.1);
            material.thicknessPowerNode = tslFloat(md.sssPower ?? 2.0);
            material.thicknessScaleNode = tslFloat(md.sssScale ?? 10.0);
        }

        const utilityMaterialModels = new Set([

            'MeshDepthMaterial',
            'MeshBackdropNodeMaterial',
            'MeshLambertMaterial',
            'MeshMatcapMaterial',
            'MeshNormalMaterial',
            'MeshPhongMaterial',
        ]);

        function createBackdropUtilityMaterial(md) {
            const material = new THREE.MeshBasicNodeMaterial();
            const opacity = Math.min(1.0, Math.max(0.0, md.opacity ?? 1.0));
            const tintStrength = Math.max(0.0, md.mapS ?? 1.0);
            const blurStrength = Math.max(0.0, md.rough ?? 0.5);
            const pixelGrid = Math.max(8.0, (1.0 - Math.min(1.0, blurStrength)) * 128.0);
            const backdropMode = md.backdropMode ?? 0;
            const depthDistance = viewportLinearDepth.distance(linearDepth());
            const depthAlphaNode = depthDistance.oneMinus().smoothstep(0.90, 2.0).mul(10.0).saturate();
            const blurAmountNode = depthDistance.smoothstep(0.0, 0.6).mul(blurStrength * 40.0).clamp().mul(0.1);

            let tintNode = tslColor(new THREE.Color(md.color[0], md.color[1], md.color[2])).mul(tslFloat(tintStrength));
            let colorMapNode = null;

            if (md.map) {
                const tintMap = loadTexture(md.map, THREE.SRGBColorSpace, md.mapXf, fallbackWhiteTexture);
                colorMapNode = tslTexture(tintMap);
                tintNode = colorMapNode.rgb.mul(tintNode);
            }

            let flatOpacityNode = tslFloat(opacity);
            if (md.opMap) {
                const alphaMap = loadTexture(md.opMap, THREE.LinearSRGBColorSpace, md.opMapXf, fallbackWhiteTexture);
                flatOpacityNode = flatOpacityNode.mul(tslTexture(alphaMap).r.mul(tslFloat(md.opMapS ?? 1.0)));
            }
            const depthOpacityNode = depthAlphaNode.mul(flatOpacityNode);

            switch (backdropMode) {
            case 1:
                material.backdropNode = depthAlphaNode;
                material.opacityNode = depthOpacityNode;
                break;
            case 2:
                material.backdropNode = colorMapNode ? colorMapNode.rgb.mul(tslFloat(tintStrength)) : hashBlur(viewportSharedTexture(), tslFloat(0.05));
                material.opacityNode = colorMapNode ? flatOpacityNode.mul(colorMapNode.a) : flatOpacityNode;
                break;
            case 3:
                material.backdropNode = viewportSharedTexture(screenUV.mul(pixelGrid).floor().div(pixelGrid));
                material.opacityNode = flatOpacityNode;
                break;
            case 0:
            default:
                // Frosted glass: depth-based blur + tint (matches webgpu_backdrop_area example)
                material.backdropNode = hashBlur(viewportSharedTexture(), blurAmountNode)
                    .add(depthAlphaNode.mix(tintNode.mul(0.3), 0));
                // No opacityNode — let backdropNode handle the compositing
                break;
            }
            material.side = md.side === 0 ? THREE.FrontSide : THREE.DoubleSide;
            material.transparent = true;
            material.depthWrite = false;
            return material;
        }

        // Parse @param declarations from TSL code and build uniform params object
        function buildTSLParams(code, values) {
            const params = {};
            const lines = code.split('\n');
            for (const line of lines) {
                const m = line.match(/\/\/\s*@param\s+(float|color|bool)\s+(\w+)\s*(.*)/);
                if (!m) continue;
                const [, type, name, rest] = m;
                const parts = rest.trim().split(/\s+/).map(Number);
                if (type === 'float') {
                    const val = values?.[name] ?? (isFinite(parts[0]) ? parts[0] : 0.5);
                    params[name] = TSL.uniform(val);
                } else if (type === 'color') {
                    const v = values?.[name];
                    const r = v ? v[0] : (isFinite(parts[0]) ? parts[0] : 1);
                    const g = v ? v[1] : (isFinite(parts[1]) ? parts[1] : 1);
                    const b = v ? v[2] : (isFinite(parts[2]) ? parts[2] : 1);
                    params[name] = TSL.uniform(new THREE.Color(r, g, b));
                } else if (type === 'bool') {
                    const val = values?.[name] ?? (rest.trim() === 'true');
                    params[name] = TSL.uniform(val ? 1.0 : 0.0);
                }
            }
            return params;
        }

        function createTSLMaterial(md) {
            try {
                const material = new THREE.MeshPhysicalNodeMaterial();
                material.side = md.side === 0 ? THREE.FrontSide : THREE.DoubleSide;
                // Pre-load textures from material map slots
                const maps = {};
                if (md.tslMap1) maps.map1 = loadTexture(md.tslMap1);
                if (md.tslMap2) maps.map2 = loadTexture(md.tslMap2);
                if (md.tslMap3) maps.map3 = loadTexture(md.tslMap3);
                if (md.tslMap4) maps.map4 = loadTexture(md.tslMap4);
                // Build dynamic params from @param declarations + stored values
                const params = buildTSLParams(md.tslCode, md.tslParams || {});
                // TSL code gets: material, THREE, TSL, loadTexture, maps, params (uniforms)
                const code = md.tslCode;
                const fn = new Function('material', 'THREE', 'TSL', 'loadTexture', 'maps', 'params', code);
                fn(material, THREE, TSL, loadTexture, maps, params);
                // Store params on material for live uniform updates
                material.userData.tslParams = params;
                material.needsUpdate = true;
                return material;
            } catch (err) {
                console.error('[TSL Material] Compile error:', err);
                return new THREE.MeshStandardMaterial({ color: 0xff00ff, wireframe: true });
            }
        }

        function createMissingTSLMaterial(md) {
            console.warn('[TSL Material] Missing MaterialX source and tslCode. Rendering debug fallback.', md);
            const material = new THREE.MeshStandardMaterial({
                color: 0xff00ff,
                wireframe: true,
                side: md.side === 0 ? THREE.FrontSide : THREE.DoubleSide,
            });
            material.userData ??= {};
            material.userData.maxjsTSLMissingSource = true;
            material.needsUpdate = true;
            return material;
        }

        function createUtilityMaterial(runtimeModelName, md) {
            if (runtimeModelName === 'MeshBackdropNodeMaterial') {
                return createBackdropUtilityMaterial(md);
            }

            let material;
            switch (runtimeModelName) {
            case 'MeshDepthMaterial':
                material = new THREE.MeshDepthMaterial();
                break;
            case 'MeshMatcapMaterial':
                material = new THREE.MeshMatcapMaterial();
                break;
            case 'MeshNormalMaterial':
                material = new THREE.MeshNormalMaterial();
                break;
            case 'MeshPhongMaterial':
                material = new THREE.MeshPhongMaterial();
                break;
            case 'MeshLambertMaterial':
            default:
                material = new THREE.MeshLambertMaterial();
                break;
            }

            material.side = md.side === 0 ? THREE.FrontSide : THREE.DoubleSide;
            material.opacity = md.opacity ?? 1.0;
            material.transparent = material.opacity < 0.999;

            if ('color' in material && Array.isArray(md.color)) {
                material.color.setRGB(md.color[0], md.color[1], md.color[2]);
            }
            if ('emissive' in material) {
                if (Array.isArray(md.em)) {
                    material.emissive.setRGB(md.em[0], md.em[1], md.em[2]);
                }
                material.emissiveIntensity = md.emI ?? material.emissiveIntensity ?? 1.0;
            }
            if ('envMapIntensity' in material && md.envI != null) material.envMapIntensity = md.envI;
            if ('reflectivity' in material && md.reflectivity != null) material.reflectivity = md.reflectivity;
            if ('refractionRatio' in material && md.refractionRatio != null) material.refractionRatio = md.refractionRatio;
            if ('flatShading' in material) material.flatShading = !!md.flat;
            if ('wireframe' in material) material.wireframe = !!md.wireframe;
            if ('fog' in material && md.fog != null) material.fog = !!md.fog;
            if ('shininess' in material && md.shininess != null) material.shininess = md.shininess;
            if ('specular' in material && Array.isArray(md.spec)) {
                material.specular.setRGB(md.spec[0], md.spec[1], md.spec[2]);

                const combineModes = [THREE.MultiplyOperation, THREE.MixOperation, THREE.AddOperation];

            }
            if ('normalMapType' in material && md.normalMapType != null) {
                material.normalMapType = md.normalMapType === 1 ? THREE.ObjectSpaceNormalMap : THREE.TangentSpaceNormalMap;
            }
            if ('depthPacking' in material && md.depthPacking != null) {
                const depthPackingModes = [
                    THREE.BasicDepthPacking,
                    THREE.RGBADepthPacking,
                    THREE.RGBDepthPacking,
                    THREE.RGDepthPacking,
                ];
                material.depthPacking = depthPackingModes[md.depthPacking] ?? THREE.BasicDepthPacking;
            }

                material.normalScale = new THREE.Vector2(md.normScl, md.normScl);
            }

            if (md.dispS != null && 'displacementScale' in material) material.displacementScale = md.dispS;
            if (md.dispB != null && 'displacementBias' in material) material.displacementBias = md.dispB;
            if (md.aoI != null && 'aoMapIntensity' in material) material.aoMapIntensity = md.aoI;
            if (md.lmI != null && 'lightMapIntensity' in material) material.lightMapIntensity = md.lmI;

            // Apply texture maps (all slots support TSL Texture)
            const applyMap = (key, prop, cs, xf, fb) => {
                const tex = loadMapSlot(md, key, cs, xf, fb);
                if (tex && prop in material) material[prop] = tex;

            };

            applyMap('map',        'map',                    THREE.SRGBColorSpace,         'mapXf',        W);

            applyMap('ccMap',      'clearcoatMap',           THREE.LinearSRGBColorSpace,   'ccMapXf',      W);
            applyMap('ccRoughMap', 'clearcoatRoughnessMap',  THREE.LinearSRGBColorSpace,   'ccRoughMapXf', W);

            applyMap('emMap',      'emissiveMap',            THREE.SRGBColorSpace,         'emMapXf',      W);
            applyMap('transMap',   'transmissionMap',        THREE.LinearSRGBColorSpace,   'transMapXf',   W);
            applyMap('lmMap',      'lightMap',               THREE.LinearSRGBColorSpace,   'lmMapXf',      W);
            applyMap('matcapMap',  'matcap',                 THREE.SRGBColorSpace,         'matcapMapXf',  W);

        function createMaterial(md) {

                        if (md.sheenRoughness != null) params.sheenRoughness = md.sheenRoughness;
                        if (Array.isArray(md.sheenColor)) {

                        if (md.iridescenceIOR != null) params.iridescenceIOR = md.iridescenceIOR;

                    if (md.dispB != null) params.displacementBias = md.dispB;
                    if (md.aoI != null) params.aoMapIntensity = md.aoI;

                            apply('metalMap', 'metalnessMap',  THREE.LinearSRGBColorSpace, 'metalMapXf', W);
                        }
                        apply('normMap',  'normalMap',         THREE.LinearSRGBColorSpace, 'normMapXf',  N);
                        apply('bumpMap',  'bumpMap',           THREE.NoColorSpace,         'bumpMapXf',  H);
                        apply('dispMap',  'displacementMap',   THREE.NoColorSpace,         'dispMapXf',  H);
                        apply('aoMap',    'aoMap',             THREE.LinearSRGBColorSpace, 'aoMapXf',    W);
                        apply('emMap',    'emissiveMap',       THREE.SRGBColorSpace,       'emMapXf',    W);

                            ? configureGradientTexture(gradTex)

                    }

                    {
                        const lmTex = loadMapSlot(md, 'lmMap', THREE.LinearSRGBColorSpace, 'lmMapXf', fallbackWhiteTexture);
                        if (lmTex) {
                            template.lightMap = lmTex;
                            template.lightMapIntensity = md.lmI ?? 1.0;

            for (const [, mesh] of nodeMap) {

                if (implicitInstanceGeoms.has(mesh.geometry)) count++;

                producerBytes: partial.producerBytes ?? 0,
                decodeMs: partial.decodeMs ?? 0,
                applyMs: partial.applyMs ?? 0,

                ssr: ssgiFx.isSSREnabled(),
                gtao: ssgiFx.isGTAOEnabled(),
                bloom: ssgiFx.isBloomEnabled(),
                toonOutline: ssgiFx.isToonOutlineEnabled(),
                motionBlur: ssgiFx.isMotionBlurEnabled(),
                traa: ssgiFx.isTRAAEnabled(),
                contactShadow: ssgiFx.isContactShadowEnabled(),
                retro: ssgiFx.isRetroEnabled(),
                volumetric: ssgiFx.isVolumetricEnabled(),

            ssgiFx.setToonOutlineEnabled(false);

                                && pos.count === vertCount
