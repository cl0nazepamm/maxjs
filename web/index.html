<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MaxJS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #1a1a2e; }
        canvas { display: block; }
        #hud {
            position: absolute; top: 10px; left: 10px;
            color: #999; font: 13px 'Segoe UI', sans-serif;
            pointer-events: none;
        }
        #info {
            background: rgba(0,0,0,0.6); padding: 6px 10px;
            border-radius: 4px; margin-bottom: 6px;
        }
        #controls {
            pointer-events: auto;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            max-width: min(880px, calc(100vw - 32px));
        }
        #controls button {
            background: rgba(40,40,60,0.8); color: #aaa; border: 1px solid #444;
            padding: 4px 10px; border-radius: 3px; font: 12px 'Segoe UI', sans-serif;
            cursor: pointer;
        }
        #controls button.active { background: rgba(60,60,120,0.9); color: #ddd; border-color: #668; }
        #controls button:hover { background: rgba(60,60,100,0.9); color: #ccc; }
        .sidepanel {
            position: absolute;
            top: 12px;
            right: 12px;
            width: min(340px, calc(100vw - 24px));
            max-height: calc(100vh - 24px);
            padding: 14px;
            border-radius: 14px;
            border: 1px solid rgba(106, 118, 158, 0.35);
            background: rgba(13, 17, 29, 0.92);
            color: #cdd5e4;
            font: 12px 'Segoe UI', sans-serif;
            backdrop-filter: blur(16px);
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
            overflow: auto;
            opacity: 0;
            pointer-events: none;
            transform: translateX(24px);
            transition: opacity 0.18s ease, transform 0.18s ease;
        }
        .sidepanel.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(0);
        }
        .sidepanel-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
        }
        .sidepanel-title {
            font-size: 15px;
            font-weight: 600;
            color: #eef2ff;
        }
        .sidepanel-subtitle {
            margin-top: 4px;
            color: #7f8aa3;
            font-size: 11px;
        }
        .sidepanel button,
        .fx-toggle {
            background: rgba(38, 44, 70, 0.9);
            color: #ccd3e5;
            border: 1px solid rgba(110, 120, 154, 0.4);
            border-radius: 8px;
            padding: 6px 10px;
            font: 12px 'Segoe UI', sans-serif;
            cursor: pointer;
        }
        .sidepanel button:hover,
        .fx-toggle:hover {
            background: rgba(58, 66, 102, 0.95);
        }
        .fx-toggle.active {
            background: rgba(91, 118, 215, 0.28);
            border-color: rgba(124, 167, 255, 0.85);
            color: #eef3ff;
        }
        .sidepanel button:disabled,
        .fx-toggle:disabled,
        .sidepanel input:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }
        .sidepanel-body {
            display: grid;
            gap: 12px;
        }
        .fx-section {
            border: 1px solid rgba(100, 112, 146, 0.28);
            border-radius: 12px;
            background: rgba(25, 31, 52, 0.7);
            padding: 12px;
        }
        .fx-section-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
        }
        .fx-section-title {
            font-size: 13px;
            font-weight: 600;
            color: #eef2ff;
        }
        .fx-section-copy {
            margin-top: 4px;
            line-height: 1.35;
            color: #8e98ad;
            font-size: 11px;
        }
        .fx-grid {
            display: grid;
            gap: 10px;
            margin-top: 12px;
        }
        .fx-control {
            display: grid;
            gap: 6px;
        }
        .fx-control-head,
        .fx-check {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .fx-value {
            color: #edf2ff;
            font-variant-numeric: tabular-nums;
        }
        .fx-range {
            width: 100%;
            accent-color: #86a8ff;
        }
        .fx-note {
            margin-top: 8px;
            min-height: 15px;
            color: #7e899d;
            font-size: 11px;
        }
        .fx-note.error {
            color: #ffb4b4;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div id="info">MaxJS Live — hot reload works!</div>
        <div id="controls">
            <button id="btnKill">Kill</button>
            <button id="btnRefresh">Refresh</button>
            <button id="btnCamLock">Cam Lock: OFF</button>
            <button id="btnEnv" class="active">Env: ON</button>
            <button id="btnLightProbe" class="active">Probe: ON</button>
            <button id="btnSel" class="active">Sel: ON</button>
            <button id="btnPostFxPanel">Post FX</button>
        </div>
    </div>
    <aside id="postPanel" class="sidepanel" aria-hidden="true" inert></aside>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.webgpu.js",
            "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.webgpu.js",
            "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.tsl.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { HDRLoader } from 'three/addons/loaders/HDRLoader.js';
        import { LightProbeGenerator } from 'three/addons/lights/LightProbeGenerator.js';
        import { applyDeltaFrame } from './js/protocol.js';
        import { createPerfHud } from './js/perf_hud.js';
        import { createSSGIController } from './js/ssgi_fx.js';

        // ── Scene Setup (Z-up, matching Max) ────────────────
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 100000);
        camera.up.set(0, 0, 1);  // Z-up to match Max
        camera.position.set(200, -200, 150);

        function configureRenderer(nextRenderer) {
            nextRenderer.setSize(innerWidth, innerHeight);
            nextRenderer.setPixelRatio(devicePixelRatio);
            nextRenderer.toneMapping = THREE.ACESFilmicToneMapping;
            nextRenderer.toneMappingExposure = 1.2;
            document.body.appendChild(nextRenderer.domElement);
        }

        async function createRenderer() {
            let nextRenderer = new THREE.WebGPURenderer({ antialias: true });
            let backendLabel = 'WebGPU';

            try {
                configureRenderer(nextRenderer);
                await nextRenderer.init();
            } catch (error) {
                console.warn('MaxJS WebGPU init failed, retrying with forced WebGL2 backend.', error);
                nextRenderer.domElement.remove();
                nextRenderer.dispose?.();
                nextRenderer = new THREE.WebGPURenderer({ antialias: true, forceWebGL: true });
                backendLabel = 'WebGL2 fallback';
                configureRenderer(nextRenderer);
                await nextRenderer.init();
            }

            return { renderer: nextRenderer, backendLabel };
        }

        let renderer = null;
        let rendererBackendLabel = 'WebGPU';
        try {
            ({ renderer, backendLabel: rendererBackendLabel } = await createRenderer());
        } catch (error) {
            const message = error?.message || String(error);
            document.getElementById('info').textContent = `MaxJS - renderer init failed: ${message}`;
            throw error;
        }

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;

        // Grid on XY plane (Z-up)
        const grid = new THREE.GridHelper(200, 20, 0x444466, 0x2a2a44);
        grid.rotation.x = Math.PI / 2;  // Rotate to XY plane for Z-up
        scene.add(grid);

        // Lights (fallback, hidden when HDRI loads)
        const defaultLights = new THREE.Group();
        defaultLights.add(new THREE.AmbientLight(0x404060, 2));
        const sun = new THREE.DirectionalLight(0xffffff, 3);
        sun.position.set(50, -50, 100);
        defaultLights.add(sun);
        scene.add(defaultLights);
        const lightProbe = new THREE.LightProbe();
        scene.add(lightProbe);

        // ── Loaders & Caches ────────────────────────────────
        const textureLoader = new THREE.TextureLoader();
        const rgbeLoader = new HDRLoader();
        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        pmremGenerator.compileEquirectangularShader();

        const textureCache = new Map();
        const materialCache = new Map();
        const nodeMap = new Map();
        const perfHud = createPerfHud(document.getElementById('info'));
        perfHud.setStatus(`MaxJS - ${rendererBackendLabel} renderer ready`);
        const ssgiFx = createSSGIController({
            renderer,
            scene,
            camera,
            backendLabel: rendererBackendLabel,
            onError(message) {
                perfHud.setStatus(`MaxJS - ${message}`);
            },
        });
        function createSolidTexture(r, g, b, a = 255) {
            const tex = new THREE.DataTexture(new Uint8Array([r, g, b, a]), 1, 1);
            tex.colorSpace = THREE.NoColorSpace;
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            tex.minFilter = tex.magFilter = THREE.LinearFilter;
            tex.needsUpdate = true;
            tex.updateMatrix();
            return tex;
        }

        const fallbackWhiteTexture = createSolidTexture(255, 255, 255, 255);
        const fallbackFlatNormalTexture = createSolidTexture(128, 128, 255, 255);
        const fallbackHeightTexture = createSolidTexture(255, 255, 255, 255);

        let firstSync = true;
        let camLock = false;
        let envVisible = true;
        let lightProbeEnabled = true;
        const lightProbeIntensity = 1.0;
        let currentHdriUrl = null;
        let currentHdriProbeSignature = '';
        let hdriLoadGeneration = 0;

        function applyLightProbeState() {
            lightProbe.intensity = lightProbeEnabled ? lightProbeIntensity : 0.0;
        }

        async function updateLightProbeFromHDRI(hdrTex, probeSignature, loadGeneration) {
            const captureScene = new THREE.Scene();
            captureScene.background = hdrTex;
            captureScene.backgroundRotation.copy(scene.environmentRotation);

            const cubeRenderTarget = new THREE.WebGLCubeRenderTarget(128, {
                type: hdrTex.type ?? THREE.HalfFloatType,
                colorSpace: hdrTex.colorSpace ?? THREE.LinearSRGBColorSpace,
            });
            const cubeCamera = new THREE.CubeCamera(0.1, 10, cubeRenderTarget);

            try {
                cubeCamera.update(renderer, captureScene);
                const nextProbe = await LightProbeGenerator.fromCubeRenderTarget(renderer, cubeRenderTarget);

                if (loadGeneration !== hdriLoadGeneration || probeSignature !== currentHdriProbeSignature) {
                    return;
                }

                lightProbe.copy(nextProbe);
                applyLightProbeState();
            } catch (error) {
                console.warn('MaxJS light probe generation failed:', error);
            } finally {
                cubeRenderTarget.dispose();
            }
        }

        function normalizeTextureTransform(xf) {
            if (!xf) return null;
            return {
                scale: Number.isFinite(xf.scale) && Math.abs(xf.scale) > 1e-6 ? xf.scale : 1.0,
                tiling: [
                    Number.isFinite(xf.tiling?.[0]) ? xf.tiling[0] : 1.0,
                    Number.isFinite(xf.tiling?.[1]) ? xf.tiling[1] : 1.0,
                ],
                offset: [
                    Number.isFinite(xf.offset?.[0]) ? xf.offset[0] : 0.0,
                    Number.isFinite(xf.offset?.[1]) ? xf.offset[1] : 0.0,
                ],
                rotate: Number.isFinite(xf.rotate) ? xf.rotate : 0.0,
                center: [
                    Number.isFinite(xf.center?.[0]) ? xf.center[0] : 0.5,
                    Number.isFinite(xf.center?.[1]) ? xf.center[1] : 0.5,
                ],
                realWorld: !!xf.realWorld,
                realWidth: Number.isFinite(xf.realWidth) && Math.abs(xf.realWidth) > 1e-6 ? xf.realWidth : 1.0,
                realHeight: Number.isFinite(xf.realHeight) && Math.abs(xf.realHeight) > 1e-6 ? xf.realHeight : 1.0,
                wrap: typeof xf.wrap === 'string' ? xf.wrap : 'periodic',
            };
        }

        function wrapModeToThree(mode) {
            switch ((mode || 'periodic').toLowerCase()) {
                case 'mirror': return THREE.MirroredRepeatWrapping;
                case 'clamp':
                case 'black': return THREE.ClampToEdgeWrapping;
                case 'default':
                case 'periodic':
                default: return THREE.RepeatWrapping;
            }
        }

        function applyTextureTransform(tex, xf) {
            const wrap = wrapModeToThree(xf?.wrap);
            tex.wrapS = tex.wrapT = wrap;

            if (!xf) return;

            const worldScaleU = xf.realWorld ? xf.realWidth : 1.0;
            const worldScaleV = xf.realWorld ? xf.realHeight : 1.0;
            const repeatU = xf.tiling[0] / worldScaleU / xf.scale;
            const repeatV = xf.tiling[1] / worldScaleV / xf.scale;

            tex.repeat.set(repeatU, repeatV);
            tex.offset.set(-xf.offset[0] * repeatU, -xf.offset[1] * repeatV);
            tex.center.set(xf.center[0], xf.center[1]);
            tex.rotation = THREE.MathUtils.degToRad(xf.rotate);
            tex.updateMatrix();
        }

        function applyFallbackImage(tex, fallbackTex, colorSpace, xf, url) {
            tex.image = fallbackTex.image;
            tex.colorSpace = colorSpace;
            applyTextureTransform(tex, xf);
            tex.needsUpdate = true;
            console.warn('MaxJS missing texture, using fallback:', url);
        }

        function loadTexture(url, colorSpace = THREE.LinearSRGBColorSpace, xf = null, fallbackTex = fallbackWhiteTexture) {
            if (!url) return null;
            const normalizedXf = normalizeTextureTransform(xf);
            const cacheKey = JSON.stringify([url, String(colorSpace), normalizedXf]);
            if (textureCache.has(cacheKey)) return textureCache.get(cacheKey);
            const tex = textureLoader.load(
                url,
                loadedTex => {
                    loadedTex.colorSpace = colorSpace;
                    applyTextureTransform(loadedTex, normalizedXf);
                    loadedTex.needsUpdate = true;
                },
                undefined,
                () => applyFallbackImage(tex, fallbackTex, colorSpace, normalizedXf, url)
            );
            tex.colorSpace = colorSpace;
            applyTextureTransform(tex, normalizedXf);
            textureCache.set(cacheKey, tex);
            return tex;
        }

        function loadHDRI(envParams) {
            if (!envParams?.hdri) return;

            // Exposure
            renderer.toneMappingExposure = Math.pow(2, envParams.exp || 0) * (envParams.gamma || 1.0);

            // Autodesk HDRIenv:
            //   u = rot + atan2( x, y )
            //   v sample = 1 - ( 0.5 + asin( z ) / PI )
            // Three.js equirect:
            //   u = atan2( z, x )
            //   v = 0.5 + asin( y ) / PI
            // So the lookup direction remap is:
            //   (x, y, z)_three = ( y, -z, x )_max
            // with Autodesk rotation applied around Max's Z axis before the basis remap.
            const rot = (envParams.rot || 0) * Math.PI / 180;
            const envBasis = new THREE.Matrix4().makeBasis(
                new THREE.Vector3(0, 0, 1),
                new THREE.Vector3(1, 0, 0),
                new THREE.Vector3(0, -1, 0)
            );
            const envYaw = new THREE.Matrix4().makeRotationZ(-rot);
            const envRotation = new THREE.Matrix4().multiplyMatrices(envBasis, envYaw);
            scene.environmentRotation.setFromRotationMatrix(envRotation);
            scene.backgroundRotation.copy(scene.environmentRotation);
            const probeSignature = JSON.stringify([envParams.hdri, envParams.rot || 0, envParams.flip || 0, envParams.zup || 0]);
            const shouldRefreshTexture = envParams.hdri !== currentHdriUrl;
            const shouldRefreshProbe = probeSignature !== currentHdriProbeSignature;

            if (!shouldRefreshTexture && !shouldRefreshProbe) return;

            currentHdriUrl = envParams.hdri;
            currentHdriProbeSignature = probeSignature;
            hdriLoadGeneration += 1;
            const loadGeneration = hdriLoadGeneration;

            rgbeLoader.load(envParams.hdri, async (hdrTex) => {
                if (loadGeneration !== hdriLoadGeneration) {
                    hdrTex.dispose();
                    return;
                }
                hdrTex.mapping = THREE.EquirectangularReflectionMapping;
                const envMap = pmremGenerator.fromEquirectangular(hdrTex).texture;
                scene.environment = envMap;
                if (envVisible) scene.background = envMap;
                defaultLights.visible = false;
                if (lightProbeEnabled || shouldRefreshProbe) {
                    await updateLightProbeFromHDRI(hdrTex, probeSignature, loadGeneration);
                }
                hdrTex.dispose();
            });
        }

        // ── Material Creation ───────────────────────────────
        function rememberMaterialEmissiveBase(material) {
            if (!material?.emissive) return;
            material.userData ??= {};
            material.userData.maxjsBaseEmissive = [
                material.emissive.r,
                material.emissive.g,
                material.emissive.b,
            ];
            material.userData.maxjsBaseEmissiveIntensity = Number.isFinite(material.emissiveIntensity)
                ? material.emissiveIntensity
                : 1.0;
        }

        function applyMaterialSelectionState(material, selected) {
            if (!material?.emissive) return;

            const base = material.userData?.maxjsBaseEmissive || [0, 0, 0];
            const baseIntensity = Number.isFinite(material.userData?.maxjsBaseEmissiveIntensity)
                ? material.userData.maxjsBaseEmissiveIntensity
                : 1.0;

            material.emissive.setRGB(base[0], base[1], base[2]);
            material.emissiveIntensity = baseIntensity;

            if (selected && selHighlight) {
                material.emissive.r = Math.min(1.0, material.emissive.r + 0.05);
                material.emissive.g = Math.min(1.0, material.emissive.g + 0.05);
                material.emissive.b = Math.min(1.0, material.emissive.b + 0.20);
            }
        }

        function createMaterial(md) {
            const key = md.name || 'default';
            let template = materialCache.get(key);

            if (!template) {
                const params = {
                    color: new THREE.Color(md.color[0], md.color[1], md.color[2]),
                    roughness: md.rough ?? 0.5,
                    metalness: md.metal ?? 0.0,
                    side: md.side === 0 ? THREE.FrontSide : THREE.DoubleSide,
                    envMapIntensity: md.envI ?? 1.0,
                };

                if (md.opacity != null && md.opacity < 0.999) {
                    params.transparent = true;
                    params.opacity = md.opacity;
                }

                const hasEmissiveColor = Array.isArray(md.em) && md.em.length === 3 &&
                    md.em.some(value => Math.abs(value) > 1.0e-5);

                if (md.em && md.emI > 0) {
                    params.emissive = new THREE.Color(md.em[0], md.em[1], md.em[2]);
                    params.emissiveIntensity = md.emI;
                }

                if (md.emMap) {
                    if (!params.emissive) {
                        params.emissive = hasEmissiveColor
                            ? new THREE.Color(md.em[0], md.em[1], md.em[2])
                            : new THREE.Color(1, 1, 1);
                    }
                    if (params.emissiveIntensity == null || params.emissiveIntensity <= 0) {
                        params.emissiveIntensity = md.emMapS ?? 1.0;
                    }
                }

                if (md.normScl != null) params.normalScale = new THREE.Vector2(md.normScl, md.normScl);
                if (md.bumpS != null) params.bumpScale = md.bumpS;
                if (md.dispS != null) params.displacementScale = md.dispS;
                if (md.dispB != null) params.displacementBias = md.dispB;
                if (md.aoI != null) params.aoMapIntensity = md.aoI;

                template = new THREE.MeshStandardMaterial(params);

                // Textures
                if (md.map) template.map = loadTexture(md.map, THREE.SRGBColorSpace, md.mapXf, fallbackWhiteTexture);
                if (md.roughMap) template.roughnessMap = loadTexture(md.roughMap, THREE.LinearSRGBColorSpace, md.roughMapXf, fallbackWhiteTexture);
                if (md.metalMap) template.metalnessMap = loadTexture(md.metalMap, THREE.LinearSRGBColorSpace, md.metalMapXf, fallbackWhiteTexture);
                if (md.normMap) template.normalMap = loadTexture(md.normMap, THREE.LinearSRGBColorSpace, md.normMapXf, fallbackFlatNormalTexture);
                if (md.bumpMap) template.bumpMap = loadTexture(md.bumpMap, THREE.NoColorSpace, md.bumpMapXf, fallbackHeightTexture);
                if (md.dispMap) template.displacementMap = loadTexture(md.dispMap, THREE.NoColorSpace, md.dispMapXf, fallbackHeightTexture);
                if (md.aoMap) template.aoMap = loadTexture(md.aoMap, THREE.LinearSRGBColorSpace, md.aoMapXf, fallbackWhiteTexture);
                if (md.emMap) template.emissiveMap = loadTexture(md.emMap, THREE.SRGBColorSpace, md.emMapXf, fallbackWhiteTexture);
                if (md.opMap) { template.alphaMap = loadTexture(md.opMap, THREE.LinearSRGBColorSpace, md.opMapXf, fallbackWhiteTexture); template.transparent = true; }

                // Lightmap
                if (md.lmMap) {
                    template.lightMap = loadTexture(md.lmMap, THREE.LinearSRGBColorSpace, md.lmMapXf, fallbackWhiteTexture);
                    template.lightMapIntensity = md.lmI ?? 1.0;
                }

                rememberMaterialEmissiveBase(template);
                materialCache.set(key, template);
            }

            const material = template.clone();
            rememberMaterialEmissiveBase(material);
            return material;
        }

        // ── Max Bridge ──────────────────────────────────────
        const bridge = {
            send(type, data = {}) { window.chrome?.webview?.postMessage({ type, ...data }); },
            handlers: {},
            on(type, fn) { (this.handlers[type] ??= []).push(fn); },
            dispatch(msg) { (this.handlers[msg.type] || []).forEach(fn => fn(msg)); }
        };

        let hasInitialSync = false;
        let readyRetryTimer = 0;
        let transportMode = 'waiting';

        function setInfoText(text) {
            perfHud.setStatus(text);
        }

        function setTransportMode(mode) {
            transportMode = mode;
        }

        function updateSyncHud(partial = {}) {
            perfHud.updateSync({
                transport: partial.transport ?? transportMode,
                frameId: partial.frameId ?? 0,
                producerBytes: partial.producerBytes ?? 0,
                decodeMs: partial.decodeMs ?? 0,
                applyMs: partial.applyMs ?? 0,
                nodeCount: nodeMap.size,
                textureCount: textureCache.size,
            });
        }

        function scheduleReadyRetry() {
            if (!window.chrome?.webview || readyRetryTimer) return;
            readyRetryTimer = setInterval(() => {
                if (hasInitialSync) {
                    clearInterval(readyRetryTimer);
                    readyRetryTimer = 0;
                    return;
                }
                bridge.send('ready');
            }, 1000);
        }

        function stopReadyRetry() {
            if (!readyRetryTimer) return;
            clearInterval(readyRetryTimer);
            readyRetryTimer = 0;
        }

        function markInitialSync() {
            if (hasInitialSync) return;
            hasInitialSync = true;
            stopReadyRetry();
        }

        function startBridgeHandshake() {
            if (!window.chrome?.webview) return;
            setInfoText('MaxJS - connected, waiting for sync...');
            bridge.send('ready');
            scheduleReadyRetry();
        }

        function reportBridgeError(prefix, err) {
            const message = err?.message || String(err);
            console.error(`[MaxJS ${prefix}]`, err);
            setInfoText(`MaxJS - ${prefix}: ${message}`);
        }

        bridge.on('debug', msg => {
            if (!hasInitialSync) {
                setInfoText('MaxJS - ' + (msg.msg || 'debug'));
            } else {
                console.log('[MaxJS debug]', msg.msg || 'debug');
            }
        });

        window.addEventListener('error', e => {
            reportBridgeError('runtime error', e.error || e.message);
        });
        window.addEventListener('unhandledrejection', e => {
            reportBridgeError('promise error', e.reason);
        });

        if (window.chrome?.webview) {
            window.chrome.webview.addEventListener('message', e => {
                try { bridge.dispatch(e.data); }
                catch (err) { reportBridgeError('message error', err); }
            });

            // Binary shared buffer handler (zero-copy geometry)
            chrome.webview.addEventListener('sharedbufferreceived', e => {
                let buf = null;
                try {
                    buf = e.getBuffer();
                    const meta = typeof e.additionalData === 'string'
                        ? JSON.parse(e.additionalData) : e.additionalData;
                    if (meta?.type === 'delta_bin') {
                        handleBinaryDelta(buf, meta);
                    } else {
                        handleBinaryScene(buf, meta);
                    }
                } catch (err) { reportBridgeError('binary sync error', err); }
                finally {
                    if (buf) chrome.webview.releaseBuffer(buf);
                }
            });
        } else {
            setInfoText('MaxJS - no bridge (standalone mode)');
        }
        window.maxJS = bridge;

        // ── Scene Sync ──────────────────────────────────────
        bridge.on('scene', msg => {
            setTransportMode('json');
            const applyStart = performance.now();
            const incoming = new Set(msg.nodes.map(n => n.h));

            // Clear material cache so changes are picked up
            materialCache.clear();

            for (const [handle, mesh] of nodeMap) {
                if (!incoming.has(handle)) {
                    scene.remove(mesh);
                    mesh.geometry.dispose();
                    nodeMap.delete(handle);
                }
            }

            for (const nd of msg.nodes) {
                let mesh = nodeMap.get(nd.h);

                // Build material: single or multi-sub array
                let mat;
                if (nd.mats && nd.groups) {
                    mat = nd.mats.map(m => createMaterial(m));
                } else {
                    mat = nd.mat ? createMaterial(nd.mat)
                        : new THREE.MeshStandardMaterial({ color: 0x888888, side: THREE.DoubleSide });
                }

                const geom = buildGeometry(nd.v, nd.i, nd.uv, nd.norm);

                // Add material groups for Multi/Sub
                if (nd.groups) {
                    for (const [start, count, idx] of nd.groups) {
                        geom.addGroup(start, count, idx);
                    }
                }

                if (mesh) {
                    mesh.geometry.dispose();
                    mesh.geometry = geom;
                    mesh.material = mat;
                } else {
                    mesh = new THREE.Mesh(geom, mat);
                    mesh.matrixAutoUpdate = false;
                    mesh.name = nd.n;
                    mesh.frustumCulled = false;
                    scene.add(mesh);
                    nodeMap.set(nd.h, mesh);
                }

                mesh.visible = true;
                mesh.frustumCulled = false;

                applyTransform(mesh, nd.t);
                applySelection(mesh, nd.s);
            }

            if (msg.camera) applyCamera(msg.camera);
            if (msg.env?.hdri) loadHDRI(msg.env);
            scene.updateMatrixWorld(true);

            if (firstSync && msg.nodes.length > 0) {
                firstSync = false;
                if (!camLock) fitCamera();
            }
            const applyMs = performance.now() - applyStart;
            markInitialSync();
            updateSyncHud({
                transport: 'json',
                frameId: msg.frame ?? 0,
                producerBytes: msg.stats?.producerBytes ?? 0,
                decodeMs: 0,
                applyMs,
            });
        });

        // ── Camera-only sync (30fps) ─────────────────────────
        bridge.on('cam', msg => {
            if (msg.camera) applyCamera(msg.camera);
            if (msg.frame || msg.stats) {
                updateSyncHud({
                    transport: 'json',
                    frameId: msg.frame ?? 0,
                    producerBytes: msg.stats?.producerBytes ?? 0,
                    decodeMs: 0,
                    applyMs: 0,
                });
            }
        });

        // ── Transform Sync (+ material scalars, ~6fps) ──────
        bridge.on('xform', msg => {
            const applyStart = performance.now();
            for (const nd of msg.nodes) {
                const mesh = nodeMap.get(nd.h);
                if (!mesh) continue;
                applyTransform(mesh, nd.t);
                applySelection(mesh, nd.s);
                // Live material update from scalars
                if (nd.mat && mesh.material) applyMaterialScalar(mesh, nd.mat);
            }
            if (msg.camera) applyCamera(msg.camera);
            const applyMs = performance.now() - applyStart;
            updateSyncHud({
                transport: 'json',
                frameId: msg.frame ?? 0,
                producerBytes: msg.stats?.producerBytes ?? 0,
                decodeMs: 0,
                applyMs,
            });
        });

        // ── Binary Scene Handler (SharedBuffer) ──────────────
        function handleBinaryScene(buffer, meta) {
            if (meta.type !== 'scene_bin') return;
            setTransportMode('binary-scene');
            const applyStart = performance.now();
            const incoming = new Set(meta.nodes.map(n => n.h));
            materialCache.clear();

            // Remove deleted
            for (const [handle, mesh] of nodeMap) {
                if (!incoming.has(handle)) {
                    scene.remove(mesh);
                    mesh.geometry.dispose();
                    nodeMap.delete(handle);
                }
            }

            for (const nd of meta.nodes) {
                let mesh = nodeMap.get(nd.h);

                // Build material: single or multi-sub array
                let mat;
                if (nd.mats && nd.groups) {
                    mat = nd.mats.map(m => createMaterial(m));
                } else {
                    mat = nd.mat ? createMaterial(nd.mat)
                        : new THREE.MeshStandardMaterial({ color: 0x888888, side: THREE.DoubleSide });
                }

                // Build geometry from binary buffer if geo data present
                let geom = mesh?.geometry;
                if (nd.geo) {
                    const inRange = (off, n) =>
                        Number.isInteger(off) &&
                        Number.isInteger(n) &&
                        off >= 0 &&
                        n >= 0 &&
                        (off % 4) === 0 &&
                        (off + n * 4) <= buffer.byteLength;

                    if (!inRange(nd.geo.vOff, nd.geo.vN) || !inRange(nd.geo.iOff, nd.geo.iN)) {
                        console.warn('[MaxJS binary] Invalid vertex/index range for', nd.n);
                        continue;
                    }
                    if (nd.geo.uvOff != null && !inRange(nd.geo.uvOff, nd.geo.uvN || 0)) {
                        console.warn('[MaxJS binary] Invalid UV range for', nd.n);
                        continue;
                    }
                    const vertsCopy = new Float32Array(
                        new Float32Array(buffer, nd.geo.vOff, nd.geo.vN)
                    );
                    const idxCopy = new Uint32Array(
                        new Int32Array(buffer, nd.geo.iOff, nd.geo.iN)
                    );

                    geom = new THREE.BufferGeometry();
                    geom.setAttribute('position', new THREE.BufferAttribute(vertsCopy, 3));
                    geom.setIndex(new THREE.BufferAttribute(idxCopy, 1));

                    if (nd.geo.uvOff != null && nd.geo.uvN) {
                        const uvsCopy = new Float32Array(
                            new Float32Array(buffer, nd.geo.uvOff, nd.geo.uvN)
                        );
                        geom.setAttribute('uv', new THREE.BufferAttribute(uvsCopy, 2));
                    }
                    if (nd.geo.nOff != null && inRange(nd.geo.nOff, nd.geo.nN || 0)) {
                        const normalsCopy = new Float32Array(
                            new Float32Array(buffer, nd.geo.nOff, nd.geo.nN)
                        );
                        geom.setAttribute('normal', new THREE.BufferAttribute(normalsCopy, 3));
                    } else {
                        geom.computeVertexNormals();
                    }
                    // Add material groups for Multi/Sub
                    if (nd.groups) {
                        for (const [start, count, idx] of nd.groups) {
                            geom.addGroup(start, count, idx);
                        }
                    }
                } else if (geom && nd.groups) {
                    // Geometry unchanged, but keep groups/material indexing synced.
                    geom.clearGroups();
                    for (const [start, count, idx] of nd.groups) {
                        geom.addGroup(start, count, idx);
                    }
                }

                if (mesh) {
                    if (nd.geo && geom !== mesh.geometry) {
                        mesh.geometry.dispose();
                        mesh.geometry = geom;
                    }
                    mesh.material = mat;
                } else {
                    if (!geom) continue; // Never create an empty mesh entry
                    mesh = new THREE.Mesh(geom, mat);
                    mesh.matrixAutoUpdate = false;
                    mesh.name = nd.n;
                    mesh.frustumCulled = false;
                    scene.add(mesh);
                    nodeMap.set(nd.h, mesh);
                }

                mesh.visible = true;
                mesh.frustumCulled = false;

                applyTransform(mesh, nd.t);
                applySelection(mesh, nd.s);
            }

            if (meta.camera) applyCamera(meta.camera);
            if (meta.env?.hdri) loadHDRI(meta.env);
            scene.updateMatrixWorld(true);

            if (firstSync && meta.nodes.length > 0) {
                firstSync = false;
                if (!camLock) fitCamera();
            }
            const applyMs = performance.now() - applyStart;
            markInitialSync();
            updateSyncHud({
                transport: 'binary-scene',
                frameId: meta.frame ?? 0,
                producerBytes: meta.stats?.producerBytes ?? buffer.byteLength,
                decodeMs: 0,
                applyMs,
            });
        }

        function handleBinaryDelta(buffer, meta) {
            const result = applyDeltaFrame(buffer, {
                onTransform(nodeHandle, matrix) {
                    const mesh = nodeMap.get(nodeHandle);
                    if (mesh) applyTransform(mesh, matrix);
                },
                onMaterialScalar(nodeHandle, material) {
                    const mesh = nodeMap.get(nodeHandle);
                    if (mesh) applyMaterialScalar(mesh, material);
                },
                onSelection(nodeHandle, selected) {
                    const mesh = nodeMap.get(nodeHandle);
                    if (mesh) applySelection(mesh, selected);
                },
                onVisibility(nodeHandle, visible) {
                    const mesh = nodeMap.get(nodeHandle);
                    if (mesh) mesh.visible = visible;
                },
                onCamera(cameraState) {
                    applyCamera(cameraState);
                },
            });
            scene.updateMatrixWorld(true);
            markInitialSync();
            setTransportMode('binary-delta');
            updateSyncHud({
                transport: 'binary-delta',
                frameId: meta.frame ?? result.frameId,
                producerBytes: meta.stats?.producerBytes ?? result.bytes,
                decodeMs: result.decodeMs,
                applyMs: result.applyMs,
            });
        }

        // ── Geometry Builder ────────────────────────────────
        function buildGeometry(vertices, indices, uvs, normals) {
            const geom = new THREE.BufferGeometry();
            geom.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            if (indices?.length) geom.setIndex(indices);
            if (uvs?.length) geom.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
            if (normals?.length) geom.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
            else geom.computeVertexNormals();
            geom.computeBoundingBox();
            geom.computeBoundingSphere();
            return geom;
        }

        function isFiniteArray(values, expectedLength) {
            const isArrayLike = Array.isArray(values) || ArrayBuffer.isView(values);
            if (!isArrayLike || values.length !== expectedLength) return false;
            for (let i = 0; i < values.length; i++) {
                if (!Number.isFinite(values[i])) return false;
            }
            return true;
        }

        function applyTransform(mesh, t) {
            if (!isFiniteArray(t, 16)) {
                mesh.matrix.identity();
                mesh.position.set(0, 0, 0);
                mesh.quaternion.identity();
                mesh.scale.set(1, 1, 1);
                return false;
            }
            mesh.matrix.fromArray(t);
            mesh.matrixWorldNeedsUpdate = true;
            return true;
        }

        let selHighlight = true;

        function applySelection(mesh, selected) {
            mesh.userData.maxjsSelected = !!selected;
            const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
            for (const m of mats) {
                applyMaterialSelectionState(m, !!selected);
            }
        }

        function applyMaterialScalar(mesh, material) {
            const c = material?.color;
            const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
            for (const m of mats) {
                if (!m) continue;
                if (c && m.color) m.color.setRGB(c[0], c[1], c[2]);
                if (material?.rough != null && 'roughness' in m) m.roughness = material.rough;
                if (material?.metal != null && 'metalness' in m) m.metalness = material.metal;
                if (material?.opacity != null) {
                    m.opacity = material.opacity;
                    m.transparent = material.opacity < 0.999;
                }
                rememberMaterialEmissiveBase(m);
                applyMaterialSelectionState(m, !!mesh.userData.maxjsSelected);
                m.needsUpdate = true;
            }
        }

        // ── Camera Sync (Z-up, raw from Max) ────────────────
        function applyCamera(cam) {
            if (!camLock) return;
            if (!isFiniteArray(cam?.pos, 3) || !isFiniteArray(cam?.tgt, 3) || !isFiniteArray(cam?.up, 3)) {
                return;
            }
            camera.position.set(cam.pos[0], cam.pos[1], cam.pos[2]);
            camera.up.set(cam.up[0], cam.up[1], cam.up[2]);
            camera.lookAt(cam.tgt[0], cam.tgt[1], cam.tgt[2]);

            if (Number.isFinite(cam.fov) && cam.persp && cam.fov > 0 && cam.fov < 170) {
                const aspect = innerWidth / innerHeight;
                const hRad = cam.fov * Math.PI / 180;
                camera.fov = 2 * Math.atan(Math.tan(hRad / 2) / aspect) * 180 / Math.PI;
            }
            camera.updateProjectionMatrix();
            controls.target.set(cam.tgt[0], cam.tgt[1], cam.tgt[2]);
        }

        function fitCamera() {
            scene.updateMatrixWorld(true);
            const box = new THREE.Box3();
            for (const [, mesh] of nodeMap) box.expandByObject(mesh);
            if (box.isEmpty()) return;
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            controls.target.copy(center);
            camera.position.set(
                center.x + maxDim * 1.2,
                center.y - maxDim * 1.2,
                center.z + maxDim * 0.8
            );
            camera.near = maxDim * 0.001;
            camera.far = maxDim * 100;
            camera.updateProjectionMatrix();
            controls.update();
        }

        // ── UI Controls ─────────────────────────────────────
        document.getElementById('btnKill').onclick = () => {
            bridge.send('kill');
        };

        document.getElementById('btnRefresh').onclick = () => {
            if (window.chrome?.webview) {
                bridge.send('refresh');
            } else {
                location.reload();
            }
        };

        const btnCam = document.getElementById('btnCamLock');
        btnCam.onclick = () => {
            camLock = !camLock;
            btnCam.textContent = `Cam Lock: ${camLock ? 'ON' : 'OFF'}`;
            btnCam.classList.toggle('active', camLock);
            controls.enabled = !camLock;
        };

        const btnEnv = document.getElementById('btnEnv');
        btnEnv.onclick = () => {
            envVisible = !envVisible;
            btnEnv.textContent = `Env: ${envVisible ? 'ON' : 'OFF'}`;
            btnEnv.classList.toggle('active', envVisible);
            scene.background = envVisible && scene.environment
                ? scene.environment : new THREE.Color(0x1a1a2e);
        };

        const btnLightProbe = document.getElementById('btnLightProbe');
        btnLightProbe.onclick = () => {
            lightProbeEnabled = !lightProbeEnabled;
            btnLightProbe.textContent = `Probe: ${lightProbeEnabled ? 'ON' : 'OFF'}`;
            btnLightProbe.classList.toggle('active', lightProbeEnabled);
            applyLightProbeState();
        };

        const btnSel = document.getElementById('btnSel');
        btnSel.onclick = () => {
            selHighlight = !selHighlight;
            btnSel.textContent = `Sel: ${selHighlight ? 'ON' : 'OFF'}`;
            btnSel.classList.toggle('active', selHighlight);
            for (const [, mesh] of nodeMap) {
                applySelection(mesh, !!mesh.userData.maxjsSelected);
            }
        };

        const btnPostFxPanel = document.getElementById('btnPostFxPanel');
        const postPanel = document.getElementById('postPanel');
        let postPanelVisible = false;
        let lastPostFxSignature = '';

        const postFxSections = [
            {
                key: 'ssgi',
                title: 'SSGI',
                copy: 'Diffuse bounce lighting and ambient occlusion from the current frame.',
                note: 'Requires the real WebGPU backend.',
                requiresWebGPU: true,
                isEnabled: () => ssgiFx.isEnabled(),
                setEnabled: (enabled) => ssgiFx.setEnabled(enabled),
                getValues: (state) => state.ssgi,
                setValues: (patch) => ssgiFx.setSSGIOptions(patch),
                controls: [
                    { key: 'radius', label: 'Radius', min: 1, max: 24, step: 0.5 },
                    { key: 'thickness', label: 'Thickness', min: 0.01, max: 10, step: 0.01 },
                    { key: 'aoIntensity', label: 'AO Intensity', min: 0, max: 4, step: 0.05 },
                    { key: 'giIntensity', label: 'GI Intensity', min: 0, max: 12, step: 0.1 },
                    { key: 'expFactor', label: 'Falloff', min: 1, max: 3, step: 0.05 },
                    { key: 'sliceCount', label: 'Slices', min: 1, max: 4, step: 1, integer: true },
                    { key: 'stepCount', label: 'Steps', min: 1, max: 24, step: 1, integer: true },
                    { key: 'temporal', label: 'Temporal Filter', type: 'checkbox' },
                ],
            },
            {
                key: 'ssr',
                title: 'SSR',
                copy: 'Screen-space reflections for glossy and mirror-like surfaces.',
                note: 'Requires the real WebGPU backend.',
                requiresWebGPU: true,
                isEnabled: () => ssgiFx.isSSREnabled(),
                setEnabled: (enabled) => ssgiFx.setSSREnabled(enabled),
                getValues: (state) => state.ssr,
                setValues: (patch) => ssgiFx.setSSROptions(patch),
                controls: [
                    { key: 'quality', label: 'Quality', min: 0, max: 1, step: 0.01 },
                    { key: 'blurQuality', label: 'Blur Quality', min: 1, max: 3, step: 1, integer: true },
                    { key: 'maxDistance', label: 'Max Distance', min: 0.05, max: 2, step: 0.01 },
                    { key: 'opacity', label: 'Opacity', min: 0, max: 1, step: 0.01 },
                    { key: 'thickness', label: 'Thickness', min: 0.001, max: 0.05, step: 0.001 },
                ],
            },
            {
                key: 'bloom',
                title: 'Bloom',
                copy: 'Highlights bleed for emissive and high-energy surfaces.',
                note: 'Bloom works on WebGPU and WebGL fallback.',
                requiresWebGPU: false,
                isEnabled: () => ssgiFx.isBloomEnabled(),
                setEnabled: (enabled) => ssgiFx.setBloomEnabled(enabled),
                getValues: (state) => state.bloom,
                setValues: (patch) => ssgiFx.setBloomOptions(patch),
                controls: [
                    { key: 'strength', label: 'Strength', min: 0, max: 3, step: 0.01 },
                    { key: 'radius', label: 'Radius', min: 0, max: 1, step: 0.01 },
                    { key: 'threshold', label: 'Threshold', min: 0, max: 2, step: 0.01 },
                ],
            },
        ];

        function formatControlValue(control, value) {
            if (control.type === 'checkbox') return value ? 'On' : 'Off';
            if (!Number.isFinite(value)) return '--';
            if (control.integer) return String(Math.round(value));
            if (control.step >= 1) return value.toFixed(0);
            if (control.step >= 0.1) return value.toFixed(1);
            if (control.step >= 0.01) return value.toFixed(2);
            return value.toFixed(3);
        }

        function setPostPanelVisible(visible) {
            postPanelVisible = !!visible;
            const activeElement = document.activeElement;
            if (!postPanelVisible && activeElement instanceof HTMLElement && postPanel.contains(activeElement)) {
                btnPostFxPanel.focus();
            }
            postPanel.classList.toggle('visible', postPanelVisible);
            postPanel.toggleAttribute('inert', !postPanelVisible);
            postPanel.setAttribute('aria-hidden', String(!postPanelVisible));
            syncPostFxPanel(true);
        }

        function buildPostFxPanel() {
            const sectionsHtml = postFxSections.map(section => `
                <section class="fx-section" data-fx-section="${section.key}">
                    <div class="fx-section-header">
                        <div>
                            <div class="fx-section-title">${section.title}</div>
                            <div class="fx-section-copy">${section.copy}</div>
                        </div>
                        <button class="fx-toggle" type="button" id="fx-toggle-${section.key}">${section.title}: OFF</button>
                    </div>
                    <div class="fx-grid">
                        ${section.controls.map(control => {
                            const inputId = `fx-${section.key}-${control.key}`;
                            const valueId = `fx-value-${section.key}-${control.key}`;

                            if (control.type === 'checkbox') {
                                return `
                                    <label class="fx-check" for="${inputId}">
                                        <span>${control.label}</span>
                                        <input id="${inputId}" type="checkbox">
                                    </label>
                                `;
                            }

                            return `
                                <label class="fx-control" for="${inputId}">
                                    <div class="fx-control-head">
                                        <span>${control.label}</span>
                                        <span class="fx-value" id="${valueId}"></span>
                                    </div>
                                    <input
                                        class="fx-range"
                                        id="${inputId}"
                                        type="range"
                                        min="${control.min}"
                                        max="${control.max}"
                                        step="${control.step}"
                                    >
                                </label>
                            `;
                        }).join('')}
                    </div>
                    <div class="fx-note" id="fx-note-${section.key}"></div>
                </section>
            `).join('');

            postPanel.innerHTML = `
                <div class="sidepanel-header">
                    <div>
                        <div class="sidepanel-title">Post FX</div>
                        <div class="sidepanel-subtitle" id="postPanelStatus">${rendererBackendLabel}</div>
                    </div>
                    <button id="btnPostPanelClose" type="button">Hide</button>
                </div>
                <div class="sidepanel-body">${sectionsHtml}</div>
            `;

            document.getElementById('btnPostPanelClose').onclick = () => setPostPanelVisible(false);

            for (const section of postFxSections) {
                section.toggleEl = document.getElementById(`fx-toggle-${section.key}`);
                section.noteEl = document.getElementById(`fx-note-${section.key}`);
                section.controlEls = {};

                section.toggleEl.onclick = () => {
                    const enabled = section.setEnabled(!section.isEnabled());
                    syncPostFxPanel(true);
                    if (!enabled) {
                        const message = ssgiFx.getLastError();
                        if (message && (!ssgiFx.isAvailable() || section.requiresWebGPU)) {
                            perfHud.setStatus(`MaxJS - ${section.title} unavailable: ${message}`);
                        }
                    }
                };

                for (const control of section.controls) {
                    const input = document.getElementById(`fx-${section.key}-${control.key}`);
                    const valueEl = control.type === 'checkbox'
                        ? null
                        : document.getElementById(`fx-value-${section.key}-${control.key}`);

                    section.controlEls[control.key] = { input, valueEl };

                    const eventName = control.type === 'checkbox' ? 'change' : 'input';
                    input.addEventListener(eventName, () => {
                        const rawValue = control.type === 'checkbox'
                            ? input.checked
                            : Number(input.value);
                        const value = control.integer ? Math.round(rawValue) : rawValue;
                        section.setValues({ [control.key]: value });
                        syncPostFxPanel(true);
                    });
                }
            }
        }

        function syncPostFxPanel(force = false) {
            const state = ssgiFx.getState();
            const derived = postPanelVisible ? ssgiFx.getDerivedState() : null;
            const available = ssgiFx.isAvailable();
            const supportsScreenSpaceEffects = ssgiFx.supportsScreenSpaceEffects();
            const lastError = ssgiFx.getLastError();
            const signature = JSON.stringify({
                panel: postPanelVisible,
                available,
                supportsScreenSpaceEffects,
                lastError,
                state,
                derived,
            });

            if (!force && signature === lastPostFxSignature) return;
            lastPostFxSignature = signature;

            const panelStatus = document.getElementById('postPanelStatus');
            if (panelStatus) {
                panelStatus.textContent = available
                    ? `${rendererBackendLabel} backend`
                    : `${rendererBackendLabel} backend • ${lastError || 'unavailable'}`;
            }

            const hasEnabledEffects = ssgiFx.hasEnabledEffects();
            btnPostFxPanel.classList.toggle('active', postPanelVisible || hasEnabledEffects);

            for (const section of postFxSections) {
                const values = section.getValues(state);
                const enabled = section.isEnabled();
                const disabled = !available || (section.requiresWebGPU && !supportsScreenSpaceEffects);

                section.toggleEl.textContent = `${section.title}: ${enabled ? 'ON' : 'OFF'}`;
                section.toggleEl.classList.toggle('active', enabled);
                section.toggleEl.disabled = disabled;

                for (const control of section.controls) {
                    const controlEl = section.controlEls[control.key];
                    if (!controlEl) continue;

                    controlEl.input.disabled = disabled;

                    if (control.type === 'checkbox') {
                        controlEl.input.checked = !!values[control.key];
                    } else {
                        controlEl.input.value = values[control.key];
                        if (controlEl.valueEl) {
                            controlEl.valueEl.textContent = formatControlValue(control, values[control.key]);
                        }
                    }
                }

                let note = section.note;
                let isError = false;
                if (!available && lastError) {
                    note = lastError;
                    isError = true;
                } else if (section.requiresWebGPU && !supportsScreenSpaceEffects) {
                    note = 'Requires the real WebGPU backend.';
                    isError = true;
                } else if (section.key === 'ssr' && derived) {
                    note = `World distance ${derived.effectiveSSRMaxDistance.toFixed(2)} • thickness ${derived.effectiveSSRThickness.toFixed(3)}`;
                }

                section.noteEl.textContent = note;
                section.noteEl.classList.toggle('error', isError);
            }
        }

        btnPostFxPanel.onclick = () => {
            setPostPanelVisible(!postPanelVisible);
        };

        buildPostFxPanel();
        syncPostFxPanel(true);

        // ── Resize + Render ─────────────────────────────────
        addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
            ssgiFx.resize();
        });

        function renderFrame() {
            controls.update();
            const renderStart = performance.now();
            ssgiFx.render();
            syncPostFxPanel();
            perfHud.updateRender(performance.now() - renderStart, renderer.info?.render);
        }

        renderer.setAnimationLoop(renderFrame);

        startBridgeHandshake();
    </script>
</body>
</html>
