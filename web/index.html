                if (light.isDirectionalLight || light.isSpotLight || light.isPointLight) {
                    light.castShadow = enabled;
                }
            }
            // Also enable receiveShadow on all meshes
            for (const [, mesh] of nodeMap) {
                if (mesh.isMesh) mesh.receiveShadow = enabled;
            }
        });

        window.addEventListener('error', e => {
            reportBridgeError('runtime error', e.error || e.message);
        });
        window.addEventListener('unhandledrejection', e => {
            reportBridgeError('promise error', e.reason);
        });

        if (window.chrome?.webview) {
            window.chrome.webview.addEventListener('message', e => {
                try { bridge.dispatch(e.data); }
                catch (err) { reportBridgeError('message error', err); }
            });

            // Binary shared buffer handler (zero-copy geometry)
            chrome.webview.addEventListener('sharedbufferreceived', e => {
                let buf = null;
                try {
                    buf = e.getBuffer();
                    const meta = typeof e.additionalData === 'string'
                        ? JSON.parse(e.additionalData) : e.additionalData;
                    if (meta?.type === 'delta_bin') {
                        handleBinaryDelta(buf, meta);
                    } else if (meta?.type === 'geo_fast') {
                        // Real-time vertex update — in-place when topology matches
                        const mesh = nodeMap.get(meta.h);
                        if (mesh) {
                            const pos = mesh.geometry.getAttribute('position');
                            const vertCount = meta.vN / 3;
                            const idxCount = meta.iN;
                            const existingIdx = mesh.geometry.getIndex();
                            const sameTopology = pos
                                && pos.count === vertCount
                                && existingIdx
                                && existingIdx.count === idxCount;

                            if (sameTopology) {
                                // Hot path: copy positions into existing GPU buffer
                                pos.array.set(new Float32Array(buf, meta.vOff, meta.vN));
                                pos.needsUpdate = true;

                                if (meta.uvOff != null && meta.uvN) {
                                    const uv = mesh.geometry.getAttribute('uv');
                                    if (uv && uv.count === meta.uvN / 2) {
                                        uv.array.set(new Float32Array(buf, meta.uvOff, meta.uvN));
                                        uv.needsUpdate = true;
                                    }
                                }

                                if (meta.nOff != null && meta.nN) {
                                    const norm = mesh.geometry.getAttribute('normal');
                                    if (norm && norm.count === meta.nN / 3) {
                                        norm.array.set(new Float32Array(buf, meta.nOff, meta.nN));
                                        norm.needsUpdate = true;
                                    }
                                } else {
                                    scheduleNormals(mesh.geometry);
                                }

                                mesh.geometry.computeBoundingSphere();
                            } else {
                                // Topology changed — full rebuild
                                const verts = new Float32Array(new Float32Array(buf, meta.vOff, meta.vN));
                                const idx = new Uint32Array(new Int32Array(buf, meta.iOff, meta.iN));
                                const geom = new THREE.BufferGeometry();
                                geom.setAttribute('position', new THREE.BufferAttribute(verts, 3));
                                geom.setIndex(new THREE.BufferAttribute(idx, 1));
                                if (meta.uvOff != null && meta.uvN) {
                                    const uvs = new Float32Array(new Float32Array(buf, meta.uvOff, meta.uvN));
                                    geom.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
                                }
                                if (meta.nOff != null && meta.nN) {
                                    const norms = new Float32Array(new Float32Array(buf, meta.nOff, meta.nN));
                                    geom.setAttribute('normal', new THREE.BufferAttribute(norms, 3));
                                } else {
                                    geom.computeVertexNormals();
                                }
                                geom.computeBoundingSphere();
                                mesh.geometry.dispose();
                                mesh.geometry = geom;
                            }
                        }
                    } else {
                        handleBinaryScene(buf, meta);
                    }
                } catch (err) { reportBridgeError('binary sync error', err); }
                finally {
                    if (buf) chrome.webview.releaseBuffer(buf);
                }
            });
        } else {
            setInfoText('MaxJS - no bridge (standalone mode)');
        }
        window.maxJS = bridge;

        // ── Scene Sync ──────────────────────────────────────
        bridge.on('scene', msg => {
            setTransportMode('json');
            const applyStart = performance.now();
            const incoming = new Set(msg.nodes.map(n => n.h));

            // Clear material cache so changes are picked up
            materialCache.clear();

            for (const [handle, mesh] of nodeMap) {
                if (!incoming.has(handle)) {
                    scene.remove(mesh);
                    mesh.geometry.dispose();
                    nodeMap.delete(handle);
                }
            }

            for (const nd of msg.nodes) {
                let mesh = nodeMap.get(nd.h);

                // Build material: single or multi-sub array
                let mat;
                if (nd.mats && nd.groups) {
                    mat = nd.mats.map(m => createMaterial(m));
                } else {
                    mat = nd.mat ? createMaterial(nd.mat)
                        : new THREE.MeshStandardMaterial({ color: 0x888888, side: THREE.DoubleSide });
                }

                // Geometry: only rebuild if vertex data is present (skip for cached nodes)
                let geom = mesh?.geometry;
                if (nd.v && nd.i) {
                    geom = buildGeometry(nd.v, nd.i, nd.uv, nd.norm);
                    if (nd.groups) {
                        for (const [start, count, idx] of nd.groups) {
                            geom.addGroup(start, count, idx);
                        }
                    }
                } else if (geom && nd.groups) {
                    geom.clearGroups();
                    for (const [start, count, idx] of nd.groups) {
                        geom.addGroup(start, count, idx);
                    }
                }

                if (mesh) {
                    if (nd.v && nd.i && geom !== mesh.geometry) {
                        mesh.geometry.dispose();
                        mesh.geometry = geom;
                    }
                    if (clayModeActive) { mesh.userData._origMaterial = mat; }
                    else { mesh.material = mat; }
                } else {
                    if (!geom) continue;
                    mesh = new THREE.Mesh(geom, clayModeActive ? clayMat : mat);
                    if (clayModeActive) mesh.userData._origMaterial = mat;
                    mesh.matrixAutoUpdate = false;
                    mesh.name = nd.n;
                    mesh.frustumCulled = false;
                    scene.add(mesh);
                    nodeMap.set(nd.h, mesh);
                }

                mesh.visible = true;
                mesh.frustumCulled = false;
                applyMeshShadowState(mesh);
                applyNodeProps(mesh, nd.props);

                applyTransform(mesh, nd.t);
                applySelection(mesh, nd.s);
            }

            if (msg.camera) applyCamera(msg.camera);
            if (!isLocalHdriLoaded()) {
                if (msg.env?.sky) applySky(msg.env.sky);
                else if (msg.env?.hdri) { removeSky(); loadHDRI(msg.env); }
            }
            if (msg.fog) ssgiFx.setFogFromScene(msg.fog);
            if (msg.lights) applyLights(msg.lights);
            reconcileSplats(msg.splats ?? []);
            applyForestInstances(msg.forestInstances);
            scene.updateMatrixWorld(true);

            if (firstSync && msg.nodes.length > 0) {
                firstSync = false;
                if (!camLock) fitCamera();
            }
            const applyMs = performance.now() - applyStart;
            markInitialSync();
            updateSyncHud({
                transport: 'json',
                frameId: msg.frame ?? 0,
                producerBytes: msg.stats?.producerBytes ?? 0,
                decodeMs: 0,
                applyMs,
            });
        });

        // ── Camera-only sync (30fps) ─────────────────────────
        bridge.on('cam', msg => {
            if (msg.camera) applyCamera(msg.camera);
            if (msg.frame || msg.stats) {
                updateSyncHud({
                    transport: 'json',
                    frameId: msg.frame ?? 0,
                    producerBytes: msg.stats?.producerBytes ?? 0,
                    decodeMs: 0,
                    applyMs: 0,
                });
            }
        });

        // ── Environment/Fog live update (standalone, change-only) ──
        bridge.on('env_update', msg => {
            if (msg.env && !isLocalHdriLoaded()) {
                if (msg.env.sky) {
                    applySky(msg.env.sky);
                } else if (msg.env.hdri) {
                    removeSky();
                    loadHDRI(msg.env);
                }
            }
            if (msg.fog) ssgiFx.setFogFromScene(msg.fog);
        });

        // ── Geometry Fast Update (single mesh, real-time vertex editing) ──
        const pendingNormals = new Set();
        let normalTimer = null;
        function scheduleNormals(geom) {
            pendingNormals.add(geom);
            clearTimeout(normalTimer);
            normalTimer = setTimeout(() => {
                for (const g of pendingNormals) {
                    g.computeVertexNormals();
                    const n = g.getAttribute('normal');
                    if (n) n.needsUpdate = true;
                }
                pendingNormals.clear();
            }, 80);
        }

        bridge.on('geo_fast', msg => {
            const mesh = nodeMap.get(msg.h);
            if (!mesh) return;
            const geom = buildGeometry(msg.v, msg.i, msg.uv, msg.norm);
            mesh.geometry.dispose();
            mesh.geometry = geom;
        });

        // ── Transform Sync (+ material scalars, ~6fps) ──────
        bridge.on('xform', msg => {
            const applyStart = performance.now();
            for (const nd of msg.nodes) {
                const mesh = nodeMap.get(nd.h);
                if (!mesh) continue;
                // Visibility (hide/unhide/isolate) — instant, no full sync needed
                const vis = nd.vis !== 0;
                if (mesh.visible !== vis) mesh.visible = vis;
                applyTransform(mesh, nd.t);
                applySelection(mesh, nd.s);
                // Live material update from scalars
                if (nd.mat && mesh.material) applyMaterialScalar(mesh, nd.mat);
            }
            if (msg.lights) applyLightUpdates(msg.lights);
            if (msg.splats) applySplatUpdates(msg.splats);
            if (msg.camera) applyCamera(msg.camera);
            scene.updateMatrixWorld(true);
            const applyMs = performance.now() - applyStart;
            updateSyncHud({
                transport: 'json',
                frameId: msg.frame ?? 0,
                producerBytes: msg.stats?.producerBytes ?? 0,
                decodeMs: 0,
                applyMs,
            });
        });

        // ── Binary Scene Handler (SharedBuffer) ──────────────
        function handleBinaryScene(buffer, meta) {
            if (meta.type !== 'scene_bin') return;
            setTransportMode('binary-scene');
            const applyStart = performance.now();
            const incoming = new Set(meta.nodes.map(n => n.h));
            materialCache.clear();

            // Remove deleted — collect first, then dispose non-shared geometries
            const toRemove = [];
            for (const [handle, mesh] of nodeMap) {
                if (!incoming.has(handle)) toRemove.push(handle);
            }
            for (const handle of toRemove) {
                const mesh = nodeMap.get(handle);
                scene.remove(mesh);
                const isShared = [...nodeMap.values()].some(m => m !== mesh && m.geometry === mesh.geometry);
                if (!isShared) mesh.geometry.dispose();
                nodeMap.delete(handle);
            }

            // Geometry cache for instance sharing within this sync
            const geoByHandle = new Map();

            for (const nd of meta.nodes) {
                let mesh = nodeMap.get(nd.h);

                // Build material: single or multi-sub array
                let mat;
                if (nd.mats && nd.groups) {
                    mat = nd.mats.map(m => createMaterial(m));
                } else {
                    mat = nd.mat ? createMaterial(nd.mat)
                        : new THREE.MeshStandardMaterial({ color: 0x888888, side: THREE.DoubleSide });
                }

                // Instance: share geometry from the source node (no new BufferGeometry)
                let geom = mesh?.geometry;
                if (nd.instOf && !nd.geo) {
                    const srcGeom = geoByHandle.get(nd.instOf) || nodeMap.get(nd.instOf)?.geometry;
                    if (srcGeom) geom = srcGeom;
                } else if (nd.geo) {
                    const inRange = (off, n) =>
                        Number.isInteger(off) &&
                        Number.isInteger(n) &&
                        off >= 0 &&
                        n >= 0 &&
                        (off % 4) === 0 &&
                        (off + n * 4) <= buffer.byteLength;

                    if (!inRange(nd.geo.vOff, nd.geo.vN) || !inRange(nd.geo.iOff, nd.geo.iN)) {
                        console.warn('[MaxJS binary] Invalid vertex/index range for', nd.n);
                        continue;
                    }
                    if (nd.geo.uvOff != null && !inRange(nd.geo.uvOff, nd.geo.uvN || 0)) {
                        console.warn('[MaxJS binary] Invalid UV range for', nd.n);
                        continue;
                    }
                    const vertsCopy = new Float32Array(
                        new Float32Array(buffer, nd.geo.vOff, nd.geo.vN)
                    );
                    const idxCopy = new Uint32Array(
                        new Int32Array(buffer, nd.geo.iOff, nd.geo.iN)
                    );

                    geom = new THREE.BufferGeometry();
                    geom.setAttribute('position', new THREE.BufferAttribute(vertsCopy, 3));
                    geom.setIndex(new THREE.BufferAttribute(idxCopy, 1));

                    if (nd.geo.uvOff != null && nd.geo.uvN) {
                        const uvsCopy = new Float32Array(
                            new Float32Array(buffer, nd.geo.uvOff, nd.geo.uvN)
                        );
                        geom.setAttribute('uv', new THREE.BufferAttribute(uvsCopy, 2));
                    }
                    if (nd.geo.nOff != null && inRange(nd.geo.nOff, nd.geo.nN || 0)) {
                        const normalsCopy = new Float32Array(
                            new Float32Array(buffer, nd.geo.nOff, nd.geo.nN)
                        );
                        geom.setAttribute('normal', new THREE.BufferAttribute(normalsCopy, 3));
                    } else {
                        geom.computeVertexNormals();
                    }
                    // Add material groups for Multi/Sub
                    if (nd.groups) {
                        for (const [start, count, idx] of nd.groups) {
                            geom.addGroup(start, count, idx);
                        }
                    }
                } else if (geom && nd.groups) {
                    // Geometry unchanged, but keep groups/material indexing synced.
                    geom.clearGroups();
                    for (const [start, count, idx] of nd.groups) {
                        geom.addGroup(start, count, idx);
                    }
                }

                // Cache geometry for instance sharing (always, not just when new geo arrives)
                if (geom) geoByHandle.set(nd.h, geom);

                if (mesh) {
                    if (geom && geom !== mesh.geometry) {
                        // Only dispose if not shared with another mesh
                        const isShared = [...nodeMap.values()].some(m => m !== mesh && m.geometry === mesh.geometry);
                        if (!isShared) mesh.geometry.dispose();
                        mesh.geometry = geom;
                    }
                    if (clayModeActive) { mesh.userData._origMaterial = mat; }
                    else { mesh.material = mat; }
                } else {
                    if (!geom) continue;
                    mesh = new THREE.Mesh(geom, clayModeActive ? clayMat : mat);
                    if (clayModeActive) mesh.userData._origMaterial = mat;
                    mesh.matrixAutoUpdate = false;
                    mesh.name = nd.n;
                    mesh.frustumCulled = false;
                    scene.add(mesh);
                    nodeMap.set(nd.h, mesh);
                }

                mesh.visible = nd.vis !== 0;
                mesh.frustumCulled = false;
                applyMeshShadowState(mesh);
                applyNodeProps(mesh, nd.props);

                applyTransform(mesh, nd.t);
                applySelection(mesh, nd.s);
            }

            if (meta.camera) applyCamera(meta.camera);
            if (!isLocalHdriLoaded()) {
                if (meta.env?.sky) applySky(meta.env.sky);
                else if (meta.env?.hdri) { removeSky(); loadHDRI(meta.env); }
            }
            if (meta.fog) ssgiFx.setFogFromScene(meta.fog);
            if (meta.lights) applyLights(meta.lights);
            reconcileSplats(meta.splats ?? []);
            applyForestInstances(meta.forestInstances);
            scene.updateMatrixWorld(true);

            if (firstSync && meta.nodes.length > 0) {
                firstSync = false;
                if (!camLock) fitCamera();
            }
            const applyMs = performance.now() - applyStart;
            markInitialSync();
            updateSyncHud({
                transport: 'binary-scene',
                frameId: meta.frame ?? 0,
                producerBytes: meta.stats?.producerBytes ?? buffer.byteLength,
                decodeMs: 0,
                applyMs,
            });
        }

        function handleBinaryDelta(buffer, meta) {
            const result = applyDeltaFrame(buffer, {
                onTransform(nodeHandle, matrix) {
                    const mesh = nodeMap.get(nodeHandle);
                    if (mesh) applyTransform(mesh, matrix);
                },
                onMaterialScalar(nodeHandle, material) {
                    const mesh = nodeMap.get(nodeHandle);
                    if (mesh) applyMaterialScalar(mesh, material);
                },
                onSelection(nodeHandle, selected) {
                    const mesh = nodeMap.get(nodeHandle);
                    if (mesh) applySelection(mesh, selected);
                },
                onVisibility(nodeHandle, visible) {
                    const mesh = nodeMap.get(nodeHandle);
                    if (mesh) mesh.visible = visible;
                },
                onCamera(cameraState) {
                    applyCamera(cameraState);
                },
            });
            scene.updateMatrixWorld(true);
            markInitialSync();
            setTransportMode('binary-delta');
            updateSyncHud({
                transport: 'binary-delta',
                frameId: meta.frame ?? result.frameId,
                producerBytes: meta.stats?.producerBytes ?? result.bytes,
                decodeMs: result.decodeMs,
                applyMs: result.applyMs,
            });
        }

        // ── Geometry Builder ────────────────────────────────
        function buildGeometry(vertices, indices, uvs, normals) {
            const geom = new THREE.BufferGeometry();
            geom.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            if (indices?.length) geom.setIndex(indices);
            if (uvs?.length) geom.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
            if (normals?.length) geom.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
            else geom.computeVertexNormals();
            geom.computeBoundingBox();
            geom.computeBoundingSphere();
            return geom;
        }

        function isFiniteArray(values, expectedLength) {
            const isArrayLike = Array.isArray(values) || ArrayBuffer.isView(values);
            if (!isArrayLike || values.length !== expectedLength) return false;
            for (let i = 0; i < values.length; i++) {
                if (!Number.isFinite(values[i])) return false;
            }
            return true;
        }

        function applyTransform(mesh, t) {
            if (!isFiniteArray(t, 16)) {
                mesh.matrix.identity();
                mesh.position.set(0, 0, 0);
                mesh.quaternion.identity();
                mesh.scale.set(1, 1, 1);
                return false;
            }
            mesh.matrix.fromArray(t);
            mesh.matrixWorldNeedsUpdate = true;
            return true;
        }

        function applySelection(mesh, selected) {
            mesh.userData.maxjsSelected = !!selected;
            // Toon outline is auto-detected from material type — no manual selection needed
        }

        function applyMaterialScalar(mesh, material) {
            const c = material?.color;
            const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
            for (const m of mats) {
                if (!m) continue;
                if (c && m.color) m.color.setRGB(c[0], c[1], c[2]);
                if (material?.rough != null && 'roughness' in m) m.roughness = material.rough;
                if (material?.metal != null && 'metalness' in m) m.metalness = material.metal;
                if (material?.opacity != null) {
                    m.opacity = material.opacity;
                    m.transparent = material.opacity < 0.999;
                }
                rememberMaterialEmissiveBase(m);
                applyMaterialSelectionState(m, !!mesh.userData.maxjsSelected);
                m.needsUpdate = true;
            }
        }

        // ── Lights Sync ──────────────────────────────────────
        const lightGroup = new THREE.Group();
        lightGroup.name = '__maxjs_lights';
        scene.add(lightGroup);
        const LIGHT_TYPES = ['DirectionalLight', 'PointLight', 'SpotLight', 'RectAreaLight', 'HemisphereLight', 'AmbientLight'];
        const lightHandleMap = new Map();
        const shadowBounds = new THREE.Box3();
        const shadowCenter = new THREE.Vector3();
        const shadowSize = new THREE.Vector3();
        const shadowTarget = new THREE.Vector3();

        function getShadowSceneFocus() {
            shadowBounds.makeEmpty();
            for (const [, mesh] of nodeMap) {
                if (!mesh?.isMesh || !mesh.visible) continue;
                shadowBounds.expandByObject(mesh);
            }

            if (shadowBounds.isEmpty()) {
                shadowBounds.min.set(-100, -100, -100);
                shadowBounds.max.set(100, 100, 100);
            }

            shadowBounds.getCenter(shadowCenter);
            shadowBounds.getSize(shadowSize);
            const radius = Math.max(shadowSize.x, shadowSize.y, shadowSize.z, 50);
            return { center: shadowCenter, radius };
        }

        function updateLightShadowCamera(light, ld) {
            if (!light?.shadow || !light.castShadow) return;

            const { center, radius } = getShadowSceneFocus();
            const shadowCamera = light.shadow.camera;

            if (ld.type === 0 && shadowCamera?.isOrthographicCamera) {
                shadowCamera.left = -radius;
                shadowCamera.right = radius;
                shadowCamera.top = radius;
                shadowCamera.bottom = -radius;
                shadowCamera.near = 0.1;
                shadowCamera.far = Math.max(radius * 8, light.position.distanceTo(shadowTarget), 200);
                shadowCamera.updateProjectionMatrix();
            } else if (ld.type === 1 && shadowCamera?.isPerspectiveCamera) {
                shadowCamera.near = Math.max(radius * 0.01, 0.1);
                shadowCamera.far = ld.distance > 0 ? ld.distance : Math.max(radius * 6, 200);
                shadowCamera.updateProjectionMatrix();
            } else if (ld.type === 2 && shadowCamera?.isPerspectiveCamera) {
                shadowCamera.near = Math.max(radius * 0.01, 0.1);
                shadowCamera.far = ld.distance > 0 ? ld.distance : Math.max(radius * 6, 200);
                shadowCamera.fov = THREE.MathUtils.radToDeg((ld.angle ?? Math.PI / 4) * 2);
                shadowCamera.updateProjectionMatrix();
            }

            light.shadow.needsUpdate = true;
        }

        function clearLights() {
            lightHandleMap.clear();
            while (lightGroup.children.length) {
                const c = lightGroup.children[0];
                lightGroup.remove(c);
                if (c.dispose) c.dispose();
            }
        }

        function setLightTargetFromData(light, ld) {
            const target = light.userData?.maxjsTarget;
            if (!target) return;
            const { radius } = getShadowSceneFocus();
            const targetDistance = Math.max(radius * 2, 100);
            target.position.set(
                ld.pos[0] + ld.dir[0] * targetDistance,
                ld.pos[1] + ld.dir[1] * targetDistance,
                ld.pos[2] + ld.dir[2] * targetDistance
            );
            target.updateMatrixWorld();
            shadowTarget.copy(target.position);
        }

        function applyLightData(light, ld) {
            light.userData ??= {};
            light.userData.maxjsTypeId = ld.type;
            if (ld.h != null) light.userData.maxjsHandle = ld.h;

            const visible = ld.v == null ? true : !!ld.v;
            light.visible = visible;
            if (light.userData.maxjsTarget) light.userData.maxjsTarget.visible = visible;

            if (light.color && Array.isArray(ld.color)) {
                light.color.setRGB(ld.color[0], ld.color[1], ld.color[2]);
            }
            if ('intensity' in light && Number.isFinite(ld.intensity)) {
                light.intensity = ld.intensity;
            }
            if (Number.isFinite(ld.volContrib)) {
                light.userData.volContrib = ld.volContrib;
            }

            switch (ld.type) {
            case 0:
                light.position.set(ld.pos[0], ld.pos[1], ld.pos[2]);
                setLightTargetFromData(light, ld);
                break;
            case 1:
                light.position.set(ld.pos[0], ld.pos[1], ld.pos[2]);
                light.distance = ld.distance || 0;
                light.decay = ld.decay ?? 2;
                break;
            case 2:
                light.position.set(ld.pos[0], ld.pos[1], ld.pos[2]);
                light.distance = ld.distance || 0;
                light.decay = ld.decay ?? 2;
                light.angle = ld.angle ?? Math.PI / 4;
                light.penumbra = ld.penumbra ?? 0.1;
                setLightTargetFromData(light, ld);
                break;
            case 3:
                light.position.set(ld.pos[0], ld.pos[1], ld.pos[2]);
                light.width = ld.width || 20;
                light.height = ld.height || 20;
                light.lookAt(
                    ld.pos[0] + ld.dir[0],
                    ld.pos[1] + ld.dir[1],
                    ld.pos[2] + ld.dir[2]
                );
                break;
            case 4:
                light.position.set(ld.pos[0], ld.pos[1], ld.pos[2]);
                light.groundColor.setRGB(
                    ld.groundColor?.[0] ?? 0.2666666667,
                    ld.groundColor?.[1] ?? 0.2666666667,
                    ld.groundColor?.[2] ?? 0.2666666667
                );
                break;
            case 5:
                break;
            }

            if (light.shadow) {
                light.castShadow = !!ld.castShadow;
                if (light.castShadow) {
                    light.shadow.bias = ld.shadowBias ?? -0.0001;
                    light.shadow.radius = ld.shadowRadius ?? 1;
                    const mapSz = ld.shadowMapSize ?? 1024;
                    light.shadow.mapSize.set(mapSz, mapSz);
                    updateLightShadowCamera(light, ld);
                }
            }
        }

        function createLightFromData(ld) {
            let light;
            switch (ld.type) {
            case 0:
                light = new THREE.DirectionalLight(0xffffff, 1);
                light.userData.maxjsTarget = light.target;
                lightGroup.add(light.target);
                break;
            case 1:
                light = new THREE.PointLight(0xffffff, 1, 0, 2);
                break;
            case 2:
                light = new THREE.SpotLight(0xffffff, 1, 0, Math.PI / 4, 0.1, 2);
                light.userData.maxjsTarget = light.target;
                lightGroup.add(light.target);
                break;
            case 3:
                light = new THREE.RectAreaLight(0xffffff, 1, ld.width || 20, ld.height || 20);
                break;
            case 4:
                light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
                break;
            case 5:
                light = new THREE.AmbientLight(0xffffff, 1);
                break;
            default:
                return null;
            }

            applyLightData(light, ld);
            return light;
        }

        function finalizeLightState(lightsData) {
            let appliedLightCount = 0;
            let mainDirectionalLight = null;

            for (const ld of lightsData) {
                const light = createLightFromData(ld);
                if (!light) continue;
                lightGroup.add(light);
                if (ld.h != null) lightHandleMap.set(ld.h, light);
                if (light.visible !== false) {
                    appliedLightCount++;
                    if (!mainDirectionalLight && ld.type === 0) mainDirectionalLight = light;
                }
            }

            defaultLights.visible = appliedLightCount === 0 && !currentHdriUrl && !skyActive;
            if (ssgiFx.setMainLight) {
                ssgiFx.setMainLight(mainDirectionalLight || (defaultLights.visible ? defaultKey : null));
            }
        }

        function applyLights(lightsData) {
            clearLights();
            finalizeLightState(lightsData);
        }

        // ── ForestPack GPU Instancing ───────────────────────
        const forestMeshes = new Map(); // key → InstancedMesh

        function applyForestInstances(groups) {
            // Remove old forest meshes
            for (const [key, mesh] of forestMeshes) {
                scene.remove(mesh);
                mesh.geometry.dispose();
                mesh.dispose();
            }
            forestMeshes.clear();

            if (!Array.isArray(groups) || groups.length === 0) return;
            console.log('[ForestPack]', groups.length, 'groups, total instances:', groups.reduce((s, g) => s + (g.count || 0), 0));

            const m = new THREE.Matrix4();

            for (const grp of groups) {
                if (!grp.v?.length || !grp.i?.length || !grp.xforms?.length) continue;

                const geom = buildGeometry(grp.v, grp.i, grp.uv, grp.norm);

                // Material: use data from C++ (single or multi-sub), fallback to gray
                let mat;
                if (clayModeActive) {
                    mat = clayMat;
                } else if (grp.mats && grp.groups) {
                    // Multi/Sub material — create material array + geometry groups
                    mat = grp.mats.map(m => createMaterial(m));
                    for (const [start, count, idx] of grp.groups) {
                        geom.addGroup(start, count, idx);
                    }
                } else if (grp.mat) {
                    mat = createMaterial(grp.mat);
                } else {
                    mat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.7, side: THREE.DoubleSide });
                }

                const count = grp.count || (grp.xforms.length / 16);
                const instMesh = new THREE.InstancedMesh(geom, mat, count);
                instMesh.matrixAutoUpdate = false;
                instMesh.frustumCulled = false;
                instMesh.castShadow = true;
                instMesh.receiveShadow = true;
                instMesh.name = `forest_${grp.src}_x${count}`;

                // xforms is a flat array: [m0_0..m0_15, m1_0..m1_15, ...]
                for (let i = 0; i < count; i++) {
                    const off = i * 16;
                    // Max row-major → Three.js column-major (transpose)
                    m.set(
                        grp.xforms[off+0], grp.xforms[off+4], grp.xforms[off+8],  grp.xforms[off+12],
                        grp.xforms[off+1], grp.xforms[off+5], grp.xforms[off+9],  grp.xforms[off+13],

                        grp.xforms[off+3], grp.xforms[off+7], grp.xforms[off+11], grp.xforms[off+15]
                    );
                    instMesh.setMatrixAt(i, m);
                }
                instMesh.instanceMatrix.needsUpdate = true;

                scene.add(instMesh);
                forestMeshes.set(`${grp.src}`, instMesh);
            }

        function applyLightUpdates(lightsData) {
            if (!Array.isArray(lightsData)) return;

            let appliedLightCount = 0;
            let mainDirectionalLight = null;

            for (const ld of lightsData) {
                const light = lightHandleMap.get(ld.h);
                if (!light || light.userData?.maxjsTypeId !== ld.type || light.type !== LIGHT_TYPES[ld.type]) {
                    applyLights(lightsData);
                    return;
                }

                applyLightData(light, ld);
                if (light.visible !== false) {
                    appliedLightCount++;
                    if (!mainDirectionalLight && ld.type === 0) mainDirectionalLight = light;
                }
            }

            defaultLights.visible = appliedLightCount === 0 && !currentHdriUrl && !skyActive;
            if (ssgiFx.setMainLight) {
                ssgiFx.setMainLight(mainDirectionalLight || (defaultLights.visible ? defaultKey : null));
            }

        function applyCamera(cam) {
            if (!camLock) return;
            if (!isFiniteArray(cam?.pos, 3) || !isFiniteArray(cam?.tgt, 3) || !isFiniteArray(cam?.up, 3)) {
                return;
            }
            camera.position.set(cam.pos[0], cam.pos[1], cam.pos[2]);
            camera.up.set(cam.up[0], cam.up[1], cam.up[2]);
            camera.lookAt(cam.tgt[0], cam.tgt[1], cam.tgt[2]);

            if (Number.isFinite(cam.fov) && cam.persp && cam.fov > 0 && cam.fov < 170) {
                const aspect = innerWidth / innerHeight;
                const hRad = cam.fov * Math.PI / 180;
                camera.fov = 2 * Math.atan(Math.tan(hRad / 2) / aspect) * 180 / Math.PI;
            }
            camera.updateProjectionMatrix();
            controls.target.set(cam.tgt[0], cam.tgt[1], cam.tgt[2]);
        }

        function fitCamera() {
            scene.updateMatrixWorld(true);
            const box = new THREE.Box3();
            for (const [, mesh] of nodeMap) box.expandByObject(mesh);
            if (box.isEmpty()) return;
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            controls.target.copy(center);
            camera.position.set(
                center.x + maxDim * 1.2,
                center.y - maxDim * 1.2,
                center.z + maxDim * 0.8
            );
            camera.near = maxDim * 0.001;
            camera.far = maxDim * 100;
            camera.updateProjectionMatrix();
            controls.update();

                    gtao: { samples: 16, distanceExponent: 1.0, distanceFallOff: 1.0, radius: 0.5, scale: 2.0, thickness: 1.0, resolutionScale: 1.0 },
                    bloom: { strength: 0.4, radius: 0.2, threshold: 0.75 },
                    toonOutline: { thickness: 0.003, alpha: 1.0 },
                    motionBlur: { amount: 1.0, samples: 16 },
                    traa: { useSubpixelCorrection: true, depthThreshold: 0.0005, edgeDepthDiff: 0.001, maxVelocityLength: 128 },
                    contactShadow: { maxDistance: 0.1, thickness: 0.006, shadowIntensity: 0.85, quality: 0.3, temporal: false },
                    retro: { wiggle: true, affineDistortion: 5.0, resolutionScale: 0.25, filterTextures: false, dither: false, colorDepth: 32, scanlines: false, scanlineIntensity: 0.3, scanlineDensity: 1.0, crt: false, vignetteIntensity: 0.3, bleeding: 0.001, curvature: 0.02 },
                    volumetric: { intensity: 1.0, steps: 12, density: 0.5, denoise: 0.6, resolution: 0.25 },
                    pixel: { pixelate: false, pixelSize: 4, chromatic: false, chromaticIntensity: 0.005, sharpen: false, sharpenStrength: 0.5, grain: false, grainIntensity: 0.08, brightness: 0, contrast: 0, saturation: 0 },
                    fog: { type: 0, opacity: 1.0, near: 10, far: 500, density: 0.01, noiseScale: 0.005, noiseSpeed: 0.2, height: 20 },
                };
                if (clayModeActive) {
                    // Clay owns the live FX state — reset the snapshot so exit restores to defaults
                    clayPreFxSnapshot = { ssgi: false, ssr: false, gtao: false, bloom: false,
                        toonOutline: false, motionBlur: false, traa: false, contactShadow: false,
                        retro: false, volumetric: false, pixel: false, fog: false };
                    // Still push default values so they're ready when clay exits
                    for (const section of postFxSections) {
                        if (defaults[section.key]) section.setValues(defaults[section.key]);
                    }
                } else {
                    for (const section of postFxSections) {
                        section.setEnabled(false);
                        if (defaults[section.key]) section.setValues(defaults[section.key]);
                    }
                }
                currentToneMapping = 'None';
                currentExposure = 1.0;
                renderer.toneMapping = toneMappingModes[currentToneMapping];
                renderer.toneMappingExposure = currentExposure;
                try { localStorage.removeItem(POSTFX_STORAGE_KEY); localStorage.removeItem('maxjs_panel_width'); } catch {}
                postPanel.style.width = '';
                buildPostFxPanel();
                syncPostFxPanel(true);
            };

            // Panel horizontal resize
            const resizeHandle = document.getElementById('panelResizeHandle');
            let resizing = false;
            resizeHandle.addEventListener('mousedown', (e) => {
                e.preventDefault();
                resizing = true;
                resizeHandle.classList.add('active');
                const startX = e.clientX;
                const startW = postPanel.offsetWidth;
                const onMove = (ev) => {
                    const dx = startX - ev.clientX;
                    const newW = Math.max(200, Math.min(startW + dx, window.innerWidth - 16));
                    postPanel.style.width = newW + 'px';
                };
                const onUp = () => {
                    resizing = false;
                    resizeHandle.classList.remove('active');
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                    try { localStorage.setItem('maxjs_panel_width', postPanel.style.width); } catch {}
                };
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            });
            try {
                const savedW = localStorage.getItem('maxjs_panel_width');
                if (savedW) postPanel.style.width = savedW;
            } catch {}

            // Tone mapping controls
            document.getElementById('fx-tonemapping-mode').onchange = (e) => {
                currentToneMapping = e.target.value;
                renderer.toneMapping = toneMappingModes[currentToneMapping];
                savePostFxState();
            };
            const expSlider = document.getElementById('fx-tonemapping-exp');
            const expLabel = document.getElementById('fx-tonemapping-exp-val');
            expSlider.oninput = (e) => {
                currentExposure = parseFloat(e.target.value);
                renderer.toneMappingExposure = currentExposure;
                expLabel.textContent = currentExposure.toFixed(1);
                savePostFxState();
            };

            // HDRI Environment controls
            const hdriFileInput = document.getElementById('fx-hdri-file');
            document.getElementById('fx-hdri-toggle').onclick = () => toggleLocalHDRI(!localHdriEnabled);
            document.getElementById('fx-hdri-load').onclick = () => hdriFileInput.click();
            document.getElementById('fx-hdri-clear').onclick = () => clearLocalHDRI();
            hdriFileInput.onchange = (e) => {
                const file = e.target.files?.[0];
                if (file) loadLocalHDRIFile(file);
                hdriFileInput.value = '';
            };
            const hdriRotSlider = document.getElementById('fx-hdri-rotation');
            const hdriRotVal = document.getElementById('fx-hdri-rotation-val');
            hdriRotSlider.oninput = (e) => {
                localHdriRotation = parseFloat(e.target.value);
                hdriRotVal.textContent = Math.round(localHdriRotation);
                applyLocalHDRISettings();
                savePostFxState();
            };
            const hdriIntSlider = document.getElementById('fx-hdri-intensity');
            const hdriIntVal = document.getElementById('fx-hdri-intensity-val');
            hdriIntSlider.oninput = (e) => {
                localHdriIntensity = parseFloat(e.target.value);
                hdriIntVal.textContent = localHdriIntensity.toFixed(2);
                applyLocalHDRISettings();
                savePostFxState();
            };
            const hdriBlurSlider = document.getElementById('fx-hdri-blur');
            const hdriBlurVal = document.getElementById('fx-hdri-blur-val');
            hdriBlurSlider.oninput = (e) => {
                localHdriBlur = parseFloat(e.target.value);
                hdriBlurVal.textContent = localHdriBlur.toFixed(2);
                applyLocalHDRISettings();
                savePostFxState();
            };
            const hdriFlipCheck = document.getElementById('fx-hdri-flip');
            hdriFlipCheck.onchange = () => {
                localHdriFlip = hdriFlipCheck.checked;
                applyLocalHDRISettings();
                savePostFxState();
            };
            // Sync initial state
            hdriRotSlider.value = localHdriRotation;
            hdriRotVal.textContent = Math.round(localHdriRotation);
            hdriIntSlider.value = localHdriIntensity;
            hdriIntVal.textContent = localHdriIntensity.toFixed(2);
            hdriBlurSlider.value = localHdriBlur;
            hdriBlurVal.textContent = localHdriBlur.toFixed(2);
            hdriFlipCheck.checked = localHdriFlip;
            syncHdriPanel();

            for (const section of postFxSections) {
                section.toggleEl = document.getElementById(`fx-toggle-${section.key}`);
                section.noteEl = document.getElementById(`fx-note-${section.key}`);
                section.controlEls = {};

                section.toggleEl.onclick = () => {
                    const enabled = section.setEnabled(!section.isEnabled());
                    syncPostFxPanel(true);
                    if (!enabled) {
                        const message = ssgiFx.getLastError();
                        if (message && (!ssgiFx.isAvailable() || section.requiresWebGPU)) {
                            perfHud.setStatus(`MaxJS - ${section.title} unavailable: ${message}`);
                        }
                    }
                };

                for (const control of section.controls) {
                    const input = document.getElementById(`fx-${section.key}-${control.key}`);
                    const valueEl = control.type === 'checkbox'
                        ? null
                        : document.getElementById(`fx-value-${section.key}-${control.key}`);

                    section.controlEls[control.key] = { input, valueEl };

                    const eventName = control.type === 'checkbox' ? 'change' : 'input';
                    input.addEventListener(eventName, () => {
                        const rawValue = control.type === 'checkbox'
                            ? input.checked
                            : Number(input.value);
                        const value = control.integer ? Math.round(rawValue) : rawValue;
                        section.setValues({ [control.key]: value });
                        syncPostFxPanel(true);
                    });
                }
            }
        }

        function syncPostFxPanel(force = false) {
            const state = ssgiFx.getState();
            const derived = postPanelVisible ? ssgiFx.getDerivedState() : null;
            const available = ssgiFx.isAvailable();
            const supportsScreenSpaceEffects = ssgiFx.supportsScreenSpaceEffects();
            const lastError = ssgiFx.getLastError();
            const signature = JSON.stringify({
                panel: postPanelVisible,
                available,
                supportsScreenSpaceEffects,
                lastError,
                state,
                derived,
            });

            if (!force && signature === lastPostFxSignature) return;
            lastPostFxSignature = signature;

            const panelStatus = document.getElementById('postPanelStatus');
            if (panelStatus) {
                panelStatus.textContent = available
                    ? `${rendererBackendLabel} backend`
                    : `${rendererBackendLabel} backend • ${lastError || 'unavailable'}`;
            }

            const hasEnabledEffects = ssgiFx.hasEnabledEffects();
            btnPostFxPanel.classList.toggle('active', postPanelVisible || hasEnabledEffects);

            for (const section of postFxSections) {
                const values = section.getValues(state);
                const enabled = section.isEnabled();
                const disabled = !available || (section.requiresWebGPU && !supportsScreenSpaceEffects);

                section.toggleEl.textContent = enabled ? 'On' : 'Off';
                section.toggleEl.classList.toggle('active', enabled);
                section.toggleEl.disabled = disabled;

                for (const control of section.controls) {
                    const controlEl = section.controlEls[control.key];
                    if (!controlEl) continue;

                    controlEl.input.disabled = disabled;

                    if (control.type === 'checkbox') {
                        controlEl.input.checked = !!values[control.key];
                    } else {
                        controlEl.input.value = values[control.key];
                        if (controlEl.valueEl) {
                            controlEl.valueEl.textContent = formatControlValue(control, values[control.key]);
                        }
                    }
                }

                let note = section.note;
                let isError = false;
                if (!available && lastError) {
                    note = lastError;
                    isError = true;
                } else if (section.requiresWebGPU && !supportsScreenSpaceEffects) {
                    note = 'Requires the real WebGPU backend.';
                    isError = true;
                } else if (
                    derived?.retroTakeoverActive &&
                    ['ssgi', 'ssr', 'gtao', 'motionBlur', 'traa', 'contactShadow'].includes(section.key)
                ) {
                    note = 'Bypassed while Retro Wiggle takeover is active.';
                } else if (section.key === 'ssr' && derived) {
                    note = `World distance ${derived.effectiveSSRMaxDistance.toFixed(2)} • thickness ${derived.effectiveSSRThickness.toFixed(3)}`;
                } else if (section.key === 'gtao' && derived) {
                    note = `World radius ${derived.effectiveGTAORadius.toFixed(2)} • thickness ${derived.effectiveGTAOThickness.toFixed(2)}`;
                } else if (section.key === 'contactShadow' && derived) {
                    note = `World distance ${derived.effectiveContactShadowMaxDistance.toFixed(2)} • thickness ${derived.effectiveContactShadowThickness.toFixed(3)}`;
                    if (values.temporal && !state.traa.enabled) {
                        note += ' • Temporal needs TRAA';
                    }
                } else if (section.key === 'traa') {
                    note = values.useSubpixelCorrection
                        ? 'Temporal AA with subpixel correction enabled.'
                        : 'Temporal AA with the cleaner, less corrective resolve.';
                }

                section.noteEl.textContent = note;
                section.noteEl.classList.toggle('error', isError);
            }

            savePostFxState();
        }

        btnPostFxPanel.onclick = () => {
            setPostPanelVisible(!postPanelVisible);
        };

        // ── Post FX persistence via localStorage ──
        const POSTFX_STORAGE_KEY = 'maxjs_postfx_state';

        function savePostFxState() {
            try {
                const state = ssgiFx.getState();
                const payload = {
                    toneMapping: currentToneMapping,
                    exposure: currentExposure,
                    fx: state,
                    hdri: {
                        rotation: localHdriRotation,
                        intensity: localHdriIntensity,
                        showBg: localHdriShowBg,
                        blur: localHdriBlur,
                        flip: localHdriFlip,
                        enabled: localHdriEnabled,
                        fileName: isLocalHdriLoaded() ? localHdriFileName : '',
                    },
                };
                localStorage.setItem(POSTFX_STORAGE_KEY, JSON.stringify(payload));
            } catch {}
        }

        function restorePostFxState() {
            try {
                const raw = localStorage.getItem(POSTFX_STORAGE_KEY);
                if (!raw) return;
                const saved = JSON.parse(raw);

                if (saved.toneMapping && toneMappingModes[saved.toneMapping] != null) {
                    currentToneMapping = saved.toneMapping;
                    renderer.toneMapping = toneMappingModes[currentToneMapping];
                }
                if (Number.isFinite(saved.exposure)) {
                    currentExposure = saved.exposure;
                    renderer.toneMappingExposure = currentExposure;
                }

                // Restore HDRI settings (file must be re-picked, but sliders persist)
                if (saved.hdri) {
                    if (Number.isFinite(saved.hdri.rotation)) localHdriRotation = saved.hdri.rotation;
                    if (Number.isFinite(saved.hdri.intensity)) localHdriIntensity = saved.hdri.intensity;
                    if (Number.isFinite(saved.hdri.blur)) localHdriBlur = saved.hdri.blur;
                    if (typeof saved.hdri.showBg === 'boolean') localHdriShowBg = saved.hdri.showBg;
                    if (typeof saved.hdri.flip === 'boolean') localHdriFlip = saved.hdri.flip;
                    if (typeof saved.hdri.enabled === 'boolean') localHdriEnabled = saved.hdri.enabled;
                }

                const fx = saved.fx;
                if (!fx) return;

                for (const section of postFxSections) {
                    const saved = fx[section.key];
                    if (!saved) continue;
                    const wasEnabled = saved.enabled;
                    delete saved.enabled;
                    // Apply values first (without triggering rebuild per-param)
                    section.setValues(saved);
                    // Then enable/disable
                    if (wasEnabled) section.setEnabled(true);
                }
            } catch (e) {
                console.warn('MaxJS: failed to restore post-FX state', e);
            }
        }

        restorePostFxState();
        buildPostFxPanel();
        syncPostFxPanel(true);

        // ── Resize + Render ─────────────────────────────────
        let resizeTimer = null;
        addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
            // Debounce post-FX resize — only recompile after dragging stops
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => ssgiFx.resize(), 200);
            if (splatOverlay) {
                splatOverlay.renderer.setPixelRatio(devicePixelRatio);
                splatOverlay.renderer.setSize(innerWidth, innerHeight, false);
                splatOverlay.camera.aspect = camera.aspect;
                splatOverlay.camera.updateProjectionMatrix();
            }
        });

        // ── WebXR / VR (minimal, matching Three.js examples) ─
        let vrActive = false;

        try {
            const isNativeWebGPU = rendererBackendLabel === 'WebGPU';

            if (isNativeWebGPU) {
                const vrNote = document.createElement('button');
                vrNote.textContent = 'Switch to VR';
                vrNote.style.cssText = 'position:absolute;bottom:8px;right:8px;z-index:100;background:rgba(40,40,60,0.7);color:#888;border:1px solid #333;padding:3px 8px;border-radius:3px;font:10px "Segoe UI",sans-serif;cursor:pointer';
                vrNote.onclick = () => {
                    if (confirm('VR requires WebGL backend. Restart without WebGPU post-effects?')) {
                        sessionStorage.setItem('maxjs_force_webgl', '1');
                        location.reload();
                    }
                };
                document.body.appendChild(vrNote);
            } else {
                renderer.xr.enabled = true;
                document.body.appendChild(XRButton.createButton(renderer));

                // Camera group: converts VR tracking (Y-up meters) → scene space (Z-up cm)
                const vrCamGroup = new THREE.Group();
                vrCamGroup.name = '__vr_cam';
                // Don't transform the cam group — transform the scene instead
                scene.add(vrCamGroup);
                vrCamGroup.visible = false; // hidden until VR starts

                // Controllers inside the camera group (move with user)
                const geo = new THREE.BufferGeometry();
                geo.setAttribute('position', new THREE.Float32BufferAttribute([0,0,0, 0,0,-0.5], 3));
                const lineMat = new THREE.LineBasicMaterial({ color: 0x4488ff });

                for (let i = 0; i < 2; i++) {
                    const ctrl = renderer.xr.getController(i);
                    ctrl.add(new THREE.Line(geo.clone(), lineMat.clone()));
                    ctrl.addEventListener('selectend', () => {
                        const dir = new THREE.Vector3(0, 0, -1);
                        dir.applyQuaternion(ctrl.quaternion);
                        dir.multiplyScalar(300);
                        vrCamGroup.position.add(dir);
                    });
                    scene.add(ctrl);  // scene, not cam group
                }

                renderer.xr.addEventListener('sessionstart', () => {
                    vrActive = true;
                    controls.enabled = false;
                    vrCamGroup.add(camera);
                    vrCamGroup.visible = true;

                    // DON'T transform scene — causes render errors.
                    // Instead, scale+rotate the cam group to map
                    // VR meters/Y-up INTO scene cm/Z-up.
                    //
                    // VR headset 1.7m up → need to be at Z=170 in scene.
                    // VR 1 meter step → 100cm in scene.
                    // VR Y-up → scene Z-up: rotate cam group so VR-Y maps to scene-Z
                    vrCamGroup.rotation.x = Math.PI / 2;
                    vrCamGroup.scale.setScalar(100);

                    // Start at scene center
                    const box = new THREE.Box3();
                    for (const [, mesh] of nodeMap) {
                        if (mesh.visible) box.expandByObject(mesh);
                    }
                    if (!box.isEmpty()) {
                        const center = box.getCenter(new THREE.Vector3());
                        vrCamGroup.position.copy(center);
                        vrCamGroup.position.z = 0; // floor level
                    }
                });
                renderer.xr.addEventListener('sessionend', () => {
                    vrActive = false;
                    controls.enabled = !camLock;
                    scene.add(camera);
                    vrCamGroup.visible = false;
                    vrCamGroup.rotation.set(0, 0, 0);
                    vrCamGroup.scale.setScalar(1);
                    vrCamGroup.position.set(0, 0, 0);
                    camera.up.set(0, 0, 1);
                    camera.position.set(200, -200, 150);
                });
            }
        } catch (e) {
            console.warn('[MaxJS] WebXR not available:', e);
        }

        function processVRInput() {}

        function renderFrame() {
            processVRInput();
            controls.update();
            // Default key light follows camera
            if (defaultLights.visible) {
                defaultKey.position.copy(camera.position);
            }
            const renderStart = performance.now();
            ssgiFx.render();
            if (splatOverlay && splatHandleMap.size > 0) {
                updateSplatCamera();
                splatOverlay.viewer.update();
                splatOverlay.viewer.render();
            }
            syncPostFxPanel();
            perfHud.updateRender(performance.now() - renderStart, renderer.info?.render);
        }

        renderer.setAnimationLoop(renderFrame);

        startBridgeHandshake();
    </script>
</body>
</html>
