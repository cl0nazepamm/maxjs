                    if (Number.isFinite(saved.hdri.rotation)) localHdriRotation = saved.hdri.rotation;
                    if (Number.isFinite(saved.hdri.intensity)) localHdriIntensity = saved.hdri.intensity;
                    if (Number.isFinite(saved.hdri.blur)) localHdriBlur = saved.hdri.blur;
                    if (typeof saved.hdri.showBg === 'boolean') localHdriShowBg = saved.hdri.showBg;
                    if (typeof saved.hdri.flip === 'boolean') localHdriFlip = saved.hdri.flip;
                    if (typeof saved.hdri.enabled === 'boolean') localHdriEnabled = saved.hdri.enabled;
                    // Apply blur to scene even without HDRI loaded (will be used when HDRI loads)
                    scene.backgroundBlurriness = localHdriBlur;
                }
                if (saved.cameraClip) {
                    cameraClip.near = Number.isFinite(saved.cameraClip.near) && saved.cameraClip.near > 0 ? saved.cameraClip.near : null;
                    cameraClip.far = Number.isFinite(saved.cameraClip.far) && saved.cameraClip.far > 0 ? saved.cameraClip.far : null;
                    applyCameraClipOverrides(camera);
                }
                if (saved.performance) {
                    if (Number.isFinite(saved.performance.fpsCap)) {
                        performanceSettings.fpsCap = Math.max(0, Math.round(saved.performance.fpsCap));
                    }
                    if (Number.isFinite(saved.performance.renderScale)) {
                        performanceSettings.renderScale = Math.max(0.25, Math.min(1.0, saved.performance.renderScale));
                    }
                    if (typeof saved.performance.optimizeMaxInstances === 'boolean') {
                        performanceSettings.optimizeMaxInstances = saved.performance.optimizeMaxInstances;
                    }
                    if (Number.isFinite(saved.performance.maxInstanceBucketThreshold)) {
                        performanceSettings.maxInstanceBucketThreshold = Math.max(2, Math.round(saved.performance.maxInstanceBucketThreshold));
                    }
                    if (typeof saved.performance.splatsEnabled === 'boolean') {
                        performanceSettings.splatsEnabled = saved.performance.splatsEnabled;
                        if (!performanceSettings.splatsEnabled) {
                            splatMutationQueue = Promise.resolve();
                            void shutdownSplatViewer();
                        }
                    }
                    applyRendererPerformanceSettings({ resizePostFx: true });
                }
                localHdriShowBg = envVisible;

                syncEnvButtonUi();
                ssgiFx.setEnvironmentVisible(envVisible);

                const fx = saved.fx;
                if (!fx) return;

                if (postFxInteractiveAvailable) {
                    for (const section of postFxSections) {
                        const saved = fx[section.key];
                        if (!saved) continue;
                        if (section.requiresWebGPU && !supportsScreenSpaceEffects) continue;
                        const wasEnabled = saved.enabled;
                        delete saved.enabled;
                        // Apply values first (without triggering rebuild per-param)
                        section.setValues(saved);
                        // Then enable/disable
                        if (wasEnabled) section.setEnabled(true);
                    }
                }

                if (!postFxInteractiveAvailable || !supportsScreenSpaceEffects) {
                    ssgiFx.sanitizeForCurrentBackend?.();
                }

                // Clone blob tracker restore
                if (fx.clone) {
                    const cl = fx.clone;
                    const wasEnabled = cl.enabled;
                    delete cl.enabled;
                    ssgiFx.setCloneOptions(cl);
                    if (wasEnabled) ssgiFx.setCloneEnabled(true);
                }

                // ASCII restore
                if (saved.ascii) {
                    if (Number.isFinite(saved.ascii.resolution)) asciiSettings.resolution = saved.ascii.resolution;
                    if (saved.ascii.color) asciiSettings.color = saved.ascii.color;
                    if (typeof saved.ascii.invert === 'boolean') asciiSettings.invert = saved.ascii.invert;
                    if (saved.ascii.enabled) enterAsciiMode();
                }

                // Shader Lab restore (config + autoApply + enabled) —
                // next-to-.max persistence flows through the same Post FX
                // state pipe. If the scene had Shader Lab active, reactivate
                // it so the refresh keeps the effect on screen.
                if (saved.shaderLab) {
                    setShaderLabSnapshot(saved.shaderLab);
                    if (saved.shaderLab.enabled && !shaderLabFx.isEnabled()) {
                        shaderLabFx.enable(saved.shaderLab.config).catch(err => {
                            console.error('[ShaderLab] restore enable failed:', err);
                        });
                    }
                }
            } catch (e) {
                maxjsDebugWarn('MaxJS: failed to apply post-FX state', e);
            }
        }

        function restorePostFxState() {
            withPostFxPersistenceSuppressed(() => {
                try {
                    const projectPayload = _projectRuntimeRef?.getPostFxState?.();
                    if (projectPayload) {
                        lastProjectPostFxSignature = JSON.stringify(projectPayload);
                        applySavedPostFxPayload(projectPayload);
                        return;
                    }
                    if (_projectRuntimeRef) return;
                    const raw = localStorage.getItem(POSTFX_STORAGE_KEY);
                    if (!raw) return;
                    applySavedPostFxPayload(JSON.parse(raw));
                } catch (e) {
                    maxjsDebugWarn('MaxJS: failed to restore post-FX state', e);
                }
            });
        }

        function syncProjectPostFxState() {
            const payload = _projectRuntimeRef?.getPostFxState?.();
            if (!payload) return;
            const signature = JSON.stringify(payload);
            if (!signature || signature === lastProjectPostFxSignature) return;
            lastProjectPostFxSignature = signature;
            withPostFxPersistenceSuppressed(() => {
                applySavedPostFxPayload(payload);
                syncPostFxPanel(true, { persist: false });
            });
        }

        buildPostFxPanel();
        // NOTE: Do NOT call syncPostFxPanel here — it would save defaults and overwrite stored settings.
        // restoreInteractiveBrowserState() handles restore then sync.

        // ── Resize + Render ─────────────────────────────────
        // WebGPU pipelines bound to the canvas swap chain get duplicated every
        // time canvas.width / canvas.height change (forces context reconfigure
        // and orphans the old swap-chain textures the pipelines reference).
        // `renderer.setSize` touches canvas.width — so dragging a panel resize
        // handle at 60fps used to fire 60 full pipeline rebuilds across every
        // post-FX pass. The Inspector's "(not in use)" cascade on every pass
        // was that churn being observed in-flight.
        //
        // Strategy: update camera + CSS immediately so the canvas visually
        // tracks the drag (browser scales stale pixels smoothly), but defer
        // the drawing-buffer resize + post-FX rebuild until dragging settles.
        // One pipeline churn event per resize gesture instead of dozens.
        let resizeTimer = null;
        addEventListener('resize', () => {
            if (camera.isPerspectiveCamera) {
                camera.aspect = innerWidth / innerHeight;
            } else {
                const viewWidth = Math.max(0.001, camera.right - camera.left);
                const aspect = innerWidth / innerHeight;
                camera.top = viewWidth / (2 * aspect);
                camera.bottom = -viewWidth / (2 * aspect);
            }
            camera.updateProjectionMatrix();
            // CSS-only update keeps the canvas visually filling the viewport
            // during drag. No drawing-buffer resize → no swap chain churn.
            if (renderer?.domElement) {
                renderer.domElement.style.width = innerWidth + 'px';
                renderer.domElement.style.height = innerHeight + 'px';
            }
            if (splatOverlay?.renderer?.domElement) {
                splatOverlay.renderer.domElement.style.width = innerWidth + 'px';
                splatOverlay.renderer.domElement.style.height = innerHeight + 'px';
            }
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                applyRendererPerformanceSettings({ resizePostFx: false });
                ssgiFx.resize();
            }, 150);
        });

        // ── WebXR / VR ───────────────────────────────────────
        // Fragile integration: this path is intentionally isolated from snapshots/export
        // and has only been tested on Quest 3 via Virtual Desktop (VDXR).
        function createWebXRRuntime() {
            const runtime = {
                active: false,
                supportsXR: false,
                shouldBypassPostFx: false,
                update() {},
            };

            const isNativeWebGPU = rendererBackendLabel === 'WebGPU';
            if (isNativeWebGPU) {
                return runtime;
            }

            try {
                renderer.xr.enabled = true;
                renderer.xr.setReferenceSpaceType?.('local-floor');
                runtime.supportsXR = true;

                const xrButton = XRButton.createButton(renderer, {
                    optionalFeatures: ['local-floor', 'bounded-floor', 'hand-tracking'],
                });
                xrButton.style.zIndex = '100';
                document.body.appendChild(xrButton);

                const xrOrigin = new THREE.Group();
                xrOrigin.name = '__maxjs_xr_origin__';
                xrOrigin.visible = false;
                scene.add(xrOrigin);

                const controllerModelFactory = new XRControllerModelFactory();
                const pointerGeometry = new THREE.BufferGeometry();
                pointerGeometry.setAttribute('position', new THREE.Float32BufferAttribute([0, 0, 0, 0, 0, -1], 3));
                const controllerStates = [];
                const savedCameraState = {
                    position: new THREE.Vector3(),
                    quaternion: new THREE.Quaternion(),
                    up: new THREE.Vector3(),
                    target: new THREE.Vector3(),
                    hasValue: false,
                };
                const moveForward = new THREE.Vector3();
                const moveRight = new THREE.Vector3();
                const moveDelta = new THREE.Vector3();
                const worldUp = new THREE.Vector3(0, 1, 0);
                const focusBounds = new THREE.Box3();
                const focusCenter = new THREE.Vector3();

                const inputDeadzone = 0.16;
                const moveSpeed = 180;
                const verticalSpeed = 120;
                const snapTurnAngle = THREE.MathUtils.degToRad(30);
                const snapTurnThreshold = 0.72;
                const snapTurnReset = 0.28;

                function applyDeadzone(value, deadzone = inputDeadzone) {
                    if (!Number.isFinite(value) || Math.abs(value) <= deadzone) return 0;
                    return ((Math.abs(value) - deadzone) / (1 - deadzone)) * Math.sign(value);
                }

                function readPrimaryStick(inputSource) {
                    const axes = inputSource?.gamepad?.axes;
                    if (!axes?.length) return { x: 0, y: 0 };

                    let bestX = 0;
                    let bestY = 0;
                    let bestStrength = 0;
                    const pairCount = Math.floor(axes.length / 2);
                    for (let i = 0; i < pairCount; i++) {
                        const x = applyDeadzone(axes[i * 2] ?? 0);
                        const y = applyDeadzone(axes[i * 2 + 1] ?? 0);
                        const strength = x * x + y * y;
                        if (strength > bestStrength) {
                            bestStrength = strength;
                            bestX = x;
                            bestY = y;
                        }
                    }
                    return { x: bestX, y: bestY };
                }

                function isButtonPressed(inputSource, index) {
                    return !!inputSource?.gamepad?.buttons?.[index]?.pressed;
                }

                function setControllerInputSource(state, inputSource) {
                    if (state.inputSource === inputSource) return;
                    state.inputSource = inputSource ?? null;
                    const visible = !!state.inputSource;
                    state.controller.visible = visible;
                    state.grip.visible = visible;
                    if (!visible) state.turnReady = true;
                }

                function syncControllerInputSources() {
                    const session = renderer.xr?.getSession?.();
                    const inputSources = Array.from(session?.inputSources ?? [])
                        .filter(source => !!source && (!!source.gamepad || source.targetRayMode === 'tracked-pointer'))
                        .sort((a, b) => {
                            const rank = (source) => {
                                switch (source?.handedness) {
                                    case 'left': return 0;
                                    case 'right': return 1;
                                    default: return 2;
                                }
                            };
                            return rank(a) - rank(b);
                        });

                    for (let i = 0; i < controllerStates.length; i++) {
                        setControllerInputSource(controllerStates[i], inputSources[i] ?? null);
                    }
                }

                function getControllerState(handedness, fallbackIndex = -1) {
                    for (const state of controllerStates) {
                        if (state.inputSource?.handedness === handedness) return state;
                    }
                    if (fallbackIndex >= 0 && controllerStates[fallbackIndex]?.inputSource) {
                        return controllerStates[fallbackIndex];
                    }
                    return controllerStates.find(state => !!state.inputSource) ?? null;
                }

                function recenterOrigin() {
                    const box = computeVisibleSceneBounds(focusBounds);
                    if (box.isEmpty()) {
                        xrOrigin.position.set(0, 0, 0);
                        xrOrigin.rotation.set(0, 0, 0);
                        return;
                    }

                    box.getCenter(focusCenter);
                    xrOrigin.position.copy(focusCenter);
                    xrOrigin.position.y = 0;
                    xrOrigin.rotation.set(0, 0, 0);
                }

                function captureCameraState() {
                    savedCameraState.position.copy(camera.position);
                    savedCameraState.quaternion.copy(camera.quaternion);
                    savedCameraState.up.copy(camera.up);
                    savedCameraState.target.copy(controls.target);
                    savedCameraState.hasValue = true;
                }

                function restoreCameraState() {
                    if (!savedCameraState.hasValue) {
                        camera.up.set(0, 1, 0);
                        camera.position.copy(cameraDefaultPosition);
                        camera.lookAt(controls.target);
                        return;
                    }
                    camera.position.copy(savedCameraState.position);
                    camera.quaternion.copy(savedCameraState.quaternion);
                    camera.up.copy(savedCameraState.up);
                    controls.target.copy(savedCameraState.target);
                }

                function handleSessionStart() {
                    runtime.active = true;
                    runtime.shouldBypassPostFx = true;
                    captureCameraState();
                    controls.enabled = false;
                    xrOrigin.visible = true;
                    // Scale up for cm units (Max) vs meters (VR headset)
                    xrOrigin.scale.setScalar(100);
                    xrOrigin.add(camera);
                    syncControllerInputSources();
                    recenterOrigin();
                    perfHud.setStatus('MaxJS - XR active');
                }

                function handleSessionEnd() {
                    runtime.active = false;
                    runtime.shouldBypassPostFx = false;
                    scene.add(camera);
                    xrOrigin.visible = false;
                    xrOrigin.position.set(0, 0, 0);
                    xrOrigin.rotation.set(0, 0, 0);
                    xrOrigin.scale.setScalar(1);
                    restoreCameraState();
                    camera.updateProjectionMatrix();
                    controls.enabled = !camLock;
                    controls.update();
                    perfHud.setStatus(`MaxJS - ${rendererBackendLabel} renderer ready`);
                }

                function updateLocomotion(dt) {
                    if (!runtime.active) return;

                    syncControllerInputSources();

                    const leftState = getControllerState('left', 0);
                    const rightState = getControllerState('right', 1);
                    const moveState = leftState ?? rightState;
                    const turnState = rightState && rightState !== moveState ? rightState : null;

                    if (moveState?.inputSource) {
                        const { x, y } = readPrimaryStick(moveState.inputSource);
                        moveForward.set(0, 0, -1).applyQuaternion(xrOrigin.quaternion);
                        moveForward.y = 0;
                        if (moveForward.lengthSq() < 1e-6) moveForward.set(0, 0, -1);
                        moveForward.normalize();
                        moveRight.crossVectors(moveForward, worldUp).normalize();

                        moveDelta.set(0, 0, 0);
                        if (x) moveDelta.addScaledVector(moveRight, x * moveSpeed * dt);
                        if (y) moveDelta.addScaledVector(moveForward, -y * moveSpeed * dt);
                        if (moveDelta.lengthSq() > 0) xrOrigin.position.add(moveDelta);

                        if (isButtonPressed(moveState.inputSource, 1)) {
                            xrOrigin.position.y += verticalSpeed * dt;
                        }
                    }

                    if (rightState?.inputSource && isButtonPressed(rightState.inputSource, 1)) {
                        xrOrigin.position.y -= verticalSpeed * dt;
                    }

                    if (turnState?.inputSource) {
                        const { x } = readPrimaryStick(turnState.inputSource);
                        if (turnState.turnReady && Math.abs(x) >= snapTurnThreshold) {
                            xrOrigin.rotateY(-Math.sign(x) * snapTurnAngle);
                            turnState.turnReady = false;
                        } else if (!turnState.turnReady && Math.abs(x) <= snapTurnReset) {
                            turnState.turnReady = true;
                        }
                    }
                }

                for (let i = 0; i < 2; i++) {
                    const controller = renderer.xr.getController(i);
                    const grip = renderer.xr.getControllerGrip(i);
                    const ray = new THREE.Line(pointerGeometry, new THREE.LineBasicMaterial({
                        color: i === 0 ? 0x66d9ef : 0xffc857,
                        transparent: true,
                        opacity: 0.85,
                    }));
                    ray.name = `__maxjs_xr_ray_${i}`;
                    ray.scale.z = 0.75;
                    controller.visible = false;
                    grip.visible = false;
                    controller.add(ray);
                    grip.add(controllerModelFactory.createControllerModel(grip));
                    xrOrigin.add(controller);
                    xrOrigin.add(grip);

                    const state = {
                        index: i,
                        controller,
                        grip,
                        ray,
                        inputSource: null,
                        turnReady: true,
                    };

                    controller.addEventListener('connected', event => {
                        state.inputSource = event.data ?? null;
                        controller.visible = true;
                        grip.visible = true;
                    });
                    controller.addEventListener('disconnected', () => {
                        state.inputSource = null;
                        state.turnReady = true;
                        controller.visible = false;
                        grip.visible = false;
                    });

                    controllerStates.push(state);
                }

                renderer.xr.addEventListener('sessionstart', handleSessionStart);
                renderer.xr.addEventListener('sessionend', handleSessionEnd);
                runtime.update = updateLocomotion;
            } catch (error) {
                console.warn('[MaxJS] WebXR init failed:', error);
            }

            return runtime;
        }

        const xrRuntime = !window.chrome?.webview
            ? { active: false, shouldBypassPostFx: false, update() {} }
            : createWebXRRuntime();

        let standaloneHudFrame = 0;
        let lastPostFxPanelSyncMs = 0;
        function renderFrame(frameTimeMs = performance.now()) {
            flushMaterialDisposals();
            if (renderToImageActive && !pendingRenderToImage) return;
            const manualFpsCap = Number.isFinite(performanceSettings.fpsCap) ? performanceSettings.fpsCap : 0;
            if (!renderer.xr?.isPresenting && manualFpsCap > 0) {
                const minFrameMs = 1000 / manualFpsCap;
                if (lastRenderTimestamp !== 0 && (frameTimeMs - lastRenderTimestamp) < minFrameMs) return;
            }
            lastRenderTimestamp = frameTimeMs;
            const frameDt = inlineClock.getDelta();
            const frameElapsed = inlineClock.getElapsedTime();
            xrRuntime.update(frameDt);
            if (!xrRuntime.active) syncOrbitNavigationFeel();
            if (!xrRuntime.active && !(animationSystem?.isDrivingSceneCamera?.())) controls.update();
            // Auto-update DOF focus distance from camera-to-target when enabled
            // Skip when Physical Camera DOF is driving the values (Camera Lock ON + Physical Camera has DOF)
            if (!xrRuntime.active && (!physicalCameraDofActive || !camLock)) {
                ssgiFx.updateDofFocusFromCamera(camera.position.distanceTo(controls.target));
            }
            // Default key light follows camera
            if (defaultLights.visible) {
                defaultKey.position.copy(getActiveCameraWorldPosition(cameraPositionWorld));
            }
            updateVolumeUniforms();
            lightLinking.updateCameraConstraints();
            if (lightHelpersVisible) updateLightHelpers();
            layerManager.update(frameDt, frameElapsed);
            animationSystem?.update(frameDt);
            audioSystem?.update();
            gltfSystem?.update?.(frameDt);

            const perfHudActive = perfHud.isDebugEnabled?.() ?? false;
            if (perfHudActive) perfHud.updateLayers(layerManager.getStats());
            const renderStart = performance.now();
            try {
                if (asciiActive && asciiEffect) {
                    asciiEffect.render(scene, camera);
                } else if (xrRuntime.shouldBypassPostFx) {
                    // Reduce brightness for VR (no post-fx tone mapping)
                    const savedExposure = renderer.toneMappingExposure;
                    const vrLightScale = 0.1;
                    renderer.toneMappingExposure = savedExposure * 0.15;
                    // Scale down lights temporarily
                    scene.traverse(obj => {
                        if (obj.isLight && obj.intensity !== undefined) {
                            obj.userData._vrSavedIntensity = obj.intensity;
                            obj.intensity *= vrLightScale;
                        }
                    });
                    renderer.render(scene, camera);
                    // Restore
                    renderer.toneMappingExposure = savedExposure;
                    scene.traverse(obj => {
                        if (obj.isLight && obj.userData._vrSavedIntensity !== undefined) {
                            obj.intensity = obj.userData._vrSavedIntensity;
                            delete obj.userData._vrSavedIntensity;
                        }
                    });
                } else if (shaderLabFx.isEnabled()) {
                    // Shader Lab mode bypasses ssgiFx entirely and runs its
                    // own scene→target→shader-lab→fullscreen-quad pipeline.
                    const nowS = performance.now() * 0.001;
                    shaderLabFx.renderFrame(nowS, nowS - (shaderLabFx._lastT || nowS));
                    shaderLabFx._lastT = nowS;
                } else {
                    ssgiFx.render();
                }
            } catch (error) {
                reportBridgeError('runtime error', error);
            }
            // Clone blob overlay — draw bounding rects on 2D canvas
            if (ssgiFx.isCloneEnabled() && !renderToImageActive) {
                ssgiFx.drawBlobOverlay(blobOverlayCtx, blobOverlayCvs.width, blobOverlayCvs.height);
            } else if (blobOverlayCtx) {
                blobOverlayCtx.clearRect(0, 0, blobOverlayCvs.width, blobOverlayCvs.height);
            }
            if (splatOverlay && splatHandleMap.size > 0) {
                updateSplatCamera();
                splatOverlay.renderer.render(splatOverlay.scene, splatOverlay.camera);
            }
            if (renderToImageActive && pendingRenderToImage) {
                const syncReady = latestAppliedSyncFrame > pendingRenderToImage.observedSyncFrame;
                const settledEnough = performance.now() >= (pendingRenderToImage.startedAtMs + 100);
                const timedOut = performance.now() >= pendingRenderToImage.syncDeadlineMs;
                if (syncReady || settledEnough || timedOut) {
                    const renderTimeSeconds = pendingRenderToImage.renderTimeSeconds;
                    pendingRenderToImage = null;
                    requestAnimationFrame(() => {
                        renderCurrentFrameOnce(renderTimeSeconds);
                        requestAnimationFrame(() => bridge.send('render_to_image_ready'));
                    });
                }
            }
            if (postPanelVisible || (debugMode && buildMode !== 'release')) {
                if ((frameTimeMs - lastPostFxPanelSyncMs) >= 250) {
                    lastPostFxPanelSyncMs = frameTimeMs;
                    syncPostFxPanel(false, { persist: false });
                }
            }
            if (perfHudActive) {
                perfHud.updateRender(performance.now() - renderStart, renderer.info?.render, renderer.info?.memory);
            }
            // Standalone / snapshot viewers have no bridge sync — drive the perf HUD from the render loop.
            if (!(window.chrome?.webview?.postMessage) && debugMode && buildMode !== 'release') {
                standaloneHudFrame++;
                updateSyncHud({
                    transport: 'snapshot',
                    frameId: standaloneHudFrame,
                    producerBytes: 0,
                    decodeMs: 0,
                    applyMs: 0,
                });
            }
        }

        // ── JS_Inline Layer Manager ──────────────────────────
        const inlineClock = new THREE.Clock();
        const layerManager = createLayerManager({
            scene,
            camera,
            renderer,
            THREE,
            nodeMap,
            lightHandleMap,
            maxRoot,
            jsRoot,
            overlayRoot,
            space: sceneSpace,
            controls,
            getCamera: () => camera,
            onCameraModeChange: applyLayerCameraMode,
            getGLTFSystem: () => gltfSystem,
            debugLog: maxjsDebugLog,
            debugWarn: maxjsDebugWarn,
        });
        animationSystem = createMaxJSAnimationSystem({
            THREE,
            nodeMap,
            lightHandleMap,
            getCamera: () => camera,
            getControls: () => controls,
            getJsRoot: () => jsRoot,
            getOverlayRoot: () => overlayRoot,
            getViewportAspect: () => innerWidth / innerHeight,
            buildGeometry,
            applyMaterialScalar,
        });
        audioSystem = createMaxJSAudioSystem({
            THREE,
            parent: maxBasisRoot,
            getActiveCamera: () => renderer.xr?.isPresenting ? renderer.xr.getCamera(camera) : camera,
        });
        gltfSystem = createMaxJSGLTFSystem({
            THREE,
            parent: maxBasisRoot,
            getBus: () => layerManager?.getBus?.(),
            debugWarn: maxjsDebugWarn,
        });
        layerManager.subscribe?.(() => {
            animationSystem.invalidateTargets();
            // Layer mutations can add/remove meshes — cheap scene refresh.
            ssgiFx.markSceneChanged?.();
        });
        const projectRuntime = window.chrome?.webview
            ? createProjectRuntime({ layerManager, bridge, perfHud, debugLog: maxjsDebugLog, debugWarn: maxjsDebugWarn })
            : null;
        if (projectRuntime) {
            layerManager.bindProjectRuntime(projectRuntime);
        }
        window.maxJSProjectRuntime = projectRuntime;
        window.maxJS.layers = layerManager;
        window.maxJS.animation = animationSystem;
        window.maxJS.time = maxTimeline;
        window.maxJS.audio = audioSystem;
        window.maxJS.gltf = gltfSystem;
        _layerManagerRef = layerManager;
        _projectRuntimeRef = projectRuntime;
        attachLayerPanelSubscriptions();
        queueLayersPanelRefresh();

        function getSyncedObjectForSnapshotHandle(h) {
            if (nodeMap.has(h)) return nodeMap.get(h);
            const n = typeof h === 'string' ? Number(h) : h;
            if (Number.isFinite(n) && nodeMap.has(n)) return nodeMap.get(n);
            if (typeof h === 'number' && nodeMap.has(String(h))) return nodeMap.get(String(h));
            return undefined;
        }

        async function loadStandaloneSnapshot() {
            if (window.chrome?.webview) return false;
            try {
                const metaResponse = await fetch('./snapshot.json', { cache: 'no-store' });
                if (!metaResponse.ok) return false;
                const meta = await metaResponse.json();
                const binResponse = await fetch(meta.bin || './scene.bin', { cache: 'no-store' });
                if (!binResponse.ok) {
                    throw new Error(`HTTP ${binResponse.status} for ${meta.bin || './scene.bin'}`);
                }
                const buffer = await binResponse.arrayBuffer();
                let animationBuffer = null;
                if (meta.animations?.bin) {
                    const animationResponse = await fetch(meta.animations.bin, { cache: 'no-store' });
                    if (!animationResponse.ok) {
                        throw new Error(`HTTP ${animationResponse.status} for ${meta.animations.bin}`);
                    }
                    animationBuffer = await animationResponse.arrayBuffer();
                }
                // Pre-apply camLock from snapshotUi BEFORE handleBinaryScene to prevent fitCamera() override
                if (meta.snapshotUi?.camLock != null) {
                    camLock = !!meta.snapshotUi.camLock;
                    maxjsDebugLog('[MaxJS] Pre-set camLock from snapshotUi:', camLock);
                }
                if (meta.snapshotUi?.performance && typeof meta.snapshotUi.performance.splatsEnabled === 'boolean') {
                    performanceSettings.splatsEnabled = meta.snapshotUi.performance.splatsEnabled;
                    if (!performanceSettings.splatsEnabled) {
                        splatMutationQueue = Promise.resolve();
                        await shutdownSplatViewer();
                    }
                }
                handleBinaryScene(buffer, meta);
                if (meta.runtimeScene) {
                    function resolveSnapshotLayerFactory(moduleNamespace) {
                        const directHooks = ['init', 'update', 'dispose'].some(key => typeof moduleNamespace?.[key] === 'function');
                        if (directHooks) return async () => moduleNamespace;

                        const candidate = moduleNamespace?.default
                            ?? moduleNamespace?.createLayer
                            ?? moduleNamespace?.mount;

                        if (typeof candidate === 'function') return candidate;
                        if (candidate && typeof candidate === 'object') return async () => candidate;

                        throw new Error('Snapshot layer module must export default/createLayer/mount or layer hooks');
                    }

                    function buildSnapshotManifestLayers(manifest) {
                        const rawLayers = Array.isArray(manifest?.layers) ? manifest.layers : [];
                        return rawLayers.map((entry, index) => ({
                            id: entry?.id || entry?.name || `layer_${index}`,
                            name: entry?.name || entry?.id || `layer_${index}`,
                            entryPath: entry?.entry || entry?.path || 'main.js',
                            enabled: entry?.enabled !== false,
                        }));
                    }

                    async function tryReplaySnapshotProjectLayers() {
                        let manifest;
                        let manifestUrl;
                        try {
                            manifestUrl = new URL('./project.maxjs.json', window.location.href);
                            const response = await fetch(manifestUrl, { cache: 'no-store' });
                            if (!response.ok) return false;
                            manifest = await response.json();
                        } catch {
                            return false;
                        }

                        const manifestBaseUrl = new URL('./', manifestUrl);
                        // Snapshot always imports every layer in the manifest,
                        // regardless of the enabled flag. Disable is a live-mode
                        // concept only; snapshot releases ship the full set.
                        const allLayers = buildSnapshotManifestLayers(manifest);
                        if (allLayers.length === 0) return false;

                        const mountedIds = [];
                        try {
                            for (const entry of allLayers) {
                                const entryPath = String(entry.entryPath || entry.entry || entry.path || '').replace(/\\/g, '/');
                                if (!entryPath) throw new Error(`Missing layer entry path for ${entry.id}`);
                                const moduleUrl = new URL(entryPath, manifestBaseUrl);
                                moduleUrl.searchParams.set('v', `${Date.now()}_${entry.id}`);
                                const moduleNamespace = await import(moduleUrl.toString());
                                const factory = resolveSnapshotLayerFactory(moduleNamespace);
                                const result = await layerManager.mount(
                                    entry.id,
                                    async (ctx, THREE) => factory(ctx, THREE, { manifest, layer: entry }),
                                    {
                                        name: entry.name || entry.id,
                                        code: moduleUrl.toString(),
                                        source: 'project',
                                        entry: entry.entryPath,
                                    },
                                );
                                if (result?.error) throw new Error(result.error);
                                mountedIds.push(entry.id);
                            }
                            return true;
                        } catch (error) {
                            maxjsDebugWarn('[MaxJS snapshot] project layer replay failed; falling back to baked runtimeScene', error);
                            for (const id of mountedIds) {
                                try { layerManager.remove(id); } catch {}
                            }
                            return false;
                        }
                    }

                    const replayedProjectLayers = await tryReplaySnapshotProjectLayers();
                    // Snapshot runtime trees are plain Object3D JSON, not node-material graphs.
                    // Prefer the standard ObjectLoader here; NodeObjectLoader can reject this payload.
                    const LoaderCtor = THREE_STD.ObjectLoader || THREE.ObjectLoader || THREE.NodeObjectLoader;
                    const objectLoader = LoaderCtor ? new LoaderCtor() : null;
                    if (!objectLoader) {
                        throw new Error('Three.js ObjectLoader unavailable for snapshot runtime scene');
                    }
                    // WebGPU node materials serialize with "NodeMaterial" suffix that
                    // the standard ObjectLoader doesn't know. Rewrite to standard types.
                    const nodeMaterialTypeMap = {
                        MeshPhysicalNodeMaterial: 'MeshStandardMaterial',
                        MeshStandardNodeMaterial: 'MeshStandardMaterial',
                        MeshBasicNodeMaterial: 'MeshBasicMaterial',
                        MeshLambertNodeMaterial: 'MeshLambertMaterial',
                        MeshPhongNodeMaterial: 'MeshPhongMaterial',
                        MeshPhysicalMaterial: 'MeshStandardMaterial',
                        LineBasicNodeMaterial: 'LineBasicMaterial',
                        PointsNodeMaterial: 'PointsMaterial',
                        SpriteNodeMaterial: 'SpriteMaterial',
                    };
                    function patchMaterialTypes(json) {
                        if (!json?.materials) return;
                        for (const mat of json.materials) {
                            if (mat.type && nodeMaterialTypeMap[mat.type]) {
                                mat.type = nodeMaterialTypeMap[mat.type];
                            }
                            // Final fallback: if type still isn't a known standard type,
                            // force MeshStandardMaterial so ObjectLoader doesn't throw.
                            if (mat.type && mat.type.includes('Node')) {
                                mat.type = 'MeshStandardMaterial';
                            }
                        }
                    }
                    async function parseRuntimeSubtree(json) {
                        if (!json || typeof json !== 'object') return null;
                        patchMaterialTypes(json);
                        if (typeof objectLoader.parseAsync === 'function') {
                            return objectLoader.parseAsync(json);
                        }
                        return objectLoader.parse(json);
                    }
                    if (!replayedProjectLayers && meta.runtimeScene.jsRoot) {
                        try {
                            const jsSnapshotRoot = await parseRuntimeSubtree(meta.runtimeScene.jsRoot);
                            if (jsSnapshotRoot?.isObject3D) {
                                jsSnapshotRoot.visible = true;
                                jsRoot.add(jsSnapshotRoot);
                                jsSnapshotRoot.updateMatrixWorld(true);
                                // Re-apply TSL materials from Max meshes onto runtime scene meshes.
                                // ObjectLoader can't round-trip NodeMaterial shader graphs, so the
                                // deformed clones lose their TSL effect. Match by userData.maxjsOwnerHandle
                                // or name and swap the material from the hidden Max mesh.
                                const handleToTSLMat = new Map();
                                for (const nd of (meta.nodes || [])) {
                                    if (nd.mat?.model === 'MeshTSLNodeMaterial' && nd.mat?.tslCode) {
                                        const maxMesh = getSyncedObjectForSnapshotHandle(nd.h);
                                        if (maxMesh?.material) handleToTSLMat.set(nd.h, maxMesh.material);
                                    }
                                }
                                if (handleToTSLMat.size > 0) {
                                    jsSnapshotRoot.traverse(child => {
                                        if (!child.isMesh) return;
                                        const srcH = child.userData?.maxjsSourceHandle
                                                  ?? child.userData?.maxjsHandle;
                                        const tslMat = srcH != null ? handleToTSLMat.get(srcH) : null;
                                        if (tslMat) child.material = tslMat;
                                    });
                                }
                            }
                        } catch (err) {
                            maxjsDebugWarn('[MaxJS snapshot] runtimeScene.jsRoot parse failed (non-fatal)', err);
                        }
                    }
                    if (!replayedProjectLayers && meta.runtimeScene.overlayRoot) {
                        try {
                            const overlaySnapshotRoot = await parseRuntimeSubtree(meta.runtimeScene.overlayRoot);
                            if (overlaySnapshotRoot?.isObject3D) {
                                overlaySnapshotRoot.visible = true;
                                overlayRoot.add(overlaySnapshotRoot);
                                overlaySnapshotRoot.updateMatrixWorld(true);
                            }
                        } catch (err) {
                            maxjsDebugWarn('[MaxJS snapshot] runtimeScene.overlayRoot parse failed (non-fatal)', err);
                        }
                    }
                    // Layers hide Max meshes and draw deformed clones under jsRoot; export still bakes Max geometry as visible.
                    const hideHandles = meta.runtimeScene.hideMaxSyncHandles;
                    if (Array.isArray(hideHandles) && hideHandles.length) {
                        for (const h of hideHandles) {
                            const m = getSyncedObjectForSnapshotHandle(h);
                            if (m) m.visible = false;
                        }
                    }
                    if (Array.isArray(meta.runtimeScene.transformOverrides) && meta.runtimeScene.transformOverrides.length) {
                        layerManager.restoreTransformOverrides?.(meta.runtimeScene.transformOverrides);
                    }
                }
                if (meta.snapshotUi) {
                    // Apply snapshot's buildMode if no URL override
                    // Fallback: if debug object exists, treat as dev mode (for older snapshots)
                    if (!urlMode) {
                        const snapshotBuildMode = meta.snapshotUi.buildMode
                            || (meta.snapshotUi.debug ? 'dev' : 'release');
                        if (snapshotBuildMode !== buildMode) {
                            buildMode = snapshotBuildMode;
                            applyBuildMode();
                        }
                    }
                    // Force disable motion blur in standalone — no velocity data
                    if (meta.snapshotUi.fx?.motionBlur) {
                        meta.snapshotUi.fx.motionBlur.enabled = false;
                    }
                    applySavedPostFxPayload(meta.snapshotUi);
                    maxjsDebugLog('[MaxJS] Applying standalone camera:', meta.snapshotUi.camera);
                    applyStandaloneCameraState(meta.snapshotUi.camera);
                    maxjsDebugLog('[MaxJS] Camera after apply:', camera.position.toArray(), 'target:', controls.target.toArray());
                    syncPostFxPanel(true);
                }
                animationSystem.invalidateTargets();
                if (meta.animations) animationSystem.loadSnapshotAnimations(meta.animations, animationBuffer);
                else animationSystem.clear();
                // Standalone has no Max — kick a local clock with the same API.
                if (meta.snapshotUi?.timeline) {
                    maxTimeline.initStandalone(meta.snapshotUi.timeline);
                } else {
                    maxTimeline.initStandalone({ fps: 30, defaultPlaying: true });
                }
                setInfoText(`MaxJS Snapshot - ${meta.nodes?.length ?? 0} nodes`);
                return true;
            } catch (error) {
                reportBridgeError('snapshot load', error);
                return false;
            }
        }


        // ── Render to Image (production render) ──────────────
        let savedPerformanceSettings = null;
        let renderToImageActive = false;
        let pendingRenderToImage = null;
        let savedRenderToImageState = null;

        function renderCurrentFrameOnce(renderTimeSeconds = null) {
            if (!xrRuntime.active) controls.update();
            if (!xrRuntime.active && (!physicalCameraDofActive || !camLock)) {
                ssgiFx.updateDofFocusFromCamera(camera.position.distanceTo(controls.target));
            }
            if (defaultLights.visible) {
                defaultKey.position.copy(getActiveCameraWorldPosition(cameraPositionWorld));
            }
            updateVolumeUniforms();
            const effectiveElapsed = Number.isFinite(renderTimeSeconds)
                ? renderTimeSeconds
                : inlineClock.getElapsedTime();
            layerManager.update(0, effectiveElapsed);
            if (Number.isFinite(renderTimeSeconds)) {
                animationSystem?.seekAllClips?.(renderTimeSeconds);
                gltfSystem?.setTime?.(renderTimeSeconds);
            } else {
                animationSystem?.update(0);
            }

            try {
                if (ssgiFx.hasEnabledEffects()) {
                    ssgiFx.render();
                } else {
                    renderer.render(scene, camera);
                }
            } catch (error) {
                reportBridgeError('runtime error', error);
            }
            if (splatOverlay && splatHandleMap.size > 0) {
                updateSplatCamera();
                splatOverlay.renderer.render(splatOverlay.scene, splatOverlay.camera);
            }
        }

        bridge.on('render_to_image', async msg => {
            const w = msg.width || innerWidth;
            const h = msg.height || innerHeight;
            const frameNumber = Number.isFinite(msg.frame) ? msg.frame : 0;
            const fps = Number.isFinite(msg.fps) && msg.fps > 0 ? msg.fps : 30;
            renderToImageActive = true;
            pendingRenderToImage = {
                observedSyncFrame: latestAppliedSyncFrame,
                renderTimeSeconds: frameNumber / fps,
                startedAtMs: performance.now(),
                syncDeadlineMs: performance.now() + 10000,
            };

            // Hide all UI — keep only canvas elements visible
            for (const el of document.body.children) {
                if (el.tagName !== 'CANVAS' && el.tagName !== 'SCRIPT') {
                    el._rtiPrevDisplay = el.style.display;
                    el.style.display = 'none';
                }
            }
            // Transparent background for alpha channel
            document.body.style.background = 'transparent';

            // Save and bypass all performance throttling
            savedPerformanceSettings = { ...performanceSettings };
            performanceSettings.renderScale = 1.0;
            performanceSettings.fpsCap = 0;

            savedRenderToImageState = {
                envVisible,
                localHdriShowBg,
                opaqueBackdropEnabled: ssgiFx.isOpaqueBackdropEnabled(),
                playbackState: animationSystem?.capturePlaybackState?.() ?? null,
            };

            // Force transparent background for capture while keeping environment reflections.
            envVisible = false;
            localHdriShowBg = false;
            ssgiFx.setEnvironmentVisible(false);
            if (savedRenderToImageState.opaqueBackdropEnabled) {
                ssgiFx.setOpaqueBackdropEnabled(false);
            }
            scene.background = null;

            if (frameNumber >= 0) {
                animationSystem?.seekAllClips?.(frameNumber / fps);
            }

            // Set renderer to exact requested resolution, pixel ratio 1:1
            renderer.setPixelRatio(1);
            renderer.setSize(w, h);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            ssgiFx.resize();
            if (splatOverlay?.renderer) {
                splatOverlay.renderer.setPixelRatio(1);
                splatOverlay.renderer.setSize(w, h, false);
            }

            try {
                // Wait for the fresh synced frame to land; renderFrame will perform the one-shot render.
            } catch (error) {
                console.warn('[MaxJS render_to_image] render failed', error);
                bridge.send('render_to_image_ready');
            }
        });

        bridge.on('render_to_image_done', () => {
            renderToImageActive = false;
            pendingRenderToImage = null;

            // Restore all UI elements
            for (const el of document.body.children) {
                if ('_rtiPrevDisplay' in el) {
                    el.style.display = el._rtiPrevDisplay;
                    delete el._rtiPrevDisplay;
                }
            }
            document.body.style.background = '';

            // Restore performance settings and viewport size
            if (savedPerformanceSettings) {
                Object.assign(performanceSettings, savedPerformanceSettings);
                savedPerformanceSettings = null;
            }
            if (savedRenderToImageState) {
                envVisible = savedRenderToImageState.envVisible;
                localHdriShowBg = savedRenderToImageState.localHdriShowBg;
                ssgiFx.setEnvironmentVisible(envVisible);
                ssgiFx.setOpaqueBackdropEnabled(savedRenderToImageState.opaqueBackdropEnabled);
                animationSystem?.restorePlaybackState?.(savedRenderToImageState.playbackState);
                savedRenderToImageState = null;
                syncEnvButtonUi();
                if (isLocalHdriActive()) {
                    applyLocalHDRIToScene();
                } else {
                    scene.background = envVisible && scene.environment
                        ? scene.environment : new THREE.Color(hiddenBackgroundColor);
                    if (envVisible) scene.backgroundBlurriness = localHdriBlur;
                }
            }
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            applyRendererPerformanceSettings({ resizePostFx: true });
        });

        // ── Build mode / Standalone / Debug ──
        // buildMode / isStandalone / urlMode are initialized near perfHud (early).
        // three.js r184 Inspector — lazily created, gated by debug mode.
        let threeInspector = null;
        function syncInspector() {
            if (debugMode && buildMode !== 'release') {
                if (!threeInspector) {
                    threeInspector = new Inspector();
                    renderer.inspector = threeInspector;
                    const parent = renderer.domElement.parentElement;
                    if (parent && !threeInspector.domElement.parentElement) {
                        parent.appendChild(threeInspector.domElement);
                    }
                }
                threeInspector.domElement.style.display = '';
            } else if (threeInspector) {
                threeInspector.domElement.style.display = 'none';
            }
        }

        async function restoreInteractiveBrowserState() {
            restorePostFxState();
            syncPostFxPanel(true, { persist: false });

            const file = await restoreStashedHdri();
            if (file && !isLocalHdriLoaded()) loadLocalHDRIFile(file, { preserveEnabled: true, persist: false });
        }

        async function bootStandaloneSnapshot() {
            const loaded = await loadStandaloneSnapshot();
            if (loaded) return true;
            await restoreInteractiveBrowserState();
            return false;
        }

        function applyBuildMode() {
            const hud = document.getElementById('hud');
            const rail = document.getElementById('rightRail');
            const railHandle = document.querySelector('.rail-drag-handle');
            const dockHandle = document.querySelector('.dock-drag-handle');
            const info = document.getElementById('info');
            const debugBtn = document.getElementById('btnDebug');
            // Perf HUD + sync stats: only when not in static release mode (localStorage debug alone must not cost frames).
            perfHud.setDebugEnabled(debugMode && buildMode !== 'release');
            if (buildMode === 'release') {
                hud.style.display = 'none';
                if (rail) rail.style.display = 'none';
                if (railHandle) railHandle.style.display = 'none';
                if (dockHandle) dockHandle.style.display = 'none';
                return;
            }
            hud.style.display = '';
            if (rail) rail.style.display = '';
            if (railHandle) railHandle.style.display = '';
            if (dockHandle) dockHandle.style.display = '';
            info.style.display = debugMode ? '' : 'none';
            debugBtn.classList.toggle('active', debugMode);
            syncInspector();
        }

        function setDebugMode(enabled) {
            debugMode = enabled;
            try { localStorage.setItem(DEBUG_STORAGE_KEY, String(debugMode)); } catch {}
            applyBuildMode();
        }

        if (isStandalone) {
            void bootStandaloneSnapshot();
        } else {
            void restoreInteractiveBrowserState();
        }

        addEventListener('focus', () => {
            lastRenderTimestamp = 0;
            syncPostFxPanel(true, { persist: false });
        });
        addEventListener('blur', () => {
            lastRenderTimestamp = 0;
            syncPostFxPanel(true, { persist: false });
        });
        document.addEventListener('visibilitychange', () => {
            lastRenderTimestamp = 0;
            syncPostFxPanel(true, { persist: false });
        });

        if (buildMode !== 'release') {
            const debugBtn = document.getElementById('btnDebug');
            debugBtn.style.display = '';
            debugBtn.onclick = () => setDebugMode(!debugMode);
        }

        // ── Drag-to-hide rail + dock ────────────────────────
        // Each panel has a thin vertical grabber on its inner edge.
        // side='left' (rail): drag left = hide, drag right = reveal.
        // side='right' (dock): mirrored — drag right = hide, drag left = reveal.
        // Release with <4px travel toggles visibility (click-to-dismiss).
        function setupDragHide(panel, handle, side, storageKey) {
            let hidden = false;
            try { hidden = localStorage.getItem(storageKey) === '1'; } catch {}
            panel.classList.toggle('is-hidden', hidden);

            let dragging = false;
            let startX = 0;
            let width = 0;
            const sign = side === 'left' ? -1 : 1;

            handle.addEventListener('pointerdown', (e) => {
                if (e.button !== 0) return;
                dragging = true;
                startX = e.clientX;
                width = panel.offsetWidth;
                handle.setPointerCapture(e.pointerId);
                handle.classList.add('dragging');
                panel.style.transition = 'none';
                e.preventDefault();
            });

            handle.addEventListener('pointermove', (e) => {
                if (!dragging) return;
                const dx = e.clientX - startX;
                const max = width - 4;
                // Base offset: where the panel is relative to its resting visible position.
                const base = hidden ? sign * max : 0;
                // Clamp so panel never goes past fully visible (0) or fully hidden (sign*max).
                let next = base + dx;
                next = side === 'left'
                    ? Math.min(0, Math.max(-max, next))
                    : Math.max(0, Math.min(max, next));
                panel.style.transform = `translateX(${next}px)`;
            });

            const endDrag = (e) => {
                if (!dragging) return;
                dragging = false;
                try { handle.releasePointerCapture(e.pointerId); } catch {}
                handle.classList.remove('dragging');
                panel.style.transition = '';
                panel.style.transform = '';

                const dx = e.clientX - startX;
                const threshold = 40;
                let nextHidden = hidden;
                if (Math.abs(dx) < 4) {
                    nextHidden = !hidden;          // treat as click → toggle
                } else if (hidden && dx * sign < -threshold) {
                    nextHidden = false;            // dragged toward center past threshold → reveal
                } else if (!hidden && dx * sign > threshold) {
                    nextHidden = true;             // dragged toward edge past threshold → hide
                }
                hidden = nextHidden;
                panel.classList.toggle('is-hidden', hidden);
                try { localStorage.setItem(storageKey, hidden ? '1' : '0'); } catch {}
            };
            handle.addEventListener('pointerup', endDrag);
            handle.addEventListener('pointercancel', endDrag);
        }

        {
            const rail = document.getElementById('rightRail');
            const railHandle = document.querySelector('.rail-drag-handle');
            const dock = document.getElementById('rightDock');
            const dockHandle = document.querySelector('.dock-drag-handle');
            if (rail && railHandle) setupDragHide(rail, railHandle, 'left', 'maxjs-rail-hidden');
            if (dock && dockHandle) setupDragHide(dock, dockHandle, 'right', 'maxjs-dock-hidden');
        }

        applyBuildMode();

        renderer.setAnimationLoop(renderFrame);

        startBridgeHandshake();
    </script>
</body>
</html>
